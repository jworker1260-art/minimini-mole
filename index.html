// ---- Countdown 화면 ----
function renderCountdown() {
  // 그리드 배경 미리 그리기 (카운트다운 중 배경으로)
  renderGrid();

  // 반투명 크림 오버레이
  ctx.fillStyle = "rgba(255, 248, 240, 0.75)";
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 현재 숫자의 초 내 진행도 (0→1)
  const inSecond = countdownTimer % 1.0;

  // EaseOutBack 스케일 팝 효과 (등장 시 1.4→1.0)
  const scaleT = Math.min(inSecond / 0.3, 1.0); // 0.3초 동안 애니메이션
  const popScale = 1.0 + (1.4 - 1.0) * (1 - easeOutBack(scaleT));

  // 페이드: 0.7초 이후 페이드아웃
  const alpha = inSecond < 0.7 ? 1.0 : 1.0 - (inSecond - 0.7) / 0.3;

  ctx.save();
  ctx.translate(canvasWidth / 2, canvasHeight * 0.45);
  ctx.scale(popScale, popScale);
  ctx.globalAlpha = clamp(alpha, 0, 1);

  // 숫자 텍스트
  const numText = String(countdownNumber);
  ctx.fillStyle = THEME.mint;
  ctx.font = `bold ${s(120)}px ${FONT.number}`;
  ctx.strokeStyle = "rgba(91, 168, 156, 0.3)";
  ctx.lineWidth = s(4);
  ctx.strokeText(numText, 0, 0);
  ctx.fillText(numText, 0, 0);

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- Playing 화면 ----
function renderPlaying() {
  // 배경 반짝임 (가장 뒤 레이어)
  const now = Date.now() / 1000;
  for (const sp of bgSparkles) {
    sp.y -= sp.speed / 60; // 프레임당 이동
    if (sp.y < -0.02) { sp.y = 1.02; sp.x = Math.random(); }
    const alpha = (0.15 + 0.12 * Math.sin(now * 2.5 + sp.phase)) * 0.7;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.phase % 2 < 1 ? THEME.mintLight : THEME.cream;
    ctx.beginPath();
    ctx.arc(sp.x * canvasWidth, sp.y * canvasHeight, s(sp.size), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Fever 플래시 배경
  if (isFever) {
    const flashAlpha = 0.08 + 0.06 * Math.sin(Date.now() / 150);
    ctx.fillStyle = `rgba(255, 215, 0, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  }

  // HUD는 흔들림 없이 먼저 렌더링
  renderHUD();

  // 그리드 영역에만 흔들림 적용
  if (screenShake.active) {
    const dur = screenShake.duration || CONFIG.screenShakeDuration;
    const progress = 1 - screenShake.timer / dur; // 0→1
    const decay = 1 - progress; // 감쇠: 1→0
    const wave = Math.sin(progress * Math.PI * 2 * CONFIG.screenShakeCycles);
    const shakeX = wave * screenShake.intensity * decay;
    ctx.save();
    ctx.translate(shakeX, 0);
    // 회전 흔들림 (타이밍 E-3)
    if (screenShake.rotationDeg) {
      const rotRad = (screenShake.rotationDeg * Math.PI / 180) * wave * decay;
      ctx.translate(canvasWidth / 2, canvasHeight / 2);
      ctx.rotate(rotRad);
      ctx.translate(-canvasWidth / 2, -canvasHeight / 2);
    }
  }

  renderGrid();

  if (isFever) {
    renderPinata();
  } else {
    renderTargets();
  }

  renderHitFlashes();
  renderParticles();
  renderFloatingTexts();
  renderRipples();

  if (screenShake.active) {
    ctx.restore();
  }

  // Fever 종료 예고 깜빡임 (마지막 1초)
  if (isFever && feverTimer > 0 && feverTimer <= CONFIG.feverWarningTime && !feverPopPhase) {
    const flash = Math.floor(feverTimer / CONFIG.feverWarningFlashInterval) % 2 === 0;
    if (flash) {
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      ctx.restore();
    }
  }

  // Fever 인트로 텍스트
  if (feverIntro) {
    const p = feverIntroTimer / FEVER_INTRO_DURATION;
    // 0~0.625(0.5s): 등장+유지, 0.625~1.0(0.3s): 페이드아웃
    const fadeOutStart = 0.5 / FEVER_INTRO_DURATION;
    const alpha = p < fadeOutStart ? 1.0 : 1.0 - (p - fadeOutStart) / (1 - fadeOutStart);
    // 스케일: 0.3→1.0 (EaseOutBack, 처음 0.3초)
    const scaleUpEnd = 0.3 / FEVER_INTRO_DURATION;
    const scaleP = clamp(p / scaleUpEnd, 0, 1);
    const textScale = 0.3 + 0.7 * easeOutBack(scaleP);

    ctx.save();
    ctx.globalAlpha = clamp(alpha, 0, 1) * 0.9;
    ctx.translate(canvasWidth / 2, canvasHeight * 0.45);
    ctx.scale(textScale, textScale);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // 외곽선
    ctx.strokeStyle = "rgba(180, 140, 0, 0.4)";
    ctx.lineWidth = s(5);
    ctx.font = `bold ${s(48)}px ${FONT.text}`;
    ctx.strokeText("Fever Time!", 0, 0);

    // 텍스트
    ctx.fillStyle = THEME.gold;
    ctx.fillText("Fever Time!", 0, 0);

    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function renderHUD() {
  const hudY = s(10);
  const hudPadH = s(10);
  const hudPadV = s(6);

  // ── 점수 (둥근 반투명 배경) ──
  const scoreText = score.toString();
  ctx.font = `bold ${s(26)}px ${FONT.number}`;
  const scoreW = ctx.measureText(scoreText).width;
  const scoreBgW = scoreW + hudPadH * 2;
  const scoreBgH = s(26) + hudPadV * 2;
  const scoreBgX = s(12);
  const scoreBgY = hudY;

  ctx.fillStyle = "rgba(255, 248, 240, 0.85)";
  roundRect(ctx, scoreBgX, scoreBgY, scoreBgW, scoreBgH, s(10));
  ctx.fill();
  ctx.strokeStyle = THEME.gridLine;
  ctx.lineWidth = s(1);
  roundRect(ctx, scoreBgX, scoreBgY, scoreBgW, scoreBgH, s(10));
  ctx.stroke();

  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  ctx.fillStyle = THEME.textPrimary;
  ctx.font = `bold ${s(26)}px ${FONT.number}`;
  ctx.fillText(scoreText, scoreBgX + hudPadH, scoreBgY + scoreBgH / 2);

  // ── 타이머 (원형 프로그레스 바) ──
  const timerRadius = s(22);
  const timerCX = canvasWidth - s(12) - timerRadius;
  const timerCY = hudY + scoreBgH / 2;
  const timerRatio = clamp(timeRemaining / CONFIG.stageTimeLimit, 0, 1);
  const timerSeconds = Math.ceil(timeRemaining);
  const isUrgent = timeRemaining <= 5;

  // 배경 원
  ctx.fillStyle = "rgba(255, 248, 240, 0.85)";
  ctx.beginPath();
  ctx.arc(timerCX, timerCY, timerRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = THEME.gridLine;
  ctx.lineWidth = s(1);
  ctx.beginPath();
  ctx.arc(timerCX, timerCY, timerRadius, 0, Math.PI * 2);
  ctx.stroke();

  // 프로그레스 아크
  const arcStart = -Math.PI / 2;
  const arcEnd = arcStart + Math.PI * 2 * timerRatio;
  ctx.lineWidth = s(3.5);
  ctx.lineCap = "round";
  if (isUrgent) {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 150);
    ctx.strokeStyle = `rgba(255, 138, 128, ${pulse})`;
  } else {
    ctx.strokeStyle = THEME.mint;
  }
  ctx.beginPath();
  ctx.arc(timerCX, timerCY, timerRadius - s(4), arcStart, arcEnd);
  ctx.stroke();

  // 숫자
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = isUrgent ? THEME.coral : THEME.textPrimary;
  ctx.font = `bold ${s(20)}px ${FONT.number}`;
  ctx.fillText(timerSeconds.toString(), timerCX, timerCY + s(1));

  // ── Fever 게이지 바 (그라데이션) ──
  const barX = s(12);
  const barY = scoreBgY + scoreBgH + s(6);
  const barWidth = canvasWidth - s(24);
  const barHeight = s(10);
  const barRadius = s(5);

  // 바 배경
  ctx.fillStyle = THEME.gaugeBase;
  roundRect(ctx, barX, barY, barWidth, barHeight, barRadius);
  ctx.fill();

  // 채워진 부분
  const fillRatio = feverGauge / CONFIG.feverGaugeMax;
  if (fillRatio > 0) {
    const fillWidth = barWidth * fillRatio;
    ctx.save();
    roundRect(ctx, barX, barY, fillWidth, barHeight, barRadius);
    ctx.clip();
    if (isFever) {
      ctx.fillStyle = THEME.gold;
      ctx.fillRect(barX, barY, fillWidth, barHeight);
    } else if (fillRatio >= 0.8) {
      // 80% 이상: 민트→금색 그라데이션
      const grad = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
      grad.addColorStop(0, THEME.mint);
      grad.addColorStop(0.7, THEME.mint);
      grad.addColorStop(1, THEME.gold);
      ctx.fillStyle = grad;
      ctx.fillRect(barX, barY, fillWidth, barHeight);
    } else {
      ctx.fillStyle = THEME.gaugeFill;
      ctx.fillRect(barX, barY, fillWidth, barHeight);
    }
    // 상단 하이라이트 (광택)
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(barX, barY, fillWidth, barHeight * 0.35);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 함정 터치: 게이지 빨간 깜빡임
  if (gaugeFlashTimer > 0) {
    const flashAlpha = 0.5 * (gaugeFlashTimer / CONFIG.gaugeTrapFlashDuration);
    ctx.save();
    ctx.globalAlpha = flashAlpha * (Math.sin(gaugeFlashTimer * 30) > 0 ? 1 : 0.3);
    ctx.fillStyle = "#FF4444";
    roundRect(ctx, barX, barY, barWidth, barHeight, barRadius);
    ctx.fill();
    ctx.restore();
  }

  // 80% 이상: 반짝임
  if (fillRatio >= 0.8 && !isFever) {
    const fillWidth = barWidth * fillRatio;
    const now = Date.now() / 1000;
    for (let i = 0; i < 4; i++) {
      const phase = (now * 1.2 + i * 0.25) % 1.0;
      const sparkX = barX + fillWidth * phase;
      const sparkY = barY + barHeight / 2;
      const sparkAlpha = Math.sin(phase * Math.PI) * (0.5 + 0.5 * Math.sin(now * 8 + i * 2));
      if (sparkAlpha > 0.1) {
        ctx.globalAlpha = sparkAlpha * 0.9;
        ctx.fillStyle = "#FFFFFF";
        ctx.beginPath();
        ctx.arc(sparkX, sparkY, s(2.5 + Math.sin(now * 6 + i) * 1), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    const pulseAlpha = 0.12 + 0.08 * Math.sin(now * 6);
    ctx.globalAlpha = pulseAlpha;
    ctx.fillStyle = "#FFFFFF";
    roundRect(ctx, barX, barY, fillWidth, barHeight, barRadius);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // 100% 번쩍 플래시
  if (feverIntro && feverIntroTimer < 0.3) {
    const flashAlpha = (1 - feverIntroTimer / 0.3) * 0.7;
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = "#FFFFFF";
    roundRect(ctx, barX - s(2), barY - s(2), barWidth + s(4), barHeight + s(4), barRadius + s(1));
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Fever 라벨
  if (isFever) {
    ctx.textAlign = "center";
    const feverWarning = feverTimer <= CONFIG.feverWarningTime && feverTimer > 0;
    ctx.fillStyle = feverWarning ? THEME.coral : THEME.gold;
    ctx.font = `bold ${s(13)}px ${FONT.number}`;
    ctx.fillText(`FEVER! ${Math.ceil(feverTimer)}s`, canvasWidth / 2, barY + barHeight + s(5));
  }
}

function renderGrid() {
  const cs = gridLayout.cellSize;
  const r = s(12); // 셀 둥근 모서리

  // 그리드 전체 영역 배경
  const pad = s(8);
  ctx.fillStyle = THEME.bgGrid;
  roundRect(ctx,
    gridLayout.offsetX - pad,
    gridLayout.offsetY - pad,
    gridLayout.totalWidth + pad * 2,
    gridLayout.totalHeight + pad * 2,
    s(16));
  ctx.fill();

  for (const cell of gridLayout.cells) {
    // 외곽 그림자 (입체감)
    ctx.fillStyle = THEME.shadow;
    roundRect(ctx, cell.x + s(1.5), cell.y + s(2), cs, cs, r);
    ctx.fill();

    // 셀 배경
    ctx.fillStyle = THEME.gridCellBg;
    roundRect(ctx, cell.x, cell.y, cs, cs, r);
    ctx.fill();

    // 셀 상단 하이라이트 (입체감)
    ctx.save();
    roundRect(ctx, cell.x, cell.y, cs, cs, r);
    ctx.clip();
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(cell.x, cell.y, cs, cs * 0.35);
    ctx.globalAlpha = 1;
    ctx.restore();

    // 중앙 원형 홈 (타겟 등장 위치 힌트)
    const holeR = cs * 0.3;
    ctx.fillStyle = "rgba(120, 100, 80, 0.08)";
    ctx.beginPath();
    ctx.arc(cell.centerX, cell.centerY, holeR, 0, Math.PI * 2);
    ctx.fill();

    // 홈 안쪽 밝은 하이라이트 (오목한 느낌)
    ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
    ctx.beginPath();
    ctx.arc(cell.centerX, cell.centerY + holeR * 0.15, holeR * 0.75, 0, Math.PI * 2);
    ctx.fill();

    // 셀 테두리
    ctx.strokeStyle = THEME.gridLine;
    ctx.lineWidth = s(1);
    roundRect(ctx, cell.x, cell.y, cs, cs, r);
    ctx.stroke();
  }
}

function renderTargets() {
  for (const t of targets) {
    const cell = gridLayout.cells[t.cellIndex];
    const cx = cell.centerX;
    const cy = cell.centerY + (t.bounceOffset || 0);
    const baseSize = gridLayout.cellSize * 0.35;
    const size = baseSize * t.scale;

    if (size <= 0 && t.state !== "pop") continue;

    ctx.save();
    ctx.translate(cx, cy);

    // pop 상태: Squash & Stretch + 알파 + 회전 적용
    if (t.state === "pop") {
      const sx = t.scaleX || 1;
      const sy = t.scaleY || 1;
      if (sx <= 0.01 && sy <= 0.01) { ctx.restore(); continue; }
      ctx.globalAlpha = t.hitAlpha || 1;
      if (t.hitRotation) ctx.rotate(t.hitRotation);
      ctx.scale(sx, sy);
    }

    // 타이밍 타겟 떨림/멈춤/발광 (모든 시각 모드 공통)
    if (t.type === "timing" && t.state === "std") {
      const iScale = t.indicatorScale;
      const inE3 = iScale <= CONFIG.timingE3TrembleStart;
      const isStill = iScale <= CONFIG.timingE3StillPoint;

      if (isStill) {
        // 멈춤 + 금색 발광 (최적 터치 타이밍)
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = 14 * scaleRatio;
        // 멈춤 진입 시 흰색 링 반짝 (1회)
        if (!t._stillFlashed) {
          t._stillFlashed = true;
          const cell = gridLayout.cells[t.cellIndex];
          hitFlashes.push({
            x: cell.centerX, y: cell.centerY + (t.bounceOffset || 0),
            timer: 0, duration: 0.15, startAlpha: 0.5, alpha: 0.5,
            startRadius: baseSize * 1.5, radius: baseSize * 1.5,
            color: THEME.gold, startLineWidth: 3 * scaleRatio, lineWidth: 3 * scaleRatio
          });
        }
      } else if (inE3) {
        // E-3 구간: 빠른 주기 떨림 ("지금이야!" 힌트)
        const shake = CONFIG.timingA_e3ShakeIntensity * scaleRatio;
        const phase = (Date.now() % CONFIG.timingA_e3ShakePeriod) / CONFIG.timingA_e3ShakePeriod;
        const shakeX = Math.sin(phase * Math.PI * 2) * shake;
        const shakeY = Math.cos(phase * Math.PI * 2 * 1.3) * shake * 0.5;
        ctx.translate(shakeX, shakeY);
      } else {
        // E-3 이전: 일반 랜덤 떨림
        const shakeX = (Math.random() - 0.5) * CONFIG.timingShakeIntensity * scaleRatio;
        const shakeY = (Math.random() - 0.5) * CONFIG.timingShakeIntensity * scaleRatio;
        ctx.translate(shakeX, shakeY);
      }
    }

    // pop 상태에서는 baseSize를 직접 사용 (scaleX/scaleY가 변형 담당)
    const drawSize = t.state === "pop" ? baseSize : size;

    // 모드 C: 하트비트 스케일 적용 (std 상태에서만)
    if (t.type === "timing" && t.state === "std" && CONFIG.timingVisualMode === 'C') {
      const progress = 1 - t.indicatorScale; // 0→1 진행
      const period = lerp(CONFIG.timingC_periodStart, CONFIG.timingC_periodEnd, progress);
      const pulsePhase = (Date.now() / 1000 % period) / period;
      const pulse = CONFIG.timingC_pulseMin + (CONFIG.timingC_pulseMax - CONFIG.timingC_pulseMin) * (0.5 + 0.5 * Math.sin(pulsePhase * Math.PI * 2));
      ctx.scale(pulse, pulse);
    }

    // 모드 A: E-3 구간 타겟 발광
    if (t.type === "timing" && t.state === "std" && CONFIG.timingVisualMode === 'A') {
      const inE3 = t.indicatorScale <= CONFIG.timingE2Threshold;
      if (inE3) {
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = CONFIG.timingA_e3GlowBlur * scaleRatio;
      }
    }

    // 이미지 렌더링 시도 → 실패 시 코드 렌더링 폴백
    if (!drawTargetImage(t, drawSize)) {
      switch (t.type) {
        case "basic": drawBasicTarget(drawSize, t); break;
        case "trap": drawTrapTarget(drawSize, t); break;
        case "timing": drawTimingTarget(drawSize, t, cx, cy); break;
        case "fever": drawFeverTarget(drawSize, t); break;
      }
    }

    ctx.restore();

    // 타이밍 인디케이터 (타겟 밖에서 그림)
    if (t.type === "timing" && t.state !== "pop" && t.state !== "despawning") {
      const mode = CONFIG.timingVisualMode;
      if (mode === 'A') {
        drawTimingIndicatorA(cx, cy + (t.bounceOffset || 0), baseSize, t.indicatorScale);
      } else if (mode === 'B') {
        drawTimingIndicatorB(cx, cy + (t.bounceOffset || 0), baseSize, t.indicatorScale);
      } else if (mode === 'C') {
        drawTimingIndicatorC(cx, cy + (t.bounceOffset || 0), baseSize, t.indicatorScale, t);
      }
    }
  }
}

// ---- 피냐타 렌더링 ----
function renderPinata() {
  if (pinataScale <= 0) return;

  ctx.save();
  ctx.translate(pinataX, pinataY);

  // 흔들림 회전
  if (pinataRotation !== 0) {
    ctx.rotate(pinataRotation);
  }

  // 스케일 (등장 시 easeOutBack, 폭발 시 raw)
  const displayScale = pinataScale <= 1 ? easeOutBack(pinataScale) : pinataScale;
  ctx.scale(displayScale, displayScale);

  const pinataImg = getImage(ASSETS.pinata.image);
  if (pinataImg) {
    const aspect = pinataImg.naturalWidth / pinataImg.naturalHeight;
    const drawH = pinataRadius * 2;
    const drawW = drawH * aspect;
    ctx.drawImage(pinataImg, -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    drawPinataCharacter(0, 0, pinataRadius);
  }

  ctx.restore();
}

// ============================================================
// 타겟 이미지 렌더링
// ============================================================

// 이미지가 있으면 렌더링하고 true 반환, 없으면 false (코드 렌더링 폴백)
function drawTargetImage(target, size) {
  const assetDef = ASSETS.targets[target.type];
  if (!assetDef) return false;

  // 상태에 따라 이미지 경로 결정
  let imgPath;
  if (target.state === "pop" && assetDef.images.pop) {
    imgPath = assetDef.images.pop;
  } else if (assetDef.images.std) {
    imgPath = assetDef.images.std;
  } else {
    return false;
  }

  const img = getImage(imgPath);
  if (!img) return false;

  // 비율 유지하면서 타겟 칸 크기에 맞춤
  const drawDiameter = size * 2;
  const aspect = img.naturalWidth / img.naturalHeight;
  let drawW, drawH;
  if (aspect >= 1) {
    drawW = drawDiameter;
    drawH = drawDiameter / aspect;
  } else {
    drawH = drawDiameter;
    drawW = drawDiameter * aspect;
  }

  ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
  return true;
}

// ============================================================
// 타겟 코드 렌더링 (이미지 없을 때 폴백)
// ============================================================

// -- 기본 타겟: 원형 + 귀여운 표정 --
function drawBasicTarget(size, target) {
  const colors = ASSETS.targets.basic.colors;

  // 몸체
  ctx.beginPath();
  ctx.arc(0, 0, size, 0, Math.PI * 2);
  ctx.fillStyle = colors.main;
  ctx.fill();

  // 볼터치
  ctx.beginPath();
  ctx.arc(-size * 0.5, size * 0.2, size * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 138, 128, 0.4)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(size * 0.5, size * 0.2, size * 0.2, 0, Math.PI * 2);
  ctx.fill();

  const isPop = target.state === "pop";

  // 눈
  ctx.fillStyle = colors.face;
  if (isPop) {
    // ^^ 눈
    ctx.lineWidth = s(2);
    ctx.strokeStyle = colors.face;
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, -size * 0.15);
    ctx.lineTo(-size * 0.2, -size * 0.3);
    ctx.lineTo(-size * 0.1, -size * 0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(size * 0.1, -size * 0.15);
    ctx.lineTo(size * 0.2, -size * 0.3);
    ctx.lineTo(size * 0.3, -size * 0.15);
    ctx.stroke();
  } else {
    // 점 눈
    ctx.beginPath();
    ctx.arc(-size * 0.2, -size * 0.15, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.2, -size * 0.15, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
  }

  // 입 (3 모양)
  if (!isPop) {
    ctx.strokeStyle = colors.face;
    ctx.lineWidth = s(1.5);
    ctx.beginPath();
    ctx.arc(-size * 0.08, size * 0.15, size * 0.1, 0, Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(size * 0.08, size * 0.15, size * 0.1, 0, Math.PI);
    ctx.stroke();
  }
}

function drawBasicTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  if (!drawTargetImage({ type: "basic", state: "std" }, size / 2)) {
    drawBasicTarget(size / 2, { state: "std" });
  }
  ctx.restore();
}

// -- 함정 타겟: 가시 원형 + 화난 표정 --
function drawTrapTarget(size, target) {
  const colors = ASSETS.targets.trap.colors;

  // 가시
  const spikeCount = 7;
  ctx.beginPath();
  for (let i = 0; i < spikeCount * 2; i++) {
    const angle = (Math.PI * 2 * i) / (spikeCount * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? size * 1.25 : size * 0.85;
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = colors.main;
  ctx.fill();

  // 몸체 원
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = "#D32F2F";
  ctx.fill();

  // 화난 눈 (반원, 위가 평평)
  ctx.fillStyle = colors.face;
  // 왼쪽 눈
  ctx.beginPath();
  ctx.arc(-size * 0.25, -size * 0.1, size * 0.12, 0, Math.PI);
  ctx.fill();
  // 오른쪽 눈
  ctx.beginPath();
  ctx.arc(size * 0.25, -size * 0.1, size * 0.12, 0, Math.PI);
  ctx.fill();

  // 눈썹 (찡그린)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.beginPath();
  ctx.moveTo(-size * 0.4, -size * 0.3);
  ctx.lineTo(-size * 0.15, -size * 0.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(size * 0.4, -size * 0.3);
  ctx.lineTo(size * 0.15, -size * 0.2);
  ctx.stroke();

  // 꼬인 입
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, size * 0.25);
  ctx.quadraticCurveTo(0, size * 0.15, size * 0.2, size * 0.25);
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.stroke();
}

function drawTrapTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  if (!drawTargetImage({ type: "trap", state: "std" }, size / 2.5)) {
    drawTrapTarget(size / 2.5, { state: "std" });
  }
  ctx.restore();
}

// -- 타이밍 타겟: 다이아몬드 + 불쌍한 표정 --
function drawTimingTarget(size, target, worldX, worldY) {
  const colors = ASSETS.targets.timing.colors;

  // 모드 C: E-3 구간에서 금색 변화
  const isE3C = CONFIG.timingVisualMode === 'C' && target.state === "std" && target.indicatorScale <= CONFIG.timingE2Threshold;
  const bodyColor = isE3C ? "#FFD700" : colors.main;

  // 다이아몬드 형태
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.75, 0);
  ctx.lineTo(0, size);
  ctx.lineTo(-size * 0.75, 0);
  ctx.closePath();
  ctx.fillStyle = bodyColor;
  ctx.fill();

  // 모드 C: E-3 발광
  if (isE3C) {
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 10 * scaleRatio;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  const isPop = target.state === "pop";
  const isE3 = target.indicatorScale <= CONFIG.timingE2Threshold;

  if (isPop) {
    // 환한 웃음
    ctx.fillStyle = colors.face;
    // ^^ 눈
    ctx.lineWidth = s(2);
    ctx.strokeStyle = colors.face;
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, -size * 0.15);
    ctx.lineTo(-size * 0.2, -size * 0.3);
    ctx.lineTo(-size * 0.1, -size * 0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(size * 0.1, -size * 0.15);
    ctx.lineTo(size * 0.2, -size * 0.3);
    ctx.lineTo(size * 0.3, -size * 0.15);
    ctx.stroke();
  } else {
    // 큰 동그란 눈
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.arc(-size * 0.2, -size * 0.15, size * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.2, -size * 0.15, size * 0.15, 0, Math.PI * 2);
    ctx.fill();
    // 눈동자
    ctx.fillStyle = colors.face;
    ctx.beginPath();
    ctx.arc(-size * 0.2, -size * 0.12, size * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.2, -size * 0.12, size * 0.07, 0, Math.PI * 2);
    ctx.fill();

    // 눈물
    ctx.fillStyle = colors.tear;
    ctx.beginPath();
    ctx.arc(-size * 0.35, size * 0.0, size * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.35, size * 0.0, size * 0.06, 0, Math.PI * 2);
    ctx.fill();

    // o 입
    ctx.beginPath();
    ctx.arc(0, size * 0.25, size * 0.1, 0, Math.PI * 2);
    ctx.strokeStyle = colors.face;
    ctx.lineWidth = s(1.5);
    ctx.stroke();
  }
}

function drawTimingTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  if (!drawTargetImage({ type: "timing", state: "std" }, size / 2)) {
    drawTimingTarget(size / 2, { state: "std", indicatorScale: 0.6 }, x, y);
  }
  ctx.restore();
  // 인디케이터 미리보기
  const mode = CONFIG.timingVisualMode;
  if (mode === 'A') drawTimingIndicatorA(x, y, size / 2, 0.6);
  else if (mode === 'B') drawTimingIndicatorB(x, y, size / 2, 0.6);
  else if (mode === 'C') drawTimingIndicatorC(x, y, size / 2, 0.6, { indicatorScale: 0.6 });
}

// -- 타이밍 인디케이터 모드 A: Approach Circle (osu! 개선형) --
function drawTimingIndicatorA(cx, cy, baseSize, indicatorScale) {
  if (indicatorScale <= 0) return;

  const maxRadius = baseSize * 2.2;
  const radius = maxRadius * indicatorScale;
  const progress = 1 - indicatorScale; // 0→1 진행

  // 색상 변화: 민트 → 노란색 → 금색
  let r, g, b;
  if (progress < 0.5) {
    const t = progress / 0.5;
    r = Math.round(lerp(126, 255, t));
    g = Math.round(lerp(206, 255, t));
    b = Math.round(lerp(192, 100, t));
  } else {
    const t = (progress - 0.5) / 0.5;
    r = Math.round(lerp(255, 255, t));
    g = Math.round(lerp(255, 215, t));
    b = Math.round(lerp(100, 0, t));
  }

  // 두께 변화: 얇은 것 → 두꺼운 것
  const lineW = lerp(CONFIG.timingA_lineWidthMin, CONFIG.timingA_lineWidthMax, progress);
  const opacity = lerp(0.5, 0.9, progress);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
  ctx.lineWidth = lineW * scaleRatio;

  // E-3 근처: 강한 글로우
  const inE3 = indicatorScale <= CONFIG.timingE2Threshold;
  if (inE3) {
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = CONFIG.timingA_e3GlowBlur * scaleRatio;
  } else {
    ctx.shadowColor = ASSETS.indicator.glowColor;
    ctx.shadowBlur = ASSETS.indicator.glowBlur * scaleRatio * 0.5;
  }
  ctx.stroke();
  ctx.restore();
}

// -- 타이밍 인디케이터 모드 B: 게이지 충전형 (Fill-Up) --
function drawTimingIndicatorB(cx, cy, baseSize, indicatorScale) {
  const progress = 1 - indicatorScale; // 0→1 진행 (충전량)
  const radius = baseSize * 1.3;
  const gaugeW = CONFIG.timingB_gaugeWidth * scaleRatio;

  ctx.save();

  // 원형 배경 (크림톤 반투명)
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(232, 224, 216, ${CONFIG.timingB_bgAlpha})`;
  ctx.fill();

  // 게이지 색상: 구간별 변화
  let gaugeColor;
  if (progress < 0.5) {
    gaugeColor = "rgba(126, 206, 192, 0.8)";       // E-1: 민트
  } else if (progress < 0.8) {
    gaugeColor = "rgba(255, 235, 59, 0.9)";         // E-2: 노란색
  } else {
    gaugeColor = "rgba(255, 215, 0, 1.0)";          // E-3: 금색
  }

  // 100% 초과 (오버플로): 코랄
  if (indicatorScale <= 0.01) {
    gaugeColor = "rgba(255, 138, 128, 0.9)";
  }

  // 원형 게이지 호 (아래에서 시계방향으로 채워짐: -90도 시작)
  const startAngle = -Math.PI / 2;
  const endAngle = startAngle + (Math.PI * 2 * progress);

  ctx.beginPath();
  ctx.arc(cx, cy, radius, startAngle, endAngle);
  ctx.strokeStyle = gaugeColor;
  ctx.lineWidth = gaugeW;
  ctx.lineCap = "round";

  // E-3 구간: 글로우
  if (progress >= 0.8) {
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 8 * scaleRatio;
  }

  ctx.stroke();

  // 게이지 끝점에 작은 원 (진행 표시)
  if (progress > 0.02 && progress < 0.99) {
    const dotX = cx + Math.cos(endAngle) * radius;
    const dotY = cy + Math.sin(endAngle) * radius;
    ctx.beginPath();
    ctx.arc(dotX, dotY, gaugeW * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = gaugeColor;
    ctx.fill();
  }

  ctx.restore();
}

// -- 타이밍 인디케이터 모드 C: 하트비트형 (Pulse) --
function drawTimingIndicatorC(cx, cy, baseSize, indicatorScale, target) {
  const progress = 1 - indicatorScale; // 0→1 진행
  const inE3 = indicatorScale <= CONFIG.timingE2Threshold;

  // 박동 주기 계산
  const period = lerp(CONFIG.timingC_periodStart, CONFIG.timingC_periodEnd, progress);
  const pulsePhase = (Date.now() / 1000 % period) / period;
  const pulseValue = 0.5 + 0.5 * Math.sin(pulsePhase * Math.PI * 2);

  // 박동 최고점에서 링 이펙트 (충격파)
  if (pulseValue > 0.9) {
    const ringAlpha = (pulseValue - 0.9) / 0.1 * CONFIG.timingC_ringAlpha;
    const ringRadius = baseSize * (1.2 + pulseValue * 0.3);
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
    ctx.strokeStyle = inE3 ? `rgba(255, 215, 0, ${ringAlpha})` : `rgba(126, 206, 192, ${ringAlpha})`;
    ctx.lineWidth = 2 * scaleRatio;
    if (inE3) {
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 6 * scaleRatio;
    }
    ctx.stroke();
    ctx.restore();
  }

  // 진행도 표시: 타겟 아래에 작은 도트 (E-1/E-2/E-3 구간 표시)
  const dotRadius = 2.5 * scaleRatio;
  const dotY = cy + baseSize * 1.4;
  const dotSpacing = 8 * scaleRatio;
  const dots = [
    { threshold: 0.5, color: THEME.mintLight },    // E-1
    { threshold: 0.8, color: "#FFEB3B" },    // E-2
    { threshold: 1.0, color: "#FFD700" },    // E-3
  ];
  ctx.save();
  for (let i = 0; i < dots.length; i++) {
    const dx = cx + (i - 1) * dotSpacing;
    const filled = progress >= (i === 0 ? 0 : dots[i - 1].threshold);
    ctx.beginPath();
    ctx.arc(dx, dotY, dotRadius, 0, Math.PI * 2);
    if (filled) {
      ctx.fillStyle = dots[i].color;
      ctx.fill();
    } else {
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 1 * scaleRatio;
      ctx.stroke();
    }
  }
  ctx.restore();
}

// -- Fever 타겟: 별 모양 + >w< 표정 --
function drawFeverTarget(size, target) {
  const colors = ASSETS.targets.fever.colors;

  // 별 모양 (5각)
  const points = 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI * 2 * i) / (points * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? size : size * 0.5;
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = colors.main;
  ctx.fill();

  // >w< 표정
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);

  // > 눈 (왼쪽)
  ctx.beginPath();
  ctx.moveTo(-size * 0.35, -size * 0.2);
  ctx.lineTo(-size * 0.2, -size * 0.1);
  ctx.lineTo(-size * 0.35, 0);
  ctx.stroke();

  // < 눈 (오른쪽)
  ctx.beginPath();
  ctx.moveTo(size * 0.35, -size * 0.2);
  ctx.lineTo(size * 0.2, -size * 0.1);
  ctx.lineTo(size * 0.35, 0);
  ctx.stroke();

  // w 입
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, size * 0.15);
  ctx.quadraticCurveTo(-size * 0.1, size * 0.3, 0, size * 0.15);
  ctx.quadraticCurveTo(size * 0.1, size * 0.3, size * 0.2, size * 0.15);
  ctx.stroke();
}

// -- 피냐타 캐릭터 --
function drawPinataCharacter(cx, cy, r) {
  const colors = ASSETS.pinata.colors;

  // 몸체 (타원형)
  ctx.beginPath();
  ctx.ellipse(cx, cy, r * 0.85, r, 0, 0, Math.PI * 2);
  ctx.fillStyle = colors.body;
  ctx.fill();

  // 줄무늬 (몸체 클리핑)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, r * 0.85, r, 0, 0, Math.PI * 2);
  ctx.clip();
  const stripeH = r * 0.18;
  ctx.fillStyle = colors.stripe1;
  ctx.fillRect(cx - r, cy - r * 0.5, r * 2, stripeH);
  ctx.fillStyle = colors.stripe2;
  ctx.fillRect(cx - r, cy - r * 0.1, r * 2, stripeH);
  ctx.fillStyle = colors.stripe3;
  ctx.fillRect(cx - r, cy + r * 0.3, r * 2, stripeH);
  ctx.restore();

  // 꼬깔 모자
  ctx.beginPath();
  ctx.moveTo(cx, cy - r * 1.3);
  ctx.lineTo(cx - r * 0.25, cy - r * 0.85);
  ctx.lineTo(cx + r * 0.25, cy - r * 0.85);
  ctx.closePath();
  ctx.fillStyle = colors.hat;
  ctx.fill();
  // 모자 챙
  ctx.beginPath();
  ctx.ellipse(cx, cy - r * 0.85, r * 0.3, r * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = colors.hat;
  ctx.fill();

  // 볼터치
  ctx.beginPath();
  ctx.arc(cx - r * 0.45, cy + r * 0.15, r * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 138, 128, 0.5)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + r * 0.45, cy + r * 0.15, r * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // 왼쪽 눈 > (꺽쇠)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(3);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.35, cy - r * 0.28);
  ctx.lineTo(cx - r * 0.18, cy - r * 0.15);
  ctx.lineTo(cx - r * 0.35, cy - r * 0.02);
  ctx.stroke();

  // 오른쪽 눈 < (꺽쇠)
  ctx.beginPath();
  ctx.moveTo(cx + r * 0.35, cy - r * 0.28);
  ctx.lineTo(cx + r * 0.18, cy - r * 0.15);
  ctx.lineTo(cx + r * 0.35, cy - r * 0.02);
  ctx.stroke();

  // w 입
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.18, cy + r * 0.3);
  ctx.quadraticCurveTo(cx - r * 0.09, cy + r * 0.42, cx, cy + r * 0.3);
  ctx.quadraticCurveTo(cx + r * 0.09, cy + r * 0.42, cx + r * 0.18, cy + r * 0.3);
  ctx.stroke();

  // 반짝이 별 (주위 회전)
  const sparkleTime = Date.now() / 400;
  for (let i = 0; i < 4; i++) {
    const angle = sparkleTime + (Math.PI * 2 * i) / 4;
    const sr = r * 1.15;
    const sx = cx + Math.cos(angle) * sr;
    const sy = cy + Math.sin(angle) * sr * 0.8;
    const sz = r * 0.08 * (0.7 + 0.3 * Math.sin(sparkleTime * 2 + i));
    drawStar5(sx, sy, sz, colors.stripe1, false);
  }
}

// ============================================================
// 이펙트 렌더링
// ============================================================
function renderHitFlashes() {
  for (const f of hitFlashes) {
    ctx.globalAlpha = f.alpha;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = f.lineWidth;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function renderParticles() {
  for (const p of particles) {
    const alpha = clamp(p.life, 0, 1);
    const sz = p.size * clamp(p.life, 0.3, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;

    if (p.shape === "star") {
      drawParticleStar(p.x, p.y, sz, p.rotation);
    } else if (p.shape === "cross") {
      drawParticleCross(p.x, p.y, sz, p.rotation);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawParticleStar(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const outerAngle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const innerAngle = outerAngle + Math.PI / 5;
    const ox = Math.cos(outerAngle) * r;
    const oy = Math.sin(outerAngle) * r;
    const ix = Math.cos(innerAngle) * r * 0.4;
    const iy = Math.sin(innerAngle) * r * 0.4;
    if (i === 0) ctx.moveTo(ox, oy);
    else ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawParticleCross(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  const w = r * 0.35;
  ctx.strokeStyle = ctx.fillStyle;
  ctx.lineWidth = w;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r, -r);
  ctx.lineTo(r, r);
  ctx.moveTo(r, -r);
  ctx.lineTo(-r, r);
  ctx.stroke();
  ctx.restore();
}

function renderFloatingTexts() {
  const now = Date.now() / 1000;
  for (const ft of floatingTexts) {
    const alpha = clamp(ft.life, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // 등장 시 Scale 0→1.3→1.0 바운스 팝인 (처음 25% 구간)
    const age = 1 - ft.life; // 0→1
    let dynamicScale = ft.scale;
    if (age < 0.25) {
      const t = age / 0.25;
      dynamicScale *= t < 0.6 ? lerp(0, 1.3, easeOutBack(t / 0.6)) : lerp(1.3, 1.0, (t - 0.6) / 0.4);
    }

    // 타이밍 E-3: 폰트 2배
    const isE3 = ft.key === "timingE3";
    const baseFontSize = isE3 ? s(40) : s(20);
    const fontSize = baseFontSize * dynamicScale;
    ctx.font = `bold ${fontSize}px ${FONT.number}`;

    // 타이밍 E-3: 글로우 효과
    if (isE3) {
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = s(12) * alpha;
    }

    // 외곽선 (가독성)
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineWidth = isE3 ? s(4) : s(3);
    ctx.strokeText(ft.text, ft.x, ft.y);

    // 색상 결정
    if (ft.key === "feverTap") {
      // Fever: 무지개 색상 순환
      const hue = ((now - ft.spawnTime) * 360 + age * 720) % 360;
      ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
    } else if (isE3) {
      // E-3: 금색 그라데이션
      const grad = ctx.createLinearGradient(ft.x - s(40), ft.y, ft.x + s(40), ft.y);
      grad.addColorStop(0, "#FFF8E1");
      grad.addColorStop(0.3, "#FFD700");
      grad.addColorStop(0.7, "#FF6F00");
      grad.addColorStop(1, "#FFF8E1");
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = ft.color;
    }
    ctx.fillText(ft.text, ft.x, ft.y);

    // 글로우 초기화
    if (isE3) {
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;
}

function renderRipples() {
  for (const r of ripples) {
    if (r.delay && r.delay > 0) continue;
    const alpha = clamp(r.life, 0, 1);
    ctx.globalAlpha = alpha * 0.6;
    ctx.beginPath();
    ctx.arc(r.x, r.y, Math.max(0, r.radius), 0, Math.PI * 2);
    ctx.strokeStyle = THEME.mintLight;
    ctx.lineWidth = (r.lineWidth || s(2)) * alpha;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ---- Timeup 화면 ----
function renderTimeup() {
  // 그리드 배경 유지 (타겟 없음)
  renderGrid();

  // 크림 오버레이
  ctx.fillStyle = "rgba(255, 248, 240, 0.8)";
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  const cx = canvasWidth / 2;
  const cy = canvasHeight / 2;

  // 캐릭터 (향후 별도 이미지 삽입 예정)
  if (ASSETS.timeup.image) {
    const img = getImage(ASSETS.timeup.image);
    if (img) {
      const aspect = img.naturalWidth / img.naturalHeight;
      const drawH = s(100);
      const drawW = drawH * aspect;
      ctx.drawImage(img, cx - drawW / 2, cy - drawH / 2 + s(10), drawW, drawH);
    }
  }

  // "Time Up!" 텍스트
  const progress = 1 - timeupTimer / CONFIG.timeupDisplayDuration; // 0→1
  const textScale = progress < 0.2 ? easeOutBack(progress / 0.2) : 1;
  const fontSize = s(48) * textScale;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.font = `bold ${fontSize}px ${FONT.text}`;

  ctx.strokeStyle = "rgba(255, 138, 128, 0.3)";
  ctx.lineWidth = s(5);
  ctx.strokeText("Time Up!", cx, cy);

  ctx.fillStyle = THEME.coral;
  ctx.fillText("Time Up!", cx, cy);
}

function drawTimeupCharacter(cx, cy) {
  const colors = ASSETS.timeup.colors;
  const r = s(50); // 몸체 반지름

  ctx.save();
  ctx.translate(cx, cy);

  // 몸체 (둥근 원)
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = colors.body;
  ctx.fill();

  // 볼터치
  ctx.beginPath();
  ctx.arc(-r * 0.5, r * 0.15, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 138, 128, 0.4)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.5, r * 0.15, r * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // 큰 눈 (흰자 + 동자) — 울상으로 위를 봄
  // 왼쪽 눈
  ctx.beginPath();
  ctx.arc(-r * 0.25, -r * 0.15, r * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-r * 0.25, -r * 0.22, r * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = colors.face;
  ctx.fill();
  // 하이라이트
  ctx.beginPath();
  ctx.arc(-r * 0.3, -r * 0.28, r * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();

  // 오른쪽 눈
  ctx.beginPath();
  ctx.arc(r * 0.25, -r * 0.15, r * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.25, -r * 0.22, r * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = colors.face;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.2, -r * 0.28, r * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();

  // 처진 눈썹 (슬픈)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2.5);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r * 0.42, -r * 0.4);
  ctx.lineTo(-r * 0.12, -r * 0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(r * 0.42, -r * 0.4);
  ctx.lineTo(r * 0.12, -r * 0.35);
  ctx.stroke();

  // 눈물
  const tearDrop = (tx, ty) => {
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.quadraticCurveTo(tx - r * 0.06, ty + r * 0.15, tx, ty + r * 0.2);
    ctx.quadraticCurveTo(tx + r * 0.06, ty + r * 0.15, tx, ty);
    ctx.fillStyle = colors.tear;
    ctx.fill();
  };
  // 흘러내리는 위치를 시간에 따라 살짝 변화
  const tearOffset = Math.sin(Date.now() / 300) * r * 0.05;
  tearDrop(-r * 0.45, -r * 0.0 + tearOffset);
  tearDrop(r * 0.45, r * 0.02 - tearOffset);

  // 입 (ㅠ 모양 — 울상)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.beginPath();
  ctx.arc(0, r * 0.35, r * 0.15, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  ctx.restore();
}

// ---- Result 화면 ----
function renderResult() {
  const cx = canvasWidth / 2;
  const now = Date.now() / 1000;
  let totalStars = 0;
  if (score >= CONFIG.star3Threshold) totalStars = 3;
  else if (score >= CONFIG.star2Threshold) totalStars = 2;
  else if (score >= CONFIG.star1Threshold) totalStars = 1;

  // B-4: 배경: 연한 민트
  ctx.fillStyle = THEME.bgSecondary;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  // B-4: 배경 부유 반짝임 (천천히 올라가는 금/민트 반짝임)
  const sparkleBase = totalStars >= 3 && resultStarsRevealed >= 3 ? 30 : 10;
  for (let i = 0; i < sparkleBase; i++) {
    const sx = ((now * 0.015 + i * 0.083) % 1.0) * canvasWidth;
    // 아래→위로 천천히 올라감
    const sy = (1.0 - ((now * 0.025 * (0.3 + i * 0.07) + i * 0.09) % 1.0)) * canvasHeight;
    const sa = 0.12 + 0.08 * Math.sin(now * 2.5 + i * 1.5);
    ctx.globalAlpha = sa;
    ctx.fillStyle = i % 3 === 0 ? THEME.gold : (i % 3 === 1 ? "#C0C0C0" : THEME.mintLight);
    ctx.beginPath();
    ctx.arc(sx, sy, s(1.5 + Math.sin(now + i) * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // B-4: 별 파티클 렌더링
  for (const p of resultStarParticles) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    // 작은 별 모양
    const sz = s(p.size) * alpha;
    drawStar5(0, 0, sz, p.color, true);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 결과 타이틀
  const titleY = canvasHeight * 0.13;
  const titleSize = s(32);
  ctx.fillStyle = "rgba(91, 168, 156, 0.15)";
  ctx.font = `bold ${titleSize}px ${FONT.text}`;
  ctx.fillText("Result", cx + s(2), titleY + s(3));
  ctx.strokeStyle = "rgba(91, 168, 156, 0.3)";
  ctx.lineWidth = s(3);
  ctx.strokeText("Result", cx, titleY);
  const titleGrad = ctx.createLinearGradient(cx - s(60), titleY - s(16), cx + s(60), titleY + s(16));
  titleGrad.addColorStop(0, THEME.mintDark);
  titleGrad.addColorStop(0.5, THEME.mint);
  titleGrad.addColorStop(1, THEME.mintDark);
  ctx.fillStyle = titleGrad;
  ctx.fillText("Result", cx, titleY);

  // "SCORE" 라벨
  ctx.fillStyle = THEME.textSecondary;
  ctx.font = `bold ${s(14)}px ${FONT.text}`;
  ctx.fillText("SCORE", cx, canvasHeight * 0.22);

  // B-2: 점수 카운트업 (스케일 바운스 + 구간별 색상 변화)
  const baseFontSize = s(56);
  let scoreScale = 1.0;
  if (resultPhase === "countup") {
    // 카운트 중 미세 바운스 (1.0 ↔ 1.05)
    scoreScale = 1.0 + 0.05 * Math.abs(Math.sin(resultTimer * 8));
  } else if (resultScorePopTimer > 0) {
    // 카운트 완료 시 팽창 (1.0 → 1.3 → 1.0)
    const popP = resultScorePopTimer / 0.3;
    scoreScale = 1.0 + 0.3 * Math.sin(popP * Math.PI);
  }
  const scoreSize = baseFontSize * scoreScale;
  ctx.font = `bold ${scoreSize}px ${FONT.number}`;
  const scoreY = canvasHeight * 0.31;

  ctx.fillStyle = "rgba(74, 74, 74, 0.1)";
  ctx.fillText(resultCountScore.toLocaleString(), cx + s(2), scoreY + s(3));

  // B-2: 구간별 색상 변화
  const scoreVal = resultCountScore;
  let scoreColor = THEME.textPrimary;
  if (scoreVal >= CONFIG.star3Threshold) scoreColor = THEME.gold;
  else if (scoreVal >= CONFIG.star2Threshold) scoreColor = "#E8C840";
  else if (scoreVal >= CONFIG.star1Threshold) scoreColor = THEME.mint;
  ctx.fillStyle = scoreColor;
  ctx.fillText(resultCountScore.toLocaleString(), cx, scoreY);

  ctx.globalAlpha = 0.12 + 0.08 * Math.sin(now * 3);
  ctx.fillStyle = "#FFFFFF";
  ctx.fillText(resultCountScore.toLocaleString(), cx, scoreY - s(1));
  ctx.globalAlpha = 1;

  // B-1: 별 등급 (순차 등장 + 바운스 + 회전 + 파티클)
  const starY = canvasHeight * 0.45;
  const starSpacing = s(60);
  const starBaseSize = s(24);

  for (let i = 0; i < 3; i++) {
    const starX = cx + (i - 1) * starSpacing;
    const earned = i < resultStarsRevealed;
    const animT = resultStarAnimTimers[i];

    if (!earned && resultPhase !== "done") {
      // 미획득 + 아직 진행 중: 작은 빈 별
      const sz = starBaseSize * 0.8;
      drawStar5(starX, starY, sz, false, i);
      continue;
    }

    if (!earned) {
      // done 상태에서 미획득 별
      drawStar5(starX, starY, starBaseSize * 0.8, false, i);
      continue;
    }

    // B-1: 바운스 스케일 (0 → 1.5 → 1.0)
    let starScale = 1;
    if (animT > 0 && animT < 1) {
      const t = animT;
      if (t < 0.4) {
        starScale = lerp(0, 1.5, easeOutBack(t / 0.4));
      } else {
        starScale = lerp(1.5, 1.0, (t - 0.4) / 0.6);
      }
    }

    const sz = starBaseSize * starScale;
    const rotation = resultStarRotations[i];

    // 획득한 별: 글로우
    const glowAlpha = 0.15 + 0.08 * Math.sin(now * 3 + i * 1.2);
    ctx.globalAlpha = glowAlpha * (animT > 0 ? Math.min(animT * 3, 1) : 1);
    ctx.fillStyle = THEME.gold;
    ctx.beginPath();
    ctx.arc(starX, starY, sz * 1.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // B-1: 회전 적용하여 별 렌더링
    ctx.save();
    ctx.translate(starX, starY);
    ctx.rotate(rotation);
    drawStar5(0, 0, sz, true, i);
    ctx.restore();

    // 획득한 별 위 반짝임
    if (animT >= 1 || resultPhase === "done") {
      for (let sp = 0; sp < 2; sp++) {
        const angle = now * 2.5 + i * 2.1 + sp * Math.PI;
        const dist = sz * (0.6 + 0.3 * Math.sin(now * 1.8 + sp * 3));
        const spX = starX + Math.cos(angle) * dist;
        const spY = starY + Math.sin(angle) * dist;
        const spAlpha = 0.4 + 0.3 * Math.sin(now * 4 + i + sp * 2);
        ctx.globalAlpha = spAlpha;
        ctx.fillStyle = THEME.gold;
        ctx.beginPath();
        ctx.arc(spX, spY, s(1.5), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  // 등급 텍스트
  if (resultPhase === "done" || (resultPhase === "stars" && resultStarsRevealed >= totalStars)) {
    const gradeTexts = ["Try Again!", "Good!", "Great!", "Perfect!"];
    const gradeY = canvasHeight * 0.55;
    const gradeFontSize = s(24);
    ctx.font = `bold ${gradeFontSize}px ${FONT.text}`;
    ctx.fillStyle = "rgba(74, 74, 74, 0.15)";
    ctx.fillText(gradeTexts[totalStars], cx + s(1), gradeY + s(2));

    if (totalStars === 0) {
      ctx.fillStyle = THEME.textSecondary;
    } else if (totalStars === 1) {
      ctx.fillStyle = THEME.mint;
    } else if (totalStars === 2) {
      ctx.fillStyle = THEME.mintDark;
    } else {
      const gGrad = ctx.createLinearGradient(cx - s(50), gradeY - s(12), cx + s(50), gradeY + s(12));
      gGrad.addColorStop(0, "#FFF8E1");
      gGrad.addColorStop(0.3, THEME.gold);
      gGrad.addColorStop(0.7, "#FFC107");
      gGrad.addColorStop(1, "#FFF8E1");
      ctx.fillStyle = gGrad;
    }
    ctx.fillText(gradeTexts[totalStars], cx, gradeY);
  }

  // B-3: 버튼 (슬라이드업 등장 + 미세 맥박)
  if (resultPhase === "done" && resultButtonTimer > 0) {
    const btnW = s(150);
    const btnH = s(50);
    const gap = s(12);
    const totalW = btnW * 2 + gap;
    const startX = cx - totalW / 2;
    const baseBtnY = canvasHeight * 0.78;

    // B-3: 슬라이드업 (0.3초 동안 아래에서 올라옴)
    const slideProgress = clamp(resultButtonTimer / 0.3, 0, 1);
    const slideEased = easeOutBack(slideProgress);
    const slideOffset = (1 - slideEased) * s(40);
    const btnY = baseBtnY + slideOffset;

    // B-3: 미세 맥박 (1.0 ↔ 1.02)
    const pulse = slideProgress >= 1 ? 1 + 0.02 * Math.sin(now * Math.PI * 2) : 1;

    ctx.save();
    ctx.translate(cx, btnY + btnH / 2);
    ctx.scale(pulse, pulse);
    ctx.translate(-cx, -(btnY + btnH / 2));

    ctx.globalAlpha = slideEased;
    drawGameButton(startX, btnY, btnW, btnH, "Retry", "primary", "result_retry");
    drawGameButton(startX + btnW + gap, btnY, btnW, btnH, "Title", "secondary", "result_title");
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // 3성 화면 플래시
  if (result3StarFlash > 0) {
    const flashAlpha = 0.3 * (result3StarFlash / 0.15);
    ctx.fillStyle = `rgba(255, 215, 0, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  }
}

// ---- Ranking 화면 ----
function getStarCount(sc) {
  if (sc >= CONFIG.star3Threshold) return 3;
  if (sc >= CONFIG.star2Threshold) return 2;
  if (sc >= CONFIG.star1Threshold) return 1;
  return 0;
}

function renderRanking() {
  const cx = canvasWidth / 2;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 타이틀
  ctx.fillStyle = THEME.mintDark;
  ctx.font = `bold ${s(30)}px ${FONT.text}`;
  ctx.fillText("Score", cx, canvasHeight * 0.08);

  // 구분선
  ctx.strokeStyle = THEME.gridLine;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - s(100), canvasHeight * 0.12);
  ctx.lineTo(cx + s(100), canvasHeight * 0.12);
  ctx.stroke();

  const scores = loadScores();
  const listStartY = canvasHeight * 0.17;
  const rowH = canvasHeight * 0.063;

  for (let i = 0; i < MAX_SCORES; i++) {
    const y = listStartY + i * rowH;
    const entry = scores[i];

    // 순위 번호
    const rankColors = [THEME.gold, "#B8B8B8", "#CD9B6A"];
    ctx.fillStyle = i < 3 ? rankColors[i] : THEME.textSecondary;
    ctx.font = `bold ${s(16)}px ${FONT.text}`;
    ctx.textAlign = "left";
    ctx.fillText(`${i + 1}.`, cx - s(110), y);

    if (entry) {
      // 점수
      ctx.fillStyle = i < 3 ? THEME.textPrimary : THEME.textSecondary;
      ctx.font = `bold ${s(18)}px ${FONT.number}`;
      ctx.textAlign = "right";
      ctx.fillText(entry.score.toLocaleString(), cx + s(30), y);

      // 별 표시
      const stars = getStarCount(entry.score);
      const starSize = s(8);
      for (let j = 0; j < 3; j++) {
        const sx = cx + s(50) + j * s(18);
        const starColor = j < stars ? THEME.gold : "rgba(200, 190, 170, 0.25)";
        drawStar5(sx, y, starSize, starColor, j < stars);
      }
    } else {
      ctx.fillStyle = "rgba(200, 190, 170, 0.3)";
      ctx.font = `${s(16)}px ${FONT.text}`;
      ctx.textAlign = "right";
      ctx.fillText("---", cx + s(30), y);
    }
  }

  // 돌아가기 버튼
  const btnW = s(160);
  const btnH = s(46);
  const btnX = cx - btnW / 2;
  const btnY = canvasHeight * 0.85;
  drawGameButton(btnX, btnY, btnW, btnH, "Back", "secondary", "ranking_back");
}

function drawStar5(cx, cy, size, colorOrEarned, filledOrIndex) {
  const points = 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI * 2 * i) / (points * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? size : size * 0.45;
    const px = cx + Math.cos(angle) * r;
    const py = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();

  // 문자열이면 단순 색상 채우기 (레거시 호출)
  if (typeof colorOrEarned === "string") {
    ctx.fillStyle = colorOrEarned;
    ctx.fill();
    if (filledOrIndex) {
      ctx.fillStyle = "rgba(255,255,255,0.2)";
      ctx.beginPath();
      ctx.arc(cx - size * 0.15, cy - size * 0.15, size * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
    return;
  }

  // boolean이면 금색 그라데이션 별 (결과 화면)
  if (colorOrEarned) {
    // 금색 그라데이션 채우기
    const grad = ctx.createLinearGradient(cx - size, cy - size, cx + size, cy + size);
    grad.addColorStop(0, "#FFF8E1");
    grad.addColorStop(0.25, "#FFD700");
    grad.addColorStop(0.5, "#FFECB3");
    grad.addColorStop(0.75, "#FFC107");
    grad.addColorStop(1, "#FFF8E1");
    ctx.fillStyle = grad;
    ctx.fill();
    // 테두리
    ctx.strokeStyle = "rgba(180, 120, 0, 0.4)";
    ctx.lineWidth = s(1.5);
    ctx.stroke();
    // 상단 광택 (볼록 느낌)
    ctx.save();
    ctx.clip();
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath();
    ctx.ellipse(cx, cy - size * 0.25, size * 0.5, size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    // 미획득: 연한 크림톤 빈 별
    ctx.fillStyle = "rgba(232, 224, 216, 0.3)";
    ctx.fill();
    ctx.strokeStyle = "rgba(200, 190, 170, 0.4)";
    ctx.lineWidth = s(1);
    ctx.stroke();
  }
}

// ============================================================
// 유틸: 둥근 사각형
// ============================================================
function roundRect(ctx, x, y, width, height, radius) {
  if (width <= 0 || height <= 0) return;
  radius = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.arcTo(x + width, y, x + width, y + radius, radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
  ctx.lineTo(x + radius, y + height);
  ctx.arcTo(x, y + height, x, y + height - radius, radius);
  ctx.lineTo(x, y + radius);
  ctx.arcTo(x, y, x + radius, y, radius);
  ctx.closePath();
}

// ============================================================
// 메인 루프
// ============================================================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 최대 50ms 프레임
  lastTime = timestamp;

  update(dt);
  updateCountdown(dt);
  updateTimeup(dt);
  updateResult(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// 초기화
resizeCanvas();
requestAnimationFrame((timestamp) => {
  lastTime = timestamp;
  gameLoop(timestamp);
});
</script>
