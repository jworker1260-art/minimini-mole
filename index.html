const loadedImages = {}; // "경로" → Image 객체 (로드 완료 시)

function preloadImages() {
  // ASSETS.targets의 모든 이미지 경로 수집
  for (const typeKey of Object.keys(ASSETS.targets)) {
    const imgs = ASSETS.targets[typeKey].images;

    img.onload = () => { loadedImages[ASSETS.pinata.image] = img; };
    img.onerror = () => { loadedImages[ASSETS.pinata.image] = null; };
  }
}

const canvas = document.getElementById("gameCanvas");

let canvasWidth, canvasHeight;
let scaleRatio = 1;

// 기준 해상도 (9:16 모바일 세로)
const BASE_WIDTH = 390;
const BASE_HEIGHT = 693;

function resizeCanvas() {
  const windowW = window.innerWidth;
  const windowH = window.innerHeight;
  const targetRatio = 9 / 16;
  const windowRatio = windowW / windowH;

  if (windowRatio < targetRatio) {
    canvasWidth = windowW;
    canvasHeight = windowW / targetRatio;
  } else {
    canvasHeight = windowH;
    canvasWidth = windowH * targetRatio;
  }

  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
  canvas.style.width = canvasWidth + "px";
  canvas.style.height = canvasHeight + "px";

  scaleRatio = canvasWidth / BASE_WIDTH;

  computeGridLayout();
}

window.addEventListener("resize", resizeCanvas);

// ============================================================
// 그리드 레이아웃 계산
// ============================================================
let gridLayout = {
  offsetX: 0,
  offsetY: 0,
  cellSize: 0,
  gap: 0,
  totalWidth: 0,
  totalHeight: 0,
  cells: [], // [{row, col, x, y, centerX, centerY}]
};

function computeGridLayout() {
  const rows = CONFIG.gridRows;
  const cols = CONFIG.gridCols;
  const padding = 20 * scaleRatio;
  const gap = 8 * scaleRatio;

  const availableWidth = canvasWidth - padding * 2;
  const cellSize = (availableWidth - gap * (cols - 1)) / cols;
  const totalWidth = cellSize * cols + gap * (cols - 1);
  const totalHeight = cellSize * rows + gap * (rows - 1);

  // 그리드를 화면 중앙~약간 위에 배치 (하단 20% 여백)
  const topArea = canvasHeight * 0.15; // 상단 UI 영역
  const bottomMargin = canvasHeight * 0.20;
  const availableGridHeight = canvasHeight - topArea - bottomMargin;
  const offsetX = (canvasWidth - totalWidth) / 2;
  const offsetY = topArea + (availableGridHeight - totalHeight) / 2;

  gridLayout.offsetX = offsetX;
  gridLayout.offsetY = offsetY;
  gridLayout.cellSize = cellSize;
  gridLayout.gap = gap;
  gridLayout.totalWidth = totalWidth;
  gridLayout.totalHeight = totalHeight;

  gridLayout.cells = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = offsetX + c * (cellSize + gap);
      const y = offsetY + r * (cellSize + gap);
      gridLayout.cells.push({
        row: r,
        col: c,
        x: x,
        y: y,
        centerX: x + cellSize / 2,
        centerY: y + cellSize / 2,
      });
    }
  }
}

// ============================================================
// 유틸리티 함수
// ============================================================
function lerp(a, b, t) {
  return a + (b - a) * t;
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function randomRange(min, max) {
  return Math.random() * (max - min) + min;
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeOutQuad(t) {
  return 1 - (1 - t) * (1 - t);
}

function hexToRgb(hex) {
  const v = parseInt(hex.slice(1), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}

function lerpColor(hex1, hex2, t) {
  const [r1, g1, b1] = hexToRgb(hex1);
  const [r2, g2, b2] = hexToRgb(hex2);
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

function getPlayingBgColor(elapsed) {
  const stops = CONFIG.bgCycleColors;
  if (elapsed <= stops[0].time) return stops[0].color;
  for (let i = 1; i < stops.length; i++) {
    if (elapsed <= stops[i].time) {
      const t = (elapsed - stops[i - 1].time) / (stops[i].time - stops[i - 1].time);
      return lerpColor(stops[i - 1].color, stops[i].color, t);
    }
  }
  return stops[stops.length - 1].color;
}

function s(val) {
  return val * scaleRatio;
}

// ============================================================
// UI 유틸리티 함수
// ============================================================
function drawRoundedRect(x, y, w, h, r) {
  const cr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + cr, y);
  ctx.lineTo(x + w - cr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + cr);
  ctx.lineTo(x + w, y + h - cr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - cr, y + h);
  ctx.lineTo(x + cr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - cr);
  ctx.lineTo(x, y + cr);
  ctx.quadraticCurveTo(x, y, x + cr, y);
  ctx.closePath();
}

function drawPanel(x, y, w, h, opts = {}) {
  const cr = opts.cornerRadius ?? s(CONFIG.uiCornerRadius);
  const fill = opts.fillColor ?? `rgba(255,255,255,${CONFIG.uiPanelAlpha})`;
  const shadow = opts.shadow !== false;
  ctx.save();
  if (shadow) {
    ctx.shadowColor = opts.shadowColor ?? CONFIG.uiShadowColor;
    ctx.shadowBlur = opts.shadowBlur ?? s(CONFIG.uiShadowBlur);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = opts.shadowOffsetY ?? s(CONFIG.uiShadowOffsetY);
  }
  drawRoundedRect(x, y, w, h, cr);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.shadowColor = 'transparent';
  // 테두리
  if (opts.border !== false) {
    ctx.strokeStyle = opts.borderColor ?? 'rgba(255,255,255,0.5)';
    ctx.lineWidth = opts.borderWidth ?? 1;
    ctx.stroke();
  }
  ctx.restore();
}

function drawPillButton(x, y, w, h, text, opts = {}) {
  const cr = h / 2;
  const fill = opts.fillColor ?? THEME.buttonPrimary;
  const textColor = opts.textColor ?? THEME.textLight;
  const fontSize = opts.fontSize ?? s(18);
  const fontFace = opts.fontFace ?? FONT.text;
  ctx.save();
  // 그림자
  ctx.shadowColor = CONFIG.uiShadowColor;
  ctx.shadowBlur = s(CONFIG.uiButtonShadowBlur);
  ctx.shadowOffsetX = 0;
  ctx.shadowOffsetY = s(2);
  drawRoundedRect(x, y, w, h, cr);
  if (opts.outline) {
    ctx.strokeStyle = fill;
    ctx.lineWidth = s(2);
    ctx.stroke();
    ctx.shadowColor = 'transparent';
  } else {
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    // 상단 하이라이트
    if (opts.highlight !== false) {
      ctx.save();
      ctx.clip();
      drawRoundedRect(x, y, w, h * 0.45, cr);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fill();
      ctx.restore();
    }
  }
  // 텍스트
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = opts.outline ? (opts.textColor ?? fill) : textColor;
  ctx.font = `bold ${fontSize}px ${fontFace}`;
  ctx.fillText(text, x + w / 2, y + h / 2);
  ctx.restore();
}

// BGM 타입 → ASSETS.sounds 키 매핑
const BGM_KEY_MAP = {
  normal: "bgmNormal",
  fever: "bgmFever",
  title: "bgmTitle",
};

const MAX_SFX_POOL = 8; // 동시 재생 최대 수
let sfxPool = []; // { audio, key, startTime }
let preloadedAudio = {}; // key → Audio 원본 (프리로드용)

// BGM 파일 재생 상태
let bgmAudio = null;       // 현재 재생 중인 BGM Audio 엘리먼트
let bgmAudioKey = null;    // 현재 BGM 키
let bgmFadeInterval = null; // 크로스페이드 인터벌

let sfxVolume = CONFIG.sfxVolume;
let bgmVolume = CONFIG.bgmVolume;

let audioInitialized = false;
function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
  preloadAllAudio();
  // 첫 터치 시 타이틀/결과/랭킹 화면이면 타이틀 BGM 시작
  if (!audioInitialized) {
    audioInitialized = true;
    if (gameState === "title" || gameState === "result" || gameState === "ranking") {
      setTimeout(() => startBGM("title"), 100);
    }
  }
}

// 프리로드: ASSETS.sounds에 경로가 있는 모든 파일을 미리 로드
function preloadAllAudio() {
  for (const [key, path] of Object.entries(ASSETS.sounds)) {
    if (path && !preloadedAudio[key]) {
      const audio = new Audio(path);
      audio.preload = "auto";
      audio.load();
      audio.addEventListener("error", () => {
        // 로딩 실패 시 null로 설정 → OscillatorNode 폴백
        preloadedAudio[key] = null;
        ASSETS.sounds[key] = null;
      });
      preloadedAudio[key] = audio;
    }
  }
}

// SFX 재생: 파일이 있으면 Audio, 없으면 OscillatorNode 폴백
function triggerHaptic(pattern) {
  if (CONFIG.hapticEnabled && navigator.vibrate) {
    navigator.vibrate(pattern);
  }
}

function getComboPitch() {
  if (!CONFIG.comboPitchEnabled) return 1.0;
  return Math.min(1.0 + comboCount * CONFIG.comboPitchStep, CONFIG.comboPitchMax);
}

function playSound(soundKey) {
  const assetKey = SFX_KEY_MAP[soundKey];
  const filePath = assetKey ? ASSETS.sounds[assetKey] : null;

  if (filePath && preloadedAudio[assetKey]) {
    playSFXFile(assetKey);
  } else {
    playSFXOscillator(soundKey);
  }
}

// 파일 기반 SFX 재생 (풀링)
function playSFXFile(assetKey) {
  // 풀에서 만료된 항목 정리
  const now = Date.now();
  sfxPool = sfxPool.filter(item => !item.audio.ended && (now - item.startTime) < 5000);

  // 풀 한도 초과 시 가장 오래된 것 제거
  if (sfxPool.length >= MAX_SFX_POOL) {
    const oldest = sfxPool.shift();
    oldest.audio.pause();
    oldest.audio.currentTime = 0;
  }

  // Audio 복제하여 재생 (연타 시 겹침 허용)
  const source = preloadedAudio[assetKey];
  if (!source) return;
  const clone = source.cloneNode();
  clone.volume = sfxVolume;
  clone.playbackRate = getComboPitch();
  clone.play().catch(() => {});
  sfxPool.push({ audio: clone, key: assetKey, startTime: now });
}

// OscillatorNode 기반 SFX 재생 (기존 폴백)
function playSFXOscillator(soundKey) {
  if (!audioCtx) return;
  const def = SOUNDS[soundKey];
  if (!def || !def.notes) return;

  const now = audioCtx.currentTime;
  const pitch = getComboPitch();
  for (const note of def.notes) {
    const startTime = now + (note.delay || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = note.type || "sine";
    osc.frequency.setValueAtTime(note.freq * pitch, startTime);
    if (note.end) {
      osc.frequency.exponentialRampToValueAtTime(note.end * pitch, startTime + note.duration);
    }
    const vol = (note.vol || 0.15) * sfxVolume;
    gain.gain.setValueAtTime(vol, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + note.duration);
    osc.start(startTime);
    osc.stop(startTime + note.duration + 0.01);
  }
}

// 마일스톤 트리거
function triggerMilestone(combo) {
  const m = combo;
  milestoneNumber = m;
  milestonePhase = 'popin';
  milestonePopinTimer = 0;
  milestoneAlpha = 1.0;
  milestoneScale = 0;
  milestoneTimer = 3.0;

  // 파티클 폭발 (화면 중앙)
  const cx = canvasWidth / 2;
  const cy = canvasHeight * 0.16;
  const count = m >= 50 ? 28 : 14;
  const colors = m >= 50 ? [THEME.mint, THEME.gold, THEME.coral, THEME.peach]
               : m >= 30 ? [THEME.coral, THEME.peach]
               : m >= 20 ? [THEME.gold, '#FFE082']
               : [THEME.mint, THEME.mintLight];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + randomRange(-0.2, 0.2);
    const speed = randomRange(2, 5) * scaleRatio * 60;
    const sz = (m >= 50 ? 1.5 : 1.0) * randomRange(4, 8) * scaleRatio;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 1 / 0.5,
      size: sz,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: Math.random() < 0.3 ? "star" : "circle",
      gravity: 80,
      rotation: Math.random() * Math.PI * 2,
      spinSpeed: randomRange(-3, 3),
    });
  }

  // 배경 펄스 강화
  bgHitPulse = CONFIG.bgHitPulseDuration * 1.5;

  // 사운드
  if (audioCtx) {
    const now = audioCtx.currentTime;
    const vol = sfxVolume * (m >= 50 ? 1.2 : 1.0);
    const notes = m >= 50 ? [[1047,0.25],[1319,0.25],[1568,0.25],[2093,0.25],[2637,0.25]]
                : m >= 30 ? [[1047,0.18],[1319,0.18],[1568,0.18],[2637,0.18]]
                : m >= 20 ? [[1319,0.15],[1568,0.15],[2093,0.15]]
                : [[1047,0.12],[1319,0.12]];
    for (const [freq, dur] of notes) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.12 * vol, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.start(now);
      osc.stop(now + dur + 0.01);
    }
  }

  // 햅틱
  const hapticKey = `hapticMilestone${m <= 10 ? 10 : m <= 20 ? 20 : m <= 30 ? 30 : 50}`;
  triggerHaptic(CONFIG[hapticKey]);
}

// OscillatorNode BGM 상태 (폴백용)
let bgmState = {
  playing: false,
  currentType: null, // "normal" | "fever"
  scheduledUntil: 0,
  gainNode: null,
  intervalId: null,
};

function startBGM(type) {
  const assetKey = BGM_KEY_MAP[type];
  const filePath = assetKey ? ASSETS.sounds[assetKey] : null;

  if (filePath) {
    startBGMFile(type, assetKey);
  } else {
    startBGMOscillator(type);
  }
}

// --- 파일 기반 BGM ---
function startBGMFile(type, assetKey) {
  stopBGM();

  const audio = preloadedAudio[assetKey];
  if (!audio) { startBGMOscillator(type); return; }

  bgmAudio = audio.cloneNode();
  bgmAudio.loop = true;
  bgmAudio.volume = bgmVolume;
  bgmAudioKey = type;
  bgmAudio.play().catch(() => {});

  bgmState.playing = true;
  bgmState.currentType = type;
}

// --- OscillatorNode BGM (폴백) ---
function startBGMOscillator(type) {
  if (!audioCtx) return;
  stopBGMOscillator();

  const masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(bgmVolume, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);

  bgmState.playing = true;
  bgmState.currentType = type;
  bgmState.gainNode = masterGain;
  bgmState.scheduledUntil = audioCtx.currentTime;

  scheduleBGMChunk();
  bgmState.intervalId = setInterval(scheduleBGMChunk, 500);
}

function scheduleBGMChunk() {
  if (!bgmState.playing || !audioCtx) return;
  const def = BGM[bgmState.currentType];
  if (!def) return;

  const beatDur = 60 / def.bpm;
  const lookahead = 2.0;

  while (bgmState.scheduledUntil < audioCtx.currentTime + lookahead) {
    let t = bgmState.scheduledUntil;

    let melodyTime = t;
    for (const [freq, beats] of def.melody) {
      const dur = beats * beatDur;
      if (freq > 0) {
        scheduleNote(freq, melodyTime, dur * 0.85, def.melodyType, def.melodyVol);
      }
      melodyTime += dur;
    }

    let bassTime = t;
    for (const [freq, beats] of def.bass) {
      const dur = beats * beatDur;
      if (freq > 0) {
        scheduleNote(freq, bassTime, dur * 0.9, def.bassType, def.bassVol);
      }
      bassTime += dur;
    }

    let melodyLen = 0;
    for (const [, beats] of def.melody) melodyLen += beats * beatDur;
    bgmState.scheduledUntil += melodyLen;
  }
}

function scheduleNote(freq, startTime, duration, type, vol) {
  if (!bgmState.gainNode) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(bgmState.gainNode);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.setValueAtTime(vol, startTime + duration * 0.7);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.01);
}

// OscillatorNode BGM만 정지 (내부용)
function stopBGMOscillator() {
  if (bgmState.intervalId) {
    clearInterval(bgmState.intervalId);
    bgmState.intervalId = null;
  }
  if (bgmState.gainNode) {
    const oldGain = bgmState.gainNode;
    try {
      oldGain.gain.setValueAtTime(oldGain.gain.value, audioCtx.currentTime);
      oldGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    } catch(e) {}
    setTimeout(() => {
      try { oldGain.disconnect(); } catch(e) {}
    }, 200);
    bgmState.gainNode = null;
  }
  bgmState.scheduledUntil = 0;
}

// 파일 BGM만 정지 (내부용)
function stopBGMFile() {
  if (bgmFadeInterval) {
    clearInterval(bgmFadeInterval);
    bgmFadeInterval = null;
  }
  if (bgmAudio) {
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
    bgmAudio = null;
    bgmAudioKey = null;
  }
}

function stopBGM() {
  stopBGMOscillator();
  stopBGMFile();
  bgmState.playing = false;
  bgmState.currentType = null;
}

function switchBGM(type) {
  if (bgmState.currentType === type && bgmState.playing) return;

  const assetKey = BGM_KEY_MAP[type];
  const filePath = assetKey ? ASSETS.sounds[assetKey] : null;
  const oldAssetKey = bgmState.currentType ? BGM_KEY_MAP[bgmState.currentType] : null;
  const oldFilePath = oldAssetKey ? ASSETS.sounds[oldAssetKey] : null;

  // 파일→파일 전환: 크로스페이드
  if (filePath && oldFilePath && bgmAudio) {
    crossfadeBGM(type, assetKey, 0.3);
  } else {
    // 그 외: 즉시 전환
    startBGM(type);
  }
}

// BGM 크로스페이드 (파일 기반)
function crossfadeBGM(newType, newAssetKey, duration) {
  const oldAudio = bgmAudio;
  const source = preloadedAudio[newAssetKey];
  if (!source) { startBGM(newType); return; }

  const newAudio = source.cloneNode();
  newAudio.loop = true;
  newAudio.volume = 0;
  newAudio.play().catch(() => {});

  bgmAudio = newAudio;
  bgmAudioKey = newType;
  bgmState.currentType = newType;

  const steps = 15;
  const stepTime = (duration * 1000) / steps;
  let step = 0;

  if (bgmFadeInterval) clearInterval(bgmFadeInterval);
  bgmFadeInterval = setInterval(() => {
    step++;
    const t = step / steps;
    if (oldAudio) oldAudio.volume = Math.max(0, bgmVolume * (1 - t));
    newAudio.volume = bgmVolume * t;

    if (step >= steps) {
      clearInterval(bgmFadeInterval);
      bgmFadeInterval = null;
      if (oldAudio) {
        oldAudio.pause();
        oldAudio.currentTime = 0;
      }
      newAudio.volume = bgmVolume;
    }
  }, stepTime);
}

// 볼륨 제어
function setBGMVolume(vol) {
  bgmVolume = clamp(vol, 0, 1);
  if (bgmAudio) bgmAudio.volume = bgmVolume;
  if (bgmState.gainNode) {
    try { bgmState.gainNode.gain.setValueAtTime(bgmVolume, audioCtx.currentTime); } catch(e) {}
  }
}
function setSFXVolume(vol) { sfxVolume = clamp(vol, 0, 1); }

// 타겟 시스템
// ============================================================
function getOccupiedCells() {
  const occupied = new Set();
  for (const t of targets) {
    occupied.add(t.cellIndex);
  }
  return occupied;
}

function getAvailableCells() {
  const occupied = getOccupiedCells();
  const available = [];
  for (let i = 0; i < gridLayout.cells.length; i++) {
    if (!occupied.has(i)) {
      available.push(i);
    }
  }
  return available;
}

function getCurrentDifficultyPhase() {
  const elapsed = CONFIG.stageTimeLimit - timeRemaining;
  for (const phase of CONFIG.difficultyPhases) {
    if (elapsed >= phase.startTime && elapsed < phase.endTime) {
      return phase;
    }
  }
  return CONFIG.difficultyPhases[CONFIG.difficultyPhases.length - 1];
}

function chooseTargetType() {
  const elapsed = CONFIG.stageTimeLimit - timeRemaining;
  const trapOk = elapsed >= CONFIG.trapFirstAppearTime;
  const timingOk = elapsed >= CONFIG.timingFirstAppearTime;
  const slideOk = elapsed >= CONFIG.slideFirstAppearTime;

  // 아직 해금 안 된 타입의 비율을 기본 타겟에 합산
  let bRate = CONFIG.basicSpawnRate;
  let tRate = trapOk ? CONFIG.trapSpawnRate : 0;
  let mRate = timingOk ? CONFIG.timingSpawnRate : 0;
  let sRate = slideOk ? CONFIG.slideSpawnRate : 0;
  const total = bRate + tRate + mRate + sRate;

  const r = Math.random() * total;
  if (r < bRate) return "basic";
  if (r < bRate + tRate) return "trap";
  if (r < bRate + tRate + mRate) return timingOk ? "timing" : "basic";
  return slideOk ? "slide" : "basic";
}

function spawnTarget() {
  const available = getAvailableCells();
  if (available.length === 0) return;

  const phase = getCurrentDifficultyPhase();
  const activeCount = targets.filter(t => t.state !== "despawning").length;
  if (activeCount >= phase.maxSimultaneous) return;

  const cellIndex = available[Math.floor(Math.random() * available.length)];
  const type = isFever ? "fever" : chooseTargetType();

  const target = {
    type: type,
    cellIndex: cellIndex,
    state: "ready", // ready -> std -> pop/despawning
    stateTimer: 0,
    lifeTimer: 0,
    scale: 0,
    scaleX: 1,
    scaleY: 1,
    hitAlpha: 1,
    hitRotation: 0,
    maxDuration: type === "basic" ? CONFIG.basicTargetDuration
               : type === "trap" ? CONFIG.trapTargetDuration
               : type === "timing" ? CONFIG.timingIndicatorDuration
               : type === "slide" ? CONFIG.slideTargetDuration
               : CONFIG.basicTargetDuration,
    // 슬라이드 방향 (0=up, 1=right, 2=down, 3=left)
    slideDirection: type === "slide" ? Math.floor(Math.random() * 4) : -1,
    // 타이밍 인디케이터
    indicatorScale: 1.0,
    _stillMode: false,    // E-3 멈춤 모드
    _stillTimer: 0,       // 멈춤 잔여 시간
    _stillFlashed: false, // 멈춤 진입 반짝 1회
    // 바운스 (std 상태의 미세 움직임)
    bounceOffset: 0,
    bouncePhase: Math.random() * Math.PI * 2,
  };

  targets.push(target);
}

function removeTarget(index) {
  targets.splice(index, 1);
}

// ============================================================
const MAX_PARTICLES = 200;
function spawnParticles(x, y, type) {
  const def = ASSETS.particles[type];
  if (!def) return;
  // 파티클 풀 제한: 오래된 것부터 제거
  while (particles.length > MAX_PARTICLES - def.count) {
    particles.shift();
  }
  const sizeMin = def.sizeRange ? def.sizeRange[0] : 3;
  const sizeMax = def.sizeRange ? def.sizeRange[1] : 6;
  const spdMin = def.speedRange ? def.speedRange[0] : 80;
  const spdMax = def.speedRange ? def.speedRange[1] : 180;
  for (let i = 0; i < def.count; i++) {
    const angle = (Math.PI * 2 * i) / def.count + randomRange(-0.3, 0.3);
    const speed = randomRange(spdMin, spdMax) * scaleRatio;
    // 위쪽으로 더 많이 날아가도록 vy에 상향 바이어스
    const vyBias = -randomRange(60, 140) * scaleRatio;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed + vyBias,
      life: 1.0,
      decay: randomRange(2.0, 3.5),
      size: randomRange(sizeMin, sizeMax) * scaleRatio,
      color: def.colors[Math.floor(Math.random() * def.colors.length)],
      shape: def.shape === "mixed" ? (Math.random() < 0.5 ? "star" : "circle") : (def.shape || "circle"),
      gravity: def.gravity || 300,
      rotation: randomRange(0, Math.PI * 2),
      spinSpeed: def.spin ? randomRange(-8, 8) : 0,
    });
  }
}

function spawnJellyRing(cellIndex, targetType) {
  const cell = gridLayout.cells[cellIndex];
  const startR = gridLayout.cellSize * 0.38;
  const jc = getJellyColors(targetType);
  jellyRings.push({
    x: cell.centerX, y: cell.centerY,
    startRadius: startR,
    endRadius: startR * 1.5,
    radius: startR,
    startAlpha: 0.3,
    alpha: 0.3,
    color: jc.border,
    timer: 0,
    duration: 0.2,
  });
  // 히트 후 빈 칸 젤리 복귀 바운스
  jellyCellBounce[cellIndex] = { timer: 0, duration: 0.3 };
}

// ============================================================
// 터치/클릭 입력 처리
// ============================================================
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: clientX - rect.left,
    y: clientY - rect.top,
  };
}

function hitTest(x, y, bx, by, bw, bh) {
  return x >= bx && x <= bx + bw && y >= by && y <= by + bh;
}

// 버튼 프레스 상태
let pressedBtn = { id: null, timer: 0 };
const PRESS_DURATION = 0.12;

function setBtnPressed(id) {
  pressedBtn.id = id;
  pressedBtn.timer = PRESS_DURATION;
}

function isBtnPressed(id) {
  return pressedBtn.id === id && pressedBtn.timer > 0;
}

// style: "primary" (분홍~보라 그라데이션) | "secondary" (회색~흰색)
function drawGameButton(x, y, w, h, text, style, btnId) {
  const pressed = isBtnPressed(btnId);
  const r = s(14);
  const shadowH = s(4);
  const pressOffset = pressed ? shadowH * 0.8 : 0;
  const currentShadow = pressed ? shadowH * 0.2 : shadowH;

  // 그림자
  if (currentShadow > 0.5) {
    ctx.fillStyle = style === "primary"
      ? "rgba(70, 140, 128, 0.4)"
      : THEME.shadow;
    roundRect(ctx, x, y + pressOffset + (h - currentShadow * 0.5), w, currentShadow + s(1), r);
    ctx.fill();
  }

  // 버튼 본체
  const btnY = y + pressOffset;
  ctx.save();
  roundRect(ctx, x, btnY, w, h, r);
  ctx.clip();

  if (style === "primary") {
    const grad = ctx.createLinearGradient(x, btnY, x + w, btnY + h);
    grad.addColorStop(0, THEME.mint);
    grad.addColorStop(1, THEME.mintDark);
    ctx.fillStyle = grad;
  } else if (style === "danger") {
    const grad = ctx.createLinearGradient(x, btnY, x + w, btnY + h);
    grad.addColorStop(0, THEME.peach);
    grad.addColorStop(1, THEME.coral);
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = "rgba(255, 248, 240, 0.9)";
  }
  ctx.fillRect(x, btnY, w, h);

  // 상단 하이라이트 (볼록 느낌)
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = "#FFFFFF";
  ctx.fillRect(x, btnY, w, h * 0.45);
  ctx.globalAlpha = 1;

  ctx.restore();

  // 테두리
  if (style === "secondary") {
    ctx.strokeStyle = THEME.mintLight;
    ctx.lineWidth = s(1.5);
    roundRect(ctx, x, btnY, w, h, r);
    ctx.stroke();
  }

  // 텍스트
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = style === "secondary" ? THEME.mintDark : THEME.textLight;
  ctx.font = `bold ${s(18)}px ${FONT.text}`;
  ctx.fillText(text, x + w / 2, btnY + h / 2 + s(1));
}

function handleInput(x, y) {
  initAudio();

  if (gameState === "title") {
    const btnW = s(220);
    const btnH = s(50);
    const btnGap = s(14);
    const btnX = canvasWidth / 2 - btnW / 2;
    const btnStartY = canvasHeight * 0.62;
    // 시작하기 버튼
    if (hitTest(x, y, btnX, btnStartY, btnW, btnH)) {
      setBtnPressed("title_start");
      startTutorial();
      return;
    }
    // 기록 보기 버튼
    if (hitTest(x, y, btnX, btnStartY + btnH + btnGap, btnW, btnH)) {
      setBtnPressed("title_score");
      gameState = "ranking";
      return;
    }
    return;
  }

  if (gameState === "tutorial") {
    startCountdown();
    return;
  }

  if (gameState === "ranking") {
    // 닫기 버튼 (카드 내부 하단)
    const cardW = canvasWidth * 0.88;
    const cardH = canvasHeight * 0.82;
    const cardY = canvasHeight * 0.08;
    const btnW = s(140);
    const btnH = s(42);
    const btnX = canvasWidth / 2 - btnW / 2;
    const btnY = cardY + cardH - s(52);
    if (hitTest(x, y, btnX, btnY, btnW, btnH)) {
      setBtnPressed("ranking_back");
      gameState = "title";
    }
    return;
  }

  if (gameState === "result") {
    // 3.5초간 입력 무시 (D-7)
    if (resultInputDelay > 0) return;

    if (resultPhase !== "done") {
      // 시퀀스 스킵 → done 상태로 전환
      resultCountScore = score;
      let totalStars = 0;
      if (score >= CONFIG.star3Threshold) totalStars = 3;
      else if (score >= CONFIG.star2Threshold) totalStars = 2;
      else if (score >= CONFIG.star1Threshold) totalStars = 1;
      resultStarsRevealed = totalStars;
      resultStarAnimTimers = [1, 1, 1];
      resultStarRotations = [0, 0, 0]; // B-4: 애니메이션 완료 시 0도 (정상 ☆)
      resultPhase = "done";
      resultTimer = 4;
      resultCountupDone = true;
    } else {
      const cx = canvasWidth / 2;
      const btnW = canvasWidth * 0.34;
      const btnH = canvasHeight * 0.055;
      const gap = s(8);
      const btn1X = cx - gap - btnW;
      const btn2X = cx + gap;
      const btnY = canvasHeight * 0.82;

      // 다시하기
      if (hitTest(x, y, btn1X, btnY, btnW, btnH)) {
        setBtnPressed("result_retry");
        startCountdown();
        return;
      }
      // 타이틀로
      if (hitTest(x, y, btn2X, btnY, btnW, btnH)) {
        setBtnPressed("result_title");
        resetToTitle();
        return;
      }
      // 기록 보기
      const linkY = btnY + btnH + s(10);
      const linkW = canvasWidth * 0.3;
      const linkH = s(30);
      if (hitTest(x, y, cx - linkW / 2, linkY, linkW, linkH)) {
        gameState = "ranking";
        return;
      }
    }
    return;
  }

  if (gameState === "playing") {
    handlePlayingInput(x, y);
  }
}

function handlePlayingInput(x, y) {
  // 전역 리플 이펙트
  spawnRipple(x, y);

  // Fever 중: 화면 어디든 터치하면 점수 획득
  if (isFever) {
    if (feverPopPhase) return; // 폭발 중 입력 무시

    score += CONFIG.scoreFeverTap;

    // 흔들림 트리거 (방향 교대)
    pinataWobbleTimer = CONFIG.feverPinataWobbleDuration;
    pinataWobbleDir = -pinataWobbleDir;

    // 미세 화면 흔들림
    screenShake.active = true;
    screenShake.timer = CONFIG.shakeFeverDur;
    screenShake.duration = CONFIG.shakeFeverDur;
    screenShake.intensity = CONFIG.shakeFever * scaleRatio;
    screenShake.rotationDeg = 0;

    // 파티클은 피냐타 쪽으로, 플로팅 텍스트는 터치 위치에
    const dx = x - pinataX;
    const dy = y - pinataY;
    spawnParticles(pinataX + dx * 0.2, pinataY + dy * 0.2, "pinataHit");
    spawnFloatingText(x, y, "feverTap");
    comboCount++;
    bgHitPulse = CONFIG.bgHitPulseDuration;
    if (comboCount >= 10 && comboCount % 10 === 0) triggerMilestone(comboCount);
    playSound("feverTap");
    triggerHaptic(CONFIG.hapticFever);
    gameStats.feverTaps++; gameStats.totalTaps++;
    gameStats.maxCombo = Math.max(gameStats.maxCombo, comboCount);
    return;
  }

  // 일반 모드: 타겟 히트 판정
  for (let i = 0; i < targets.length; i++) {
    const t = targets[i];
    if (t.state === "pop" || t.state === "despawning") continue;

    const cell = gridLayout.cells[t.cellIndex];
    const halfSize = gridLayout.cellSize / 2;

    // 셀 영역 내 터치 확인
    if (x >= cell.x && x <= cell.x + gridLayout.cellSize &&
        y >= cell.y && y <= cell.y + gridLayout.cellSize) {

      if (t.type === "basic") {
        score += CONFIG.scoreBasic;
        feverGauge = clamp(feverGauge + CONFIG.gaugeBasic, 0, CONFIG.feverGaugeMax);
        t.state = "pop";
        t.stateTimer = 0;
        t.scale = 1.0;
        hitStopUntil = Date.now() + CONFIG.hitStopBasic;
        screenShake.active = true;
        screenShake.timer = CONFIG.shakeBasicDur;
        screenShake.duration = CONFIG.shakeBasicDur;
        screenShake.intensity = CONFIG.shakeBasic * scaleRatio;
        screenShake.rotationDeg = 0;
        spawnParticles(cell.centerX, cell.centerY, "basicHit");
        spawnHitFlash(cell.centerX, cell.centerY, "basic");
        spawnJellyRing(t.cellIndex, "basic");
        spawnFloatingText(cell.centerX, cell.centerY, "basic");
        comboCount++;
    bgHitPulse = CONFIG.bgHitPulseDuration;
    if (comboCount >= 10 && comboCount % 10 === 0) triggerMilestone(comboCount);
        playSound("basicHit");
        triggerHaptic(CONFIG.hapticBasic);
        gameStats.basicHits++; gameStats.totalTaps++;
        gameStats.maxCombo = Math.max(gameStats.maxCombo, comboCount);
      } else if (t.type === "trap") {
        score += CONFIG.scoreTrap;
        if (score < 0) score = 0;
        feverGauge = Math.max(0, feverGauge - CONFIG.gaugeTrapPenalty);
        gaugeFlashTimer = CONFIG.gaugeTrapFlashDuration;
        t.state = "pop";
        t.stateTimer = 0;
        t.scale = 1.0;
        t.hitRotation = (Math.random() - 0.5) * 0.5; // ±14도 랜덤 회전 "덜컹"
        hitStopUntil = Date.now() + CONFIG.hitStopTrap;
        screenShake.active = true;
        screenShake.timer = CONFIG.shakeTrapDur;
        screenShake.duration = CONFIG.shakeTrapDur;
        screenShake.intensity = CONFIG.shakeTrap * scaleRatio;
        screenShake.rotationDeg = 0;
        spawnParticles(cell.centerX, cell.centerY, "trapHit");
        spawnHitFlash(cell.centerX, cell.centerY, "trap");
        spawnJellyRing(t.cellIndex, "trap");
        spawnFloatingText(cell.centerX, cell.centerY, "trap");
        comboCount = 0;
        clearMilestone();
        playSound("trapHit");
        triggerHaptic(CONFIG.hapticTrap);
        gameStats.trapHits++; gameStats.totalTaps++;
      } else if (t.type === "timing") {
        const indicatorScale = t.indicatorScale;
        let scoreVal, gaugeVal, textKey, soundKey;

        if (indicatorScale > CONFIG.timingE1Threshold) {
          scoreVal = CONFIG.scoreTimingE1;
          gaugeVal = CONFIG.gaugeTimingE1;
          textKey = "timingE1";
          soundKey = "timingE1";
        } else if (indicatorScale > CONFIG.timingE2Threshold) {
          scoreVal = CONFIG.scoreTimingE2;
          gaugeVal = CONFIG.gaugeTimingE2;
          textKey = "timingE2";
          soundKey = "timingE2";
        } else {
          scoreVal = CONFIG.scoreTimingE3;
          gaugeVal = CONFIG.gaugeTimingE3;
          textKey = "timingE3";
          soundKey = "timingE3";
        }

        score += scoreVal;
        feverGauge = clamp(feverGauge + gaugeVal, 0, CONFIG.feverGaugeMax);
        t.state = "pop";
        t.stateTimer = 0;
        t.scale = 1.0;
        hitStopUntil = Date.now() + (textKey === "timingE3" ? CONFIG.hitStopTimingE3 : CONFIG.hitStopBasic);
        if (textKey === "timingE3") {
          screenShake.active = true;
          screenShake.timer = CONFIG.shakeTimingE3Dur;
          screenShake.duration = CONFIG.shakeTimingE3Dur;
          screenShake.intensity = CONFIG.shakeTimingE3 * scaleRatio;
          screenShake.rotationDeg = CONFIG.shakeTimingE3Rot;
        } else {
          screenShake.active = true;
          screenShake.timer = CONFIG.shakeBasicDur;
          screenShake.duration = CONFIG.shakeBasicDur;
          screenShake.intensity = CONFIG.shakeBasic * scaleRatio;
          screenShake.rotationDeg = 0;
        }
        spawnParticles(cell.centerX, cell.centerY, textKey); // E등급별 파티클
        spawnHitFlash(cell.centerX, cell.centerY, textKey);
        spawnJellyRing(t.cellIndex, "timing");
        spawnFloatingText(cell.centerX, cell.centerY, textKey);
        comboCount++;
    bgHitPulse = CONFIG.bgHitPulseDuration;
    if (comboCount >= 10 && comboCount % 10 === 0) triggerMilestone(comboCount);
        playSound(soundKey);
        triggerHaptic(textKey === "timingE3" ? CONFIG.hapticTimingE3
                    : textKey === "timingE2" ? CONFIG.hapticTimingE2
                    : CONFIG.hapticTimingE1);
        if (textKey === "timingE3") gameStats.timingE3++;
        else if (textKey === "timingE2") gameStats.timingE2++;
        else gameStats.timingE1++;
        gameStats.totalTaps++;
        gameStats.maxCombo = Math.max(gameStats.maxCombo, comboCount);
      } else if (t.type === "slide") {
        // 슬라이드: 터치 시작만 기록, 스와이프 완료 시 판정
        pendingSlideTouch = {
          startX: x, startY: y,
          startTime: Date.now(),
          cellIndex: t.cellIndex,
          targetIndex: i,
        };
        return; // 게이지 체크 불필요 (스와이프 완료 시 처리)
      }

      // Fever 게이지 체크
      if (!isFever && !feverIntro && feverGauge >= CONFIG.feverGaugeMax) {
        feverIntro = true;
        feverIntroTimer = 0;
        playSound("feverStart");
        startFever(); // 피냐타 즉시 등장 (텍스트는 오버레이로 동시 표시)
      }

      return; // 한 번에 하나의 타겟만 히트
    }
  }

  // 빈 칸 터치 감지 (헛스윙)
  for (let ci = 0; ci < gridLayout.cells.length; ci++) {
    const cell = gridLayout.cells[ci];
    if (x >= cell.x && x <= cell.x + gridLayout.cellSize &&
        y >= cell.y && y <= cell.y + gridLayout.cellSize) {
      // 해당 칸에 활성 타겟이 없는지 확인
      const hasActive = targets.some(t => t.cellIndex === ci && t.state !== "despawning");
      if (!hasActive) {
        // 젤리 찌그러짐
        jellyCellSquish[ci] = { timer: 0, duration: 0.15 };
        // 회색 연기 파티클
        spawnWhiffSmoke(cell.centerX, cell.centerY);
        // 사운드 (콤보 피치 무시)
        playSoundFixed("whiffHit");
        // 햅틱
        triggerHaptic(CONFIG.hapticWhiff);
        gameStats.emptyTaps++; gameStats.totalTaps++;
      }
      break;
    }
  }
}

// 슬라이드 스와이프 판정
function handleSlideEnd(endX, endY) {
  if (!pendingSlideTouch) return;
  const p = pendingSlideTouch;
  pendingSlideTouch = null;

  // 시간 초과 체크
  if (Date.now() - p.startTime > CONFIG.slideSwipeTimeLimit * 1000) return;

  // 해당 타겟이 아직 유효한지 확인
  const t = targets.find(t => t.cellIndex === p.cellIndex && t.type === "slide" && t.state !== "pop" && t.state !== "despawning");
  if (!t) return;

  const dx = endX - p.startX;
  const dy = endY - p.startY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  const cell = gridLayout.cells[t.cellIndex];

  if (dist < CONFIG.slideSwipeThreshold * scaleRatio) {
    // 스와이프 거리 부족 → Miss
    handleSlideMiss(t, cell);
    return;
  }

  // 스와이프 방향 판정 (0=up, 1=right, 2=down, 3=left)
  let swipeDir;
  if (Math.abs(dx) > Math.abs(dy)) {
    swipeDir = dx > 0 ? 1 : 3;
  } else {
    swipeDir = dy > 0 ? 2 : 0;
  }

  if (swipeDir === t.slideDirection) {
    handleSlideSuccess(t, cell);
  } else {
    handleSlideMiss(t, cell);
  }
}

function handleSlideSuccess(t, cell) {
  score += CONFIG.scoreSlideSuccess;
  feverGauge = clamp(feverGauge + CONFIG.gaugeSlideSuccess, 0, CONFIG.feverGaugeMax);
  t.state = "pop";
  t.stateTimer = 0;
  t.scale = 1.0;

  // 방향에 따른 Squash & Stretch
  const dir = t.slideDirection;
  if (dir === 0 || dir === 2) { t.scaleX = 0.7; t.scaleY = 1.4; }
  else { t.scaleX = 1.4; t.scaleY = 0.7; }

  hitStopUntil = Date.now() + CONFIG.hitStopSlide;
  screenShake.active = true;
  screenShake.timer = CONFIG.shakeSlideDur;
  screenShake.duration = CONFIG.shakeSlideDur;
  screenShake.intensity = CONFIG.shakeSlide * scaleRatio;
  screenShake.rotationDeg = 0;
  spawnParticles(cell.centerX, cell.centerY, "slideHit");
  spawnHitFlash(cell.centerX, cell.centerY, "slide");
  spawnJellyRing(t.cellIndex, "slide");
  spawnFloatingText(cell.centerX, cell.centerY, "slideSuccess");
  comboCount++;
  bgHitPulse = CONFIG.bgHitPulseDuration;
  if (comboCount >= 10 && comboCount % 10 === 0) triggerMilestone(comboCount);
  playSound("slideSuccess");
  triggerHaptic(CONFIG.hapticSlideSuccess);
  gameStats.slideSuccess++; gameStats.totalTaps++;
  gameStats.maxCombo = Math.max(gameStats.maxCombo, comboCount);

  // Fever 게이지 체크
  if (!isFever && !feverIntro && feverGauge >= CONFIG.feverGaugeMax) {
    feverIntro = true;
    feverIntroTimer = 0;
    playSound("feverStart");
    startFever();
  }
}

function handleSlideMiss(t, cell) {
  score += CONFIG.scoreSlideWrong;
  feverGauge = clamp(feverGauge + CONFIG.gaugeSlideWrong, 0, CONFIG.feverGaugeMax);
  t.state = "pop";
  t.stateTimer = 0;
  t.scale = 1.0;
  t.hitRotation = (Math.random() - 0.5) * 0.3;
  screenShake.active = true;
  screenShake.timer = 0.2;
  screenShake.duration = 0.2;
  screenShake.intensity = 3 * scaleRatio;
  screenShake.rotationDeg = 0;
  spawnFloatingText(cell.centerX, cell.centerY, "slideMiss");
  comboCount = 0;
  clearMilestone();
  playSound("slideFail");
  triggerHaptic(CONFIG.hapticSlideFail);
  gameStats.slideFail++; gameStats.totalTaps++;
}

// 마우스 입력 (슬라이드 대응: mousedown/mouseup)
let mouseDownPos = null;
canvas.addEventListener("mousedown", (e) => {
  const pos = getCanvasPos(e.clientX, e.clientY);
  mouseDownPos = pos;
  handleInput(pos.x, pos.y);
});
canvas.addEventListener("mouseup", (e) => {
  if (!pendingSlideTouch || !mouseDownPos) { mouseDownPos = null; return; }
  const pos = getCanvasPos(e.clientX, e.clientY);
  handleSlideEnd(pos.x, pos.y);
  mouseDownPos = null;
});

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  for (const touch of e.changedTouches) {
    const pos = getCanvasPos(touch.clientX, touch.clientY);
    handleInput(pos.x, pos.y);
    if (pendingSlideTouch) {
      pendingSlideTouch.touchId = touch.identifier;
    }
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  if (!pendingSlideTouch) return;
  for (const touch of e.changedTouches) {
    if (pendingSlideTouch && touch.identifier === pendingSlideTouch.touchId) {
      const pos = getCanvasPos(touch.clientX, touch.clientY);
      handleSlideEnd(pos.x, pos.y);
      break;
    }
  }
}, { passive: false });

// ============================================================
// 게임 상태 전환 함수
// ============================================================
function startTutorial() {
  gameState = "tutorial";
}

function startCountdown() {
  // 게임 변수 초기화 (BGM은 카운트다운 끝나고 시작)
  score = 0;
  timeRemaining = CONFIG.stageTimeLimit;
  feverGauge = 0;
  gaugeFlashTimer = 0;
  isFever = false;
  feverTimer = 0;
  targets = [];
  particles = [];
  floatingTexts = [];
  ripples = [];
  spawnTimer = 0;
  nextSpawnInterval = 1.0;
  screenShake = { active: false, timer: 0, intensity: 0, duration: 0.3, rotationDeg: 0 };
  hitStopUntil = 0;
  hitFlashes = [];
  pinataScale = 0;
  pinataRotation = 0;
  pinataWobbleTimer = 0;
  feverPopPhase = false;
  feverPopTimer = 0;
  feverIntro = false;
  feverIntroTimer = 0;
  pendingSlideTouch = null;
  comboCount = 0;
  bgHitPulse = 0;
  jellyRings = [];
  jellyCellBounce = {};
  jellyCellSquish = {};
  clearMilestone();
  milestonePopinTimer = 0;
  gameStats = { basicHits:0, trapHits:0, timingE1:0, timingE2:0, timingE3:0, timingMiss:0,
                slideSuccess:0, slideFail:0, feverTaps:0, maxCombo:0, emptyTaps:0, totalTaps:0 };
  initBgSparkles();

  gameState = "countdown";
  countdownNumber = 3;
  countdownTimer = 0;
  countdownLastNumber = 0;
}

function startGame() {
  gameState = "playing";
  startBGM("normal");
}

function startFever() {
  console.log("[FEVER] startFever() called");
  isFever = true;
  feverTimer = CONFIG.feverDuration;
  feverGauge = CONFIG.feverGaugeMax;

  // 기존 타겟 모두 제거
  targets = [];

  // 피냐타 위치 = 그리드 중앙
  pinataX = gridLayout.offsetX + gridLayout.totalWidth / 2;
  pinataY = gridLayout.offsetY + gridLayout.totalHeight / 2;
  pinataRadius = gridLayout.cellSize * 0.9;
  pinataScale = 0; // 0→1 등장 애니메이션
  pinataRotation = 0;
  pinataWobbleTimer = 0;
  pinataWobbleDir = 1;
  feverPopPhase = false;
  feverPopTimer = 0;

  console.log("[FEVER] calling switchBGM('fever')");
  switchBGM("fever");
}

function startFeverPop() {
  feverPopPhase = true;
  feverPopTimer = 0;
}

function endFever() {
  console.log("[FEVER] endFever() called, switching to normal BGM");
  isFever = false;
  feverTimer = 0;
  feverGauge = 0;
  feverPopPhase = false;
  feverPopTimer = 0;
  pinataScale = 0;
  targets = [];
  playSound("feverEnd");
  switchBGM("normal");
  spawnTimer = 0;
  const phase = getCurrentDifficultyPhase();
  nextSpawnInterval = randomRange(phase.spawnInterval[0], phase.spawnInterval[1]);
}

function triggerTimeup() {
  gameState = "timeup";
  timeupTimer = CONFIG.timeupDisplayDuration;
  targets = [];
  particles = [];
  isFever = false;
  feverIntro = false;
  feverPopPhase = false;

}

function resetToTitle() {

// ============================================================
// 업데이트 루프
// ============================================================
let lastTime = 0;

// 히트스톱 중 이펙트만 업데이트 (게임 로직 정지, 비주얼은 계속)
function updateEffectsOnly(dt) {
  // pop 애니메이션 진행 (타겟의 stateTimer)
  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    if (t.state === "pop") {
      t.stateTimer += dt;
      const time = t.stateTimer;
      const d1 = CONFIG.hitSquashDur;
      const d2 = d1 + CONFIG.hitStretchDur;
      const d3 = d2 + CONFIG.hitExpandDur;
      const d4 = d3 + CONFIG.hitVanishDur;

      if (time < d1) {
        const p = easeOutBack(clamp(time / d1, 0, 1));
        t.scaleX = lerp(1, CONFIG.hitSquashX, p);
        t.scaleY = lerp(1, CONFIG.hitSquashY, p);
        t.hitAlpha = 1;
      } else if (time < d2) {
        const p = easeOutBack(clamp((time - d1) / CONFIG.hitStretchDur, 0, 1));
        t.scaleX = lerp(CONFIG.hitSquashX, CONFIG.hitStretchX, p);
        t.scaleY = lerp(CONFIG.hitSquashY, CONFIG.hitStretchY, p);
        t.hitAlpha = 1;
      } else if (time < d3) {
        const p = easeOutBack(clamp((time - d2) / CONFIG.hitExpandDur, 0, 1));
        const expandS = lerp(1, CONFIG.hitExpandScale, p);
        t.scaleX = lerp(CONFIG.hitStretchX, expandS, p);
        t.scaleY = lerp(CONFIG.hitStretchY, expandS, p);
        t.hitAlpha = 1;
      } else {
        const p = clamp((time - d3) / CONFIG.hitVanishDur, 0, 1);
        const easedP = p * p;
        const vanishScale = CONFIG.hitExpandScale * (1 - easedP);
        t.scaleX = vanishScale;
        t.scaleY = vanishScale;
        t.hitAlpha = 1 - easedP;
      }
      if (time >= d4) {
        removeTarget(i);
      }
    }
  }
  // 파티클
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity || 300) * scaleRatio * dt;
    const decel = Math.pow(CONFIG.particleDeceleration, dt * 60);
    p.vx *= decel;
    p.vy *= decel;
    p.rotation += (p.spinSpeed || 0) * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0.01) particles.splice(i, 1);
  }
  // 히트 플래시 업데이트
  for (let i = hitFlashes.length - 1; i >= 0; i--) {
    const f = hitFlashes[i];
    f.timer += dt;
    if (f.timer >= f.duration) { hitFlashes.splice(i, 1); continue; }
    const p = f.timer / f.duration;
    f.alpha = f.startAlpha * (1 - p);
    f.radius = f.startRadius * (1 + p);
    f.lineWidth = f.startLineWidth * (1 - p * 0.7);
  }
  // 플로팅 텍스트
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.life -= (dt / CONFIG.floatingTextDuration) * ft.fadeSpeed;
    const dir = ft.key === "trap" ? 1 : -1; // 함정은 아래로, 나머지는 위로
    ft.y += dir * (CONFIG.floatingTextRiseDistance * scaleRatio) * dt / CONFIG.floatingTextDuration;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }
  // 리플
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    if (r.delay && r.delay > 0) { r.delay -= dt; continue; }
    r.life -= dt * 3.5;
    r.radius = r.maxRadius * easeOutQuad(1 - r.life);
    if (r.life <= 0) ripples.splice(i, 1);
  }
  // 젤리 링 업데이트
  for (let i = jellyRings.length - 1; i >= 0; i--) {
    const jr = jellyRings[i];
    jr.timer += dt;
    if (jr.timer >= jr.duration) { jellyRings.splice(i, 1); continue; }
    const p = jr.timer / jr.duration;
    jr.radius = jr.startRadius + (jr.endRadius - jr.startRadius) * easeOutQuad(p);
    jr.alpha = jr.startAlpha * (1 - p);
  }
  // 젤리 셀 복귀 바운스 업데이트
  for (const ci in jellyCellBounce) {
    const jb = jellyCellBounce[ci];
    jb.timer += dt;
    if (jb.timer >= jb.duration) delete jellyCellBounce[ci];
  }
  // 젤리 셀 찌그러짐 업데이트
  for (const ci in jellyCellSquish) {
    const js = jellyCellSquish[ci];
    js.timer += dt;
    if (js.timer >= js.duration) delete jellyCellSquish[ci];
  }
  // 마일스톤 텍스트 업데이트
  if (milestonePhase !== 'idle') {
    if (milestonePhase === 'popin') {
      milestonePopinTimer += dt;
      const p = clamp(milestonePopinTimer / 0.15, 0, 1);
      milestoneScale = lerp(0, 1.4, easeOutBack(p));
      if (p >= 1) {
        milestoneScale = 1.0;
        milestonePhase = 'hold';
      }
    }
    if (milestonePhase === 'hold') {
      milestoneTimer -= dt;
      if (milestoneTimer <= 0) {
        milestonePhase = 'fadeout';
      }
    }
    if (milestonePhase === 'fadeout') {
      milestoneAlpha -= dt / 0.3;
      if (milestoneAlpha <= 0) {
        clearMilestone();
      }
    }
  }
  // 화면 흔들림
  if (screenShake.active) {
    screenShake.timer -= dt;
    if (screenShake.timer <= 0) screenShake.active = false;
  }
  // 게이지 빨간 깜빡임
  if (gaugeFlashTimer > 0) gaugeFlashTimer -= dt;
}

function update(dt) {
  // 버튼 프레스 타이머 (모든 상태에서)
  if (pressedBtn.timer > 0) pressedBtn.timer = Math.max(0, pressedBtn.timer - dt);

  if (gameState !== "playing") return;

  // 히트스톱 체크: 게임 로직은 정지, 이펙트(pop 애니메이션/파티클/텍스트/리플/흔들림)만 진행
  const inHitStop = Date.now() < hitStopUntil;
  if (inHitStop) {
    updateEffectsOnly(dt);
    return;
  }

  // 타이머 업데이트
  if (!isFever || !CONFIG.feverPauseTimer) {
    timeRemaining -= dt;
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      triggerTimeup();
      return;
    }
  }

  // 배경 히트 펄스 감소
  if (bgHitPulse > 0) bgHitPulse = Math.max(0, bgHitPulse - dt);

  // Fever 인트로 텍스트 오버레이 타이머
  if (feverIntro) {
    feverIntroTimer += dt;
    if (feverIntroTimer >= FEVER_INTRO_DURATION) {
      feverIntro = false;
      feverIntroTimer = 0;
    }
  }

  // Fever 피냐타 업데이트
  if (isFever) {
    if (!feverPopPhase) {
      feverTimer -= dt;

      // 피냐타 등장 애니메이션 (0→1)
      if (pinataScale < 1) {
        pinataScale += dt / CONFIG.targetSpawnAnimDuration;
        if (pinataScale > 1) pinataScale = 1;
      }

      // 흔들림 감쇠
      if (pinataWobbleTimer > 0) {
        pinataWobbleTimer -= dt;
        if (pinataWobbleTimer <= 0) {
          pinataWobbleTimer = 0;
          pinataRotation = 0;
        } else {
          const wobbleP = pinataWobbleTimer / CONFIG.feverPinataWobbleDuration;
          pinataRotation = Math.sin(wobbleP * Math.PI * 3)
                          * CONFIG.feverPinataWobbleAngle * wobbleP
                          * pinataWobbleDir;
        }
      }

      // 종료 예고: 강화 흔들림 (마지막 1초)
      if (feverTimer <= CONFIG.feverWarningTime && feverTimer > 0) {
        const shakeAmp = 5 * scaleRatio; // ±5px
        const shakeFreq = Date.now() * 0.03;
        pinataRotation = Math.sin(shakeFreq) * 0.15; // 약 ±8.5도
      }

      // 타이머 종료 → 폭발 시작
      if (feverTimer <= 0) {
        feverTimer = 0;
        startFeverPop();
      }
    } else {
      // 폭발 애니메이션
      feverPopTimer += dt;
      const popDur = CONFIG.feverPinataPopDuration;
      const popP = clamp(feverPopTimer / popDur, 0, 1);

      if (popP < 0.6) {
        // 팽창
        const p = popP / 0.6;
        pinataScale = 1 + (CONFIG.feverPinataPopScale - 1) * easeOutBack(p);
      } else {
        // 수축
        const p = (popP - 0.6) / 0.4;
        pinataScale = CONFIG.feverPinataPopScale * (1 - p * p);
      }

      // 60% 시점에서 대량 파티클 + screen shake
      if (popP >= 0.55 && (feverPopTimer - dt) / popDur < 0.55) {
        spawnParticles(pinataX, pinataY, "pinataBurst");
        screenShake.active = true;
        screenShake.timer = CONFIG.screenShakeDuration;
        screenShake.duration = CONFIG.screenShakeDuration;
        screenShake.intensity = CONFIG.shakeTrap * 1.5 * scaleRatio;
        screenShake.rotationDeg = 0;
      }

      if (popP >= 1) {
        endFever();
      }
    }
  }

  // 스폰 타이머 (Fever 중에는 스폰 안 함)
  if (!isFever) {
    spawnTimer += dt;
    if (spawnTimer >= nextSpawnInterval) {
      spawnTimer = 0;
      spawnTarget();
      const phase = getCurrentDifficultyPhase();
      nextSpawnInterval = randomRange(phase.spawnInterval[0], phase.spawnInterval[1]);
    }
    // 마지막 구간 최소 타겟 밀도 보장 (23초~)
    const elapsed = CONFIG.stageTimeLimit - timeRemaining;
    if (elapsed >= CONFIG.lastPhaseMinTargetsStart) {
      const activeCount = targets.filter(t => t.state !== "despawning").length;
      if (activeCount < CONFIG.lastPhaseMinTargets) {
        spawnTarget();
      }
    }
  }

  // 타겟 업데이트
  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    t.stateTimer += dt;
    t.lifeTimer += dt;

    if (t.state === "ready") {
      // 등장 애니메이션 (젤리 뿅! squish)
      const dur = CONFIG.targetSpawnAnimDuration;
      const progress = clamp(t.stateTimer / dur, 0, 1);
      t.scale = easeOutBack(progress);
      // 젤리 squish: scaleX/scaleY 분리
      if (progress < 0.2) {
        const p = progress / 0.2;
        t.scaleX = 1.0 + 0.1 * p;
        t.scaleY = 0.7 + 0.0 * p;
      } else if (progress < 0.48) {
        const p = (progress - 0.2) / 0.28;
        t.scaleX = 1.1 - 0.2 * p;
        t.scaleY = 0.7 + 0.6 * p;
      } else if (progress < 0.8) {
        const p = (progress - 0.48) / 0.32;
        t.scaleX = 0.9 + 0.2 * p;
        t.scaleY = 1.3 - 0.35 * p;
      } else {
        const p = (progress - 0.8) / 0.2;
        t.scaleX = 1.1 - 0.1 * p;
        t.scaleY = 0.95 + 0.05 * p;
      }
      if (progress >= 1) {
        t.state = "std";
        t.stateTimer = 0;
        t.scale = 1;
        t.scaleX = 1;
        t.scaleY = 1;
        // 등장 완료 시 발밑 먼지 구름
        const cell = gridLayout.cells[t.cellIndex];
        spawnDustPuff(cell.centerX, cell.y + gridLayout.cellSize, 4);
      }
    } else if (t.state === "std") {
      // 바운스 애니메이션
      t.bouncePhase += dt * 3;
      t.bounceOffset = Math.sin(t.bouncePhase) * 2 * scaleRatio;

      // 타이밍 타겟: 인디케이터 축소 + 멈춤 구간
      if (t.type === "timing") {
        if (!t._stillMode) {
          t.indicatorScale = clamp(1.0 - (t.lifeTimer / t.maxDuration), 0, 1);
          // 멈춤 구간 진입
          if (t.indicatorScale <= CONFIG.timingE3StillPoint) {
            t._stillMode = true;
            t._stillTimer = CONFIG.timingE3GlowDuration;
            t.indicatorScale = CONFIG.timingE3StillPoint;
          }
        } else {
          // 멈춤+발광 중: 타이머 카운트다운
          t._stillTimer -= dt;
          if (t._stillTimer <= 0) {
            // 미스: 패널티 없이 사라짐
            t.state = "despawning";
            t.stateTimer = 0;
            gameStats.timingMiss++;
            const cell = gridLayout.cells[t.cellIndex];
            spawnDustPuff(cell.centerX, cell.y + gridLayout.cellSize, 3);
          }
        }
        // 기존 0 도달 체크 (멈춤 모드가 아닌 경우)
        if (!t._stillMode && t.indicatorScale <= 0) {
          t.state = "despawning";
          t.stateTimer = 0;
          gameStats.timingMiss++;
          const cell = gridLayout.cells[t.cellIndex];
          spawnDustPuff(cell.centerX, cell.y + gridLayout.cellSize, 3);
        }
      }

      // 수명 초과 체크 (타이밍 타겟 제외 - 인디케이터로 관리)
      if (t.type !== "timing" && t.lifeTimer >= t.maxDuration) {
        t.state = "despawning";
        t.stateTimer = 0;
        const cell = gridLayout.cells[t.cellIndex];
        spawnDustPuff(cell.centerX, cell.y + gridLayout.cellSize, 3);
      }
    } else if (t.state === "pop") {
      // Squash & Stretch 히트 애니메이션
      const time = t.stateTimer;
      const d1 = CONFIG.hitSquashDur;                      // 0.03
      const d2 = d1 + CONFIG.hitStretchDur;                // 0.08
      const d3 = d2 + CONFIG.hitExpandDur;                 // 0.12
      const d4 = d3 + CONFIG.hitVanishDur;                 // 0.20

      if (time < d1) {
        // Phase 1: Squash (가로 찌그러짐)
        const p = easeOutBack(clamp(time / d1, 0, 1));
        t.scaleX = lerp(1, CONFIG.hitSquashX, p);
        t.scaleY = lerp(1, CONFIG.hitSquashY, p);
        t.scale = 1;
        t.hitAlpha = 1;
      } else if (time < d2) {
        // Phase 2: Stretch (세로 늘어남)
        const p = easeOutBack(clamp((time - d1) / CONFIG.hitStretchDur, 0, 1));
        t.scaleX = lerp(CONFIG.hitSquashX, CONFIG.hitStretchX, p);
        t.scaleY = lerp(CONFIG.hitSquashY, CONFIG.hitStretchY, p);
        t.scale = 1;
        t.hitAlpha = 1;
      } else if (time < d3) {
        // Phase 3: Expand (균일 팽창)
        const p = easeOutBack(clamp((time - d2) / CONFIG.hitExpandDur, 0, 1));
        const expandS = lerp(1, CONFIG.hitExpandScale, p);
        t.scaleX = lerp(CONFIG.hitStretchX, expandS, p);
        t.scaleY = lerp(CONFIG.hitStretchY, expandS, p);
        t.scale = 1;
        t.hitAlpha = 1;
      } else {
        // Phase 4: Vanish (축소 + 페이드아웃)
        const p = clamp((time - d3) / CONFIG.hitVanishDur, 0, 1);
        const easedP = p * p;
        const vanishScale = CONFIG.hitExpandScale * (1 - easedP);
        t.scaleX = vanishScale;
        t.scaleY = vanishScale;
        t.scale = 1;
        t.hitAlpha = 1 - easedP;
      }

      if (time >= d4) {
        removeTarget(i);
        continue;
      }
    } else if (t.state === "despawning") {
      // 퇴장 애니메이션: scale 1 -> 0
      const progress = clamp(t.stateTimer / CONFIG.targetDespawnAnimDuration, 0, 1);
      t.scale = 1 - progress;
      if (progress >= 1) {
        removeTarget(i);
        continue;
      }
    }
  }

  // 파티클 업데이트
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity || 300) * scaleRatio * dt; // 개별 중력
    const decel2 = Math.pow(CONFIG.particleDeceleration, dt * 60);
    p.vx *= decel2;
    p.vy *= decel2;
    p.rotation += (p.spinSpeed || 0) * dt; // 회전
    p.life -= p.decay * dt;
    if (p.life <= 0.01) {
      particles.splice(i, 1);
    }
  }

  // 히트 플래시 업데이트
  for (let i = hitFlashes.length - 1; i >= 0; i--) {
    const f = hitFlashes[i];
    f.timer += dt;
    if (f.timer >= f.duration) { hitFlashes.splice(i, 1); continue; }
    const p = f.timer / f.duration;
    f.alpha = f.startAlpha * (1 - p);
    f.radius = f.startRadius * (1 + p);
    f.lineWidth = f.startLineWidth * (1 - p * 0.7);
  }

  // 플로팅 텍스트 업데이트
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.life -= (dt / CONFIG.floatingTextDuration) * ft.fadeSpeed;
    const dir = ft.key === "trap" ? 1 : -1; // 함정은 아래로, 나머지는 위로
    ft.y += dir * (CONFIG.floatingTextRiseDistance * scaleRatio) * dt / CONFIG.floatingTextDuration;
    if (ft.life <= 0) {
      floatingTexts.splice(i, 1);
    }
  }

  // 리플 업데이트
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    // delay 처리
    if (r.delay && r.delay > 0) { r.delay -= dt; continue; }
    r.life -= dt * 3.5;
    r.radius = r.maxRadius * easeOutQuad(1 - r.life);
    if (r.life <= 0) {
      ripples.splice(i, 1);
    }
  }
  // 젤리 링 업데이트 (timeup)
  for (let i = jellyRings.length - 1; i >= 0; i--) {
    const jr = jellyRings[i];
    jr.timer += dt;
    if (jr.timer >= jr.duration) { jellyRings.splice(i, 1); continue; }
    const p = jr.timer / jr.duration;
    jr.radius = jr.startRadius + (jr.endRadius - jr.startRadius) * easeOutQuad(p);
    jr.alpha = jr.startAlpha * (1 - p);
  }
  for (const ci in jellyCellBounce) {
    const jb = jellyCellBounce[ci];
    jb.timer += dt;
    if (jb.timer >= jb.duration) delete jellyCellBounce[ci];
  }
  for (const ci in jellyCellSquish) {
    const js = jellyCellSquish[ci];
    js.timer += dt;
    if (js.timer >= js.duration) delete jellyCellSquish[ci];
  }

  // ★ 마일스톤 텍스트 업데이트 (메인 update에 추가)
  if (milestonePhase !== 'idle') {
    if (milestonePhase === 'popin') {
      milestonePopinTimer += dt;
      const p = clamp(milestonePopinTimer / 0.15, 0, 1);
      milestoneScale = lerp(0, 1.4, easeOutBack(p));
      if (p >= 1) {
        milestoneScale = 1.0;
        milestonePhase = 'hold';
      }
    }
    if (milestonePhase === 'hold') {
      milestoneTimer -= dt;
      if (milestoneTimer <= 0) {
        milestonePhase = 'fadeout';
      }
    }
    if (milestonePhase === 'fadeout') {
      milestoneAlpha -= dt / 0.3;
      if (milestoneAlpha <= 0) {
        clearMilestone();
      }
    }
  }

  // 화면 흔들림 업데이트
  if (screenShake.active) {
    screenShake.timer -= dt;
    if (screenShake.timer <= 0) {
      screenShake.active = false;
    }
  }
}

function updateTimeup(dt) {
  if (gameState !== "timeup") return;
  timeupTimer -= dt;
  if (timeupTimer <= 0) {
    showResult();
  }
}

function updateResult(dt) {
  if (gameState !== "result") return;
  resultTimer += dt;

  // 입력 딜레이 카운트다운
  if (resultInputDelay > 0) {
    resultInputDelay -= dt;
    if (resultInputDelay < 0) resultInputDelay = 0;
  }

  let totalStars = 0;
  if (score >= CONFIG.star3Threshold) totalStars = 3;
  else if (score >= CONFIG.star2Threshold) totalStars = 2;
  else if (score >= CONFIG.star1Threshold) totalStars = 1;

  // 점수 팝 타이머
  if (resultScorePopTimer > 0) {
    resultScorePopTimer -= dt;
    if (resultScorePopTimer < 0) resultScorePopTimer = 0;
  }

  // 3성 플래시
  if (result3StarFlash > 0) {
    result3StarFlash -= dt;
    if (result3StarFlash < 0) result3StarFlash = 0;
  }

  // 별 애니메이션 타이머
  for (let i = 0; i < 3; i++) {
    if (resultStarAnimTimers[i] > 0 && resultStarAnimTimers[i] < 1) {
      const prev = resultStarAnimTimers[i];
      resultStarAnimTimers[i] += dt / 0.5;
      if (resultStarAnimTimers[i] > 1) resultStarAnimTimers[i] = 1;
      resultStarRotations[i] = -Math.PI * (1 - clamp(resultStarAnimTimers[i], 0, 1)); // B-4: 180도 회전 후 0으로 안정
      // C-3: 별이 scale 1.0 도달 순간 광선 발사
      if (prev < 1 && resultStarAnimTimers[i] >= 1 && !resultStarRays[i]) {
        const cx = canvasWidth / 2;
        const starSpacing = canvasWidth * 0.13;
        resultStarRays[i] = {
          timer: 0,
          x: cx + (i - 1) * starSpacing,
          y: canvasHeight * 0.15,
          size: canvasWidth * 0.05, // A-6: outerR 기준
        };
      }
    }
    // ★ 별 회전 보정: timer가 1에 도달하면 정확히 0도로 리셋
    if (resultStarAnimTimers[i] >= 1) {
      resultStarRotations[i] = 0;
    }
    // 광선 타이머 업데이트
    if (resultStarRays[i]) {
      resultStarRays[i].timer += dt;
      if (resultStarRays[i].timer >= 0.25) resultStarRays[i] = null;
    }
  }

  // 별 파티클 업데이트
  for (let i = resultStarParticles.length - 1; i >= 0; i--) {
    const p = resultStarParticles[i];
    p.life -= dt;
    if (p.life <= 0) { resultStarParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.rotation += p.spin * dt;
  }

  // 배경 부유 파티클 업데이트
  for (const p of resultBgParticles) {
    p.y += p.vy * dt;
    if (p.y < -s(20)) {
      p.y = canvasHeight + s(20);
      p.baseX = Math.random() * canvasWidth;
    }
  }

  if (resultPhase === "sequence") {
    // D-7 타이밍 시퀀스: 별 → 등급 → 점수카드 → 통계 → 버튼

    // 별: 0.0~1.2초 (0.4초 간격)
    const revealInterval = 0.4;
    const shouldReveal = Math.min(Math.floor(resultTimer / revealInterval) + 1, 3);
    if (shouldReveal > resultStarsRevealed && resultStarsRevealed < totalStars) {
      const newStar = Math.min(shouldReveal, totalStars);
      for (let i = resultStarsRevealed; i < newStar; i++) {
        resultStarAnimTimers[i] = 0.01;
        playSound("starReveal" + (i + 1));
        const cx = canvasWidth / 2;
        const starSpacing = canvasWidth * 0.13;
        const starX = cx + (i - 1) * starSpacing;
        const starY = canvasHeight * 0.15;
        spawnStarBurstParticles(starX, starY, 10 + i * 4);
        // B-1: 별 1개당 1회 플래시 (약하게)
        result3StarFlash = 0.1;
      }
      resultStarsRevealed = newStar;
    }

    // 3성 대폭발: 플래시 제거, 파티클만 증가
    if (totalStars === 3 && resultStarsRevealed === 3 && !result3StarBurstDone &&
        resultTimer >= 3 * revealInterval + 0.1 && resultStarAnimTimers[2] >= 0.8) {
      result3StarBurstDone = true;
      playSound("star3Burst");
      spawnStarBurstParticles(canvasWidth / 2, canvasHeight * 0.15, 20);
    }

    // 점수 카운트업: 1.6~2.6초
    if (resultTimer >= 1.6) {
      const countProgress = clamp((resultTimer - 1.6) / 1.0, 0, 1);
      const eased = easeOutQuad(countProgress);
      const prevScore = resultCountScore;
      resultCountScore = Math.floor(score * eased);

      if (prevScore < CONFIG.star1Threshold && resultCountScore >= CONFIG.star1Threshold) {
        spawnResultScoreParticles(4, THEME.mint);
      } else if (prevScore < CONFIG.star2Threshold && resultCountScore >= CONFIG.star2Threshold) {
        spawnResultScoreParticles(8, "#E8C840");
      } else if (prevScore < CONFIG.star3Threshold && resultCountScore >= CONFIG.star3Threshold) {
        spawnResultScoreParticles(12, THEME.gold);
      }

      if (countProgress >= 1 && !resultCountupDone) {
        resultCountScore = score;
        resultScorePopTimer = 0.3;
        resultCountupDone = true;
      }
    }

    // 3.5초 후 done
    if (resultTimer >= 3.5) {
      resultPhase = "done";
      resultStarsRevealed = totalStars;
      for (let i = 0; i < totalStars; i++) {
        if (resultStarAnimTimers[i] < 1) {
          resultStarAnimTimers[i] = 1;
          resultStarRotations[i] = 0; // B-4: 애니메이션 완료 시 0도
        }
      }
      if (!resultCountupDone) {
        resultCountScore = score;
        resultCountupDone = true;
      }
    }
  }
}

function spawnResultScoreParticles(count, color) {
  const cx = canvasWidth / 2;
  const y = canvasHeight * 0.35 + canvasHeight * 0.18 * 0.58;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count;
    const speed = 60 + Math.random() * 80;
    resultStarParticles.push({
      x: cx + (Math.random() - 0.5) * s(40),
      y: y + (Math.random() - 0.5) * s(20),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 40,
      life: 0.6 + Math.random() * 0.3,
      maxLife: 0.8,
      size: 2 + Math.random() * 2,
      color: color,
      rotation: 0,
      spin: (Math.random() - 0.5) * 10,
    });
  }
}

function spawnStarBurstParticles(cx, cy, count) {
  // B-2: 금색 40% + 민트 30% + 흰색 30% 혼합
  const goldColors = [THEME.gold, "#FFC107", "#FFE082"];
  const mintColors = [THEME.mint, THEME.mintLight];
  const whiteColors = ["#FFFFFF", "#FFF8F0"];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = 80 + Math.random() * 150;
    const r = Math.random();
    const color = r < 0.4 ? goldColors[Math.floor(Math.random() * goldColors.length)]
                : r < 0.7 ? mintColors[Math.floor(Math.random() * mintColors.length)]
                : whiteColors[Math.floor(Math.random() * whiteColors.length)];
    resultStarParticles.push({
      x: cx + (Math.random() - 0.5) * s(10),
      y: cy + (Math.random() - 0.5) * s(10),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 60,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.8,
      size: 2 + Math.random() * 3,
      color: color,
      rotation: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 12,
    });
  }
}

function updateCountdown(dt) {
  if (gameState !== "countdown") return;
  countdownTimer += dt;

  // 현재 표시할 숫자 계산: 0~1초 → 3, 1~2초 → 2, 2~3초 → 1
  const currentNum = 3 - Math.floor(countdownTimer);

  // 새 숫자 전환 시 비프음 재생
  if (currentNum !== countdownLastNumber && currentNum >= 1 && currentNum <= 3) {
    countdownLastNumber = currentNum;
    playSound("countdownTick");
  }

  countdownNumber = Math.max(currentNum, 1);

  // 3초 경과 → playing 전환
  if (countdownTimer >= 3.0) {
    playSound("countdownGo");
    startGame();
  }
}

// ============================================================
// 렌더링
// ============================================================
function render() {
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);

  // 배경 (플레이 중이면 색상 순환)
  if (gameState === "playing" || gameState === "timeup") {
    const elapsed = CONFIG.stageTimeLimit - timeRemaining;
    ctx.fillStyle = getPlayingBgColor(elapsed);
  } else {
    ctx.fillStyle = ASSETS.ui.background;
  }
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  switch (gameState) {
    case "title":     renderTitle(); break;
    case "ranking":   renderRanking(); break;
    case "tutorial":  renderTutorial(); break;
    case "countdown": renderCountdown(); break;
    case "playing":   renderPlaying(); break;
    case "timeup":    renderTimeup(); break;
    case "result":    renderResult(); break;
  }
}

// ---- Title 파티클 초기화 ----
const titleParticles = [];
const TITLE_PARTICLE_COLORS = [THEME.mintLight, THEME.cream, THEME.peach, "#FFE082"];
function initTitleParticles() {
  if (titleParticles.length > 0) return;
  for (let i = 0; i < 25; i++) {
    titleParticles.push(spawnTitleParticle(true));
  }
}
function spawnTitleParticle(randomY) {
  return {
    x: Math.random() * canvasWidth,
    y: randomY ? Math.random() * canvasHeight : canvasHeight + Math.random() * s(20),
    size: 3 + Math.random() * 5,
    speed: 0.2 + Math.random() * 0.3,
    alpha: 0.2 + Math.random() * 0.3,
    color: TITLE_PARTICLE_COLORS[Math.floor(Math.random() * TITLE_PARTICLE_COLORS.length)],
    wobbleAmp: Math.random() < 0.5 ? (1 + Math.random() * 2) : 0,
    wobbleSpeed: 0.5 + Math.random() * 1.5,
    wobblePhase: Math.random() * Math.PI * 2,
  };
}

// ---- Title 화면 ----
function renderTitle() {
  const cx = canvasWidth / 2;
  const now = Date.now() / 1000;
  initTitleParticles();

  // 1. 배경 그라데이션 (상단 민트 → 하단 크림, 은은하게)
  const hueShift = Math.sin(now * 0.628) * 3;
  const topR = 181 + Math.round(hueShift * 0.3);
  const topG = 232 + Math.round(hueShift * -0.2);
  const topB = 223 + Math.round(hueShift * 0.4);
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
  bgGrad.addColorStop(0, `rgb(${topR}, ${topG}, ${topB})`);
  bgGrad.addColorStop(1, THEME.bgPrimary);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  // 2. 떠다니는 파스텔 파티클 (크기 키우고 투명도 높여 은은하게)
  for (let i = titleParticles.length - 1; i >= 0; i--) {
    const p = titleParticles[i];
    p.y -= p.speed;
    if (p.wobbleAmp > 0) {
      p.x += Math.sin(now * p.wobbleSpeed + p.wobblePhase) * p.wobbleAmp * 0.3;
    }
    if (p.y < -s(p.size)) {
      titleParticles[i] = spawnTitleParticle(false);
      continue;
    }
    ctx.globalAlpha = p.alpha * 0.7;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, s(p.size * 0.7), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 3. 제목 (로고 이미지 우선, 없으면 텍스트)
  const titleScale = 1.0 + 0.02 * Math.sin(now * Math.PI);
  const titleFloat = Math.sin(now * Math.PI * 2 / 3) * s(2);
  const titleY = canvasHeight * 0.30 + titleFloat;

  const logoImg = ASSETS.images.titleLogo ? getImage(ASSETS.images.titleLogo) : null;
  if (logoImg) {
    const logoW = canvasWidth * 0.7;
    const logoH = logoW * (logoImg.naturalHeight / logoImg.naturalWidth);
    ctx.save();
    ctx.translate(cx, titleY);
    ctx.scale(titleScale, titleScale);
    ctx.drawImage(logoImg, -logoW / 2, -logoH / 2, logoW, logoH);
    ctx.restore();
  } else {
    const baseTitleSize = Math.min(s(48), canvasWidth * 0.12);
    const titleSize = baseTitleSize * titleScale;

    ctx.save();
    // 텍스트 그림자 (depth)
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = s(4);
    ctx.shadowOffsetY = s(2);
    ctx.fillStyle = THEME.mintDark;
    ctx.font = `bold ${titleSize}px ${FONT.number}`;
    ctx.fillText("미니미니", cx, titleY - titleSize * 0.55);
    ctx.fillText("두더지", cx, titleY + titleSize * 0.55);
    ctx.restore();
  }

  // 태그라인
  ctx.fillStyle = THEME.textSecondary;
  ctx.font = `${s(14)}px ${FONT.text}`;
  ctx.fillText(CONFIG.titleTagline, cx, titleY + s(70));

  // 4. 버튼 영역
  const btnPulse = 1.0 + 0.015 * Math.sin(now * Math.PI * 2 / 1.5);
  const btnW = s(220);
  const btnH = s(50);
  const btnGap = s(14);
  const btnStartY = canvasHeight * 0.62;

  // 시작하기 버튼 (알약형, 민트)
  ctx.save();
  const btn1CY = btnStartY + btnH / 2;
  ctx.translate(cx, btn1CY);
  ctx.scale(btnPulse, btnPulse);
  ctx.translate(-cx, -btn1CY);
  drawPillButton(cx - btnW / 2, btnStartY, btnW, btnH, "시작하기", {
    fillColor: THEME.mint, textColor: THEME.textLight, fontSize: s(18), fontFace: FONT.text
  });
  ctx.restore();

  // 기록 보기 버튼 (반투명 배경 + 민트 테두리)
  const btn2Y = btnStartY + btnH + btnGap;
  ctx.save();
  drawRoundedRect(cx - btnW / 2, btn2Y, btnW, btnH, btnH / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  ctx.restore();
  drawPillButton(cx - btnW / 2, btn2Y, btnW, btnH, "기록 보기", {
    fillColor: THEME.mint, outline: true, fontSize: s(Math.round(18 * 0.8)), fontFace: FONT.text,
    borderWidth: s(2)
  });
}

// ---- Tutorial 화면 ----
function renderTutorial() {
  // 타이틀과 동일 배경
  const now = Date.now() / 1000;
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
  bgGrad.addColorStop(0, THEME.mintLight);
  bgGrad.addColorStop(1, THEME.bgPrimary);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  const cx = canvasWidth / 2;
  const cardPad = s(16);
  const cardW = canvasWidth - cardPad * 2;
  const cardH = canvasHeight * 0.65;
  const cardX = cardPad;
  const cardY = canvasHeight * 0.08;

  // 카드 패널
  drawPanel(cardX, cardY, cardW, cardH, { cornerRadius: s(20) });

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 카드 타이틀
  ctx.fillStyle = THEME.mintDark;
  ctx.font = `bold ${s(24)}px ${FONT.text}`;
  ctx.fillText("How to Play", cx, cardY + s(30));

  // 항목들
  const items = [
    { draw: drawBasicTargetIcon, text: "터치하여 점수 획득!", score: `+${CONFIG.scoreBasic}점`, color: THEME.mint },
    { draw: drawTrapTargetIcon, text: "터치 금지! 감점 주의", score: `${CONFIG.scoreTrap}점`, color: THEME.coral },
    { draw: drawTimingTargetIcon, text: "링이 줄어들 때 터치!", score: `최대 +${CONFIG.scoreTimingE3}점`, color: THEME.gold },
    { draw: drawSlideTargetIcon, text: "화살표 방향으로 밀어!", score: `+${CONFIG.scoreSlideSuccess}점`, color: "#9B8EC7" },
  ];

  const itemStartY = cardY + s(60);
  const itemSpacing = (cardH - s(100)) / items.length;
  const iconX = cardX + s(45);
  const textX = cardX + s(80);
  const iconSize = s(34);

  for (let i = 0; i < items.length; i++) {
    const iy = itemStartY + itemSpacing * i + itemSpacing / 2;

    // 구분선 (첫 항목 제외)
    if (i > 0) {
      ctx.strokeStyle = 'rgba(0,0,0,0.05)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cardX + s(20), iy - itemSpacing / 2);
      ctx.lineTo(cardX + cardW - s(20), iy - itemSpacing / 2);
      ctx.stroke();
    }

    // 아이콘
    items[i].draw(iconX, iy, iconSize);

    // 텍스트
    ctx.textAlign = "left";
    ctx.fillStyle = THEME.textPrimary;
    ctx.font = `${s(15)}px ${FONT.text}`;
    ctx.fillText(items[i].text, textX, iy - s(8));
    ctx.fillStyle = items[i].color;
    ctx.font = `bold ${s(13)}px ${FONT.number}`;
    ctx.fillText(items[i].score, textX, iy + s(12));
  }

  // 하단 시작 버튼
  const btnW = s(200);
  const btnH = s(46);
  const btnY = cardY + cardH + s(16);
  drawPillButton(cx - btnW / 2, btnY, btnW, btnH, "시작하기", {
    fillColor: THEME.mint, textColor: THEME.textLight, fontSize: s(18), fontFace: FONT.text
  });

  // 안내 텍스트
  ctx.textAlign = "center";
  const alpha = 0.4 + 0.3 * Math.sin(now * 3);
  ctx.fillStyle = `rgba(91, 168, 156, ${alpha})`;
  ctx.font = `${s(13)}px ${FONT.text}`;
  ctx.fillText("화면을 터치하세요", cx, btnY + btnH + s(20));
}

// ---- Countdown 화면 ----
function renderCountdown() {
  renderGrid();

  // 반투명 오버레이
  ctx.fillStyle = "rgba(255, 248, 240, 0.75)";
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const inSecond = countdownTimer % 1.0;

  // Scale 1.5 → 1.0 바운스 (EaseOutBack)
  const scaleT = Math.min(inSecond / 0.3, 1.0);
  const popScale = 1.0 + (1.5 - 1.0) * (1 - easeOutBack(scaleT));

  // 페이드: 0.7초 이후 페이드아웃
  const alpha = inSecond < 0.7 ? 1.0 : 1.0 - (inSecond - 0.7) / 0.3;

  ctx.save();
  ctx.translate(canvasWidth / 2, canvasHeight * 0.45);
  ctx.scale(popScale, popScale);
  ctx.globalAlpha = clamp(alpha, 0, 1);

  // 숫자 (캔버스 폭의 40% 크기, 글로우)
  const numText = String(countdownNumber);
  const fontSize = canvasWidth * 0.4;
  ctx.shadowColor = THEME.mint;
  ctx.shadowBlur = s(15);
  ctx.fillStyle = THEME.mint;
  ctx.font = `bold ${fontSize}px ${FONT.number}`;
  ctx.fillText(numText, 0, 0);
  ctx.shadowColor = 'transparent';

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- Playing 화면 ----
function renderPlaying() {
  // 배경 반짝임 (가장 뒤 레이어)
  const now = Date.now() / 1000;
  for (const sp of bgSparkles) {
    sp.y -= sp.speed / 60; // 프레임당 이동
    if (sp.y < -0.02) { sp.y = 1.02; sp.x = Math.random(); }
    const alpha = (0.15 + 0.12 * Math.sin(now * 2.5 + sp.phase)) * 0.7;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = sp.phase % 2 < 1 ? THEME.mintLight : THEME.cream;
    ctx.beginPath();
    ctx.arc(sp.x * canvasWidth, sp.y * canvasHeight, s(sp.size), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 히트 밝기 펄스
  if (bgHitPulse > 0) {
    const pulseAlpha = (comboCount >= 20 ? CONFIG.bgHitPulseCombo20
                      : comboCount >= 10 ? CONFIG.bgHitPulseCombo10
                      : CONFIG.bgHitPulseAlpha) * (bgHitPulse / CONFIG.bgHitPulseDuration);
    ctx.fillStyle = `rgba(255,255,255,${pulseAlpha})`;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  }

  // Fever 배경 (크림→밝은 피치/코랄 톤으로 부드럽게 전환)
  if (isFever) {
    const feverBgGrad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
    feverBgGrad.addColorStop(0, 'rgba(255,181,167,0.15)');
    feverBgGrad.addColorStop(1, 'rgba(255,138,128,0.10)');
    ctx.fillStyle = feverBgGrad;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
    const flashAlpha = 0.06 + 0.04 * Math.sin(Date.now() / 150);
    ctx.fillStyle = `rgba(255, 215, 0, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  }

  // HUD는 흔들림 없이 먼저 렌더링
  renderHUD();
  drawMilestone(ctx);

  // 그리드 영역에만 흔들림 적용
  if (screenShake.active) {
    const dur = screenShake.duration || CONFIG.screenShakeDuration;
    const progress = 1 - screenShake.timer / dur; // 0→1
    const decay = 1 - progress; // 감쇠: 1→0
    const wave = Math.sin(progress * Math.PI * 2 * CONFIG.screenShakeCycles);
    const shakeX = wave * screenShake.intensity * decay;
    ctx.save();
    ctx.translate(shakeX, 0);
    // 회전 흔들림 (타이밍 E-3)
    if (screenShake.rotationDeg) {
      const rotRad = (screenShake.rotationDeg * Math.PI / 180) * wave * decay;
      ctx.translate(canvasWidth / 2, canvasHeight / 2);
      ctx.rotate(rotRad);
      ctx.translate(-canvasWidth / 2, -canvasHeight / 2);
    }
  }

  renderGrid();

  if (isFever) {
    renderPinata();
  } else {
    renderTargets();
  }

  renderHitFlashes();
  renderParticles();
  renderFloatingTexts();
  renderRipples();

  if (screenShake.active) {
    ctx.restore();
  }

  // Fever 종료 예고 깜빡임 (마지막 1초)
  if (isFever && feverTimer > 0 && feverTimer <= CONFIG.feverWarningTime && !feverPopPhase) {
    const flash = Math.floor(feverTimer / CONFIG.feverWarningFlashInterval) % 2 === 0;
    if (flash) {
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      ctx.restore();
    }
  }

  // Fever 인트로 텍스트 (무지개 그라데이션 + 글로우 + 바운스)
  if (feverIntro) {
    const p = feverIntroTimer / FEVER_INTRO_DURATION;
    const fadeOutStart = 0.5 / FEVER_INTRO_DURATION;
    const alpha = p < fadeOutStart ? 1.0 : 1.0 - (p - fadeOutStart) / (1 - fadeOutStart);
    const scaleUpEnd = 0.3 / FEVER_INTRO_DURATION;
    const scaleP = clamp(p / scaleUpEnd, 0, 1);
    const textScale = 0.3 + 0.7 * easeOutBack(scaleP);
    // 바운스 (등장 후 미세 떨림)
    const bounce = scaleP >= 1 ? 1.0 + 0.02 * Math.sin(Date.now() / 80) : 1.0;

    ctx.save();
    ctx.globalAlpha = clamp(alpha, 0, 1) * 0.95;
    ctx.translate(canvasWidth / 2, canvasHeight * 0.45);
    ctx.scale(textScale * bounce, textScale * bounce);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const fontSize = s(48);
    ctx.font = `bold ${fontSize}px ${FONT.number}`;

    // 글로우
    ctx.shadowColor = THEME.gold;
    ctx.shadowBlur = s(20);

    // 무지개 그라데이션
    const rainbowGrad = ctx.createLinearGradient(-s(120), 0, s(120), 0);
    const hueOffset = (Date.now() / 20) % 360;
    rainbowGrad.addColorStop(0, `hsl(${hueOffset % 360}, 90%, 60%)`);
    rainbowGrad.addColorStop(0.25, `hsl(${(hueOffset + 60) % 360}, 90%, 60%)`);
    rainbowGrad.addColorStop(0.5, `hsl(${(hueOffset + 120) % 360}, 90%, 60%)`);
    rainbowGrad.addColorStop(0.75, `hsl(${(hueOffset + 240) % 360}, 90%, 60%)`);
    rainbowGrad.addColorStop(1, `hsl(${(hueOffset + 300) % 360}, 90%, 60%)`);

    // 외곽선
    ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
    ctx.lineWidth = s(5);
    ctx.strokeText("FEVER TIME!", 0, 0);

    // 텍스트
    ctx.fillStyle = rainbowGrad;
    ctx.fillText("FEVER TIME!", 0, 0);

    ctx.shadowColor = 'transparent';
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

function drawMilestone(ctx) {
  if (milestonePhase === 'idle' || milestoneNumber === 0) return;

  ctx.save();
  ctx.globalAlpha = milestoneAlpha;

  const text = milestoneNumber + ' COMBO!';
  const fontSize = canvasWidth * 0.10;
  ctx.font = `${fontSize}px "Black Han Sans"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const x = canvasWidth / 2;
  let y = canvasHeight * 0.16;

  // 페이드아웃 중이면 위로 떠오름
  if (milestonePhase === 'fadeout') {
    y -= (1 - milestoneAlpha) * 20;
  }

  // scale 적용
  ctx.translate(x, y);
  ctx.scale(milestoneScale, milestoneScale);

  // 색상 (구간별)
  let color;
  if (milestoneNumber >= 50) {
    const hue = (Date.now() / 10) % 360;
    color = 'hsl(' + hue + ', 80%, 55%)';
  } else if (milestoneNumber >= 40) {
    color = THEME.gold;
  } else if (milestoneNumber >= 30) {
    color = THEME.coral;
  } else if (milestoneNumber >= 20) {
    color = THEME.gold;
  } else {
    color = THEME.mintDark;
  }

  // 글로우
  ctx.shadowColor = 'rgba(255,255,255,0.8)';
  ctx.shadowBlur = 6;

  // 외곽선 (가독성)
