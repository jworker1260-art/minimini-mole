  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 3;
  ctx.strokeText(text, 0, 0);

  // 메인 텍스트
  ctx.fillStyle = color;
  ctx.fillText(text, 0, 0);

  ctx.restore();
}

function renderHUD() {
  const margin = s(12);
  const panelY = s(10);
  const panelW = canvasWidth - margin * 2;
  const panelH = s(56);
  const panelR = s(CONFIG.uiCornerRadius);

  // ── 상단 정보 패널 (반투명 카드) ──
  drawPanel(margin, panelY, panelW, panelH, { cornerRadius: panelR });

  const pad = s(12);

  // 점수 (왼쪽): SCORE 라벨 + 숫자
  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  // 텍스트 미세 그림자
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = s(3);
  ctx.shadowOffsetY = s(1);

  ctx.fillStyle = THEME.textSecondary;
  ctx.font = `${s(10)}px ${FONT.text}`;
  ctx.fillText("SCORE", margin + pad, panelY + panelH * 0.32);

  ctx.fillStyle = THEME.textPrimary;
  ctx.font = `bold ${s(28)}px ${FONT.number}`;
  ctx.fillText(score.toString(), margin + pad, panelY + panelH * 0.68);
  ctx.restore();

  // 타이머 (오른쪽): 둥근 사각형 안에 남은 초
  const timerSeconds = Math.ceil(timeRemaining);
  const isUrgent10 = timeRemaining <= 10;
  const isUrgent5 = timeRemaining <= 5;
  const timerW = s(48);
  const timerH = s(36);
  const timerX = margin + panelW - pad - timerW;
  const timerY = panelY + (panelH - timerH) / 2;
  const timerR = s(10);

  // 타이머 배경
  const timerBgColor = isUrgent10 ? (isUrgent5 ? 'rgba(255,138,128,0.15)' : 'rgba(255,138,128,0.08)') : 'rgba(0,0,0,0.04)';
  drawRoundedRect(timerX, timerY, timerW, timerH, timerR);
  ctx.fillStyle = timerBgColor;
  ctx.fill();

  // 타이머 숫자
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  let timerColor = THEME.textPrimary;
  if (isUrgent5) {
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 120);
    timerColor = `rgba(255, 138, 128, ${pulse})`;
  } else if (isUrgent10) {
    timerColor = THEME.coral;
  }
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = s(2);
  ctx.shadowOffsetY = s(1);
  ctx.fillStyle = timerColor;
  ctx.font = `bold ${s(22)}px ${FONT.number}`;
  ctx.fillText(timerSeconds.toString(), timerX + timerW / 2, timerY + timerH / 2);
  ctx.restore();

  // ── Fever 게이지 바 ──
  const barX = margin;
  const barY = panelY + panelH + s(6);
  const barWidth = panelW;
  const barHeight = s(13);
  const barRadius = s(7);

  // 바 배경 (약간 어둡게)
  drawRoundedRect(barX, barY, barWidth, barHeight, barRadius);
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fill();

  // 채워진 부분
  const fillRatio = feverGauge / CONFIG.feverGaugeMax;
  if (fillRatio > 0) {
    const fillWidth = Math.max(barHeight, barWidth * fillRatio);
    ctx.save();
    drawRoundedRect(barX, barY, fillWidth, barHeight, barRadius);
    ctx.clip();
    if (isFever) {
      const feverGrad = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
      feverGrad.addColorStop(0, THEME.gold);
      feverGrad.addColorStop(1, THEME.coral);
      ctx.fillStyle = feverGrad;
    } else {
      // 민트 → 피치 그라데이션
      const grad = ctx.createLinearGradient(barX, 0, barX + barWidth, 0);
      grad.addColorStop(0, THEME.mint);
      grad.addColorStop(1, THEME.peach);
      ctx.fillStyle = grad;
    }
    ctx.fillRect(barX, barY, fillWidth, barHeight);
    // 상단 하이라이트 (광택)
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#FFFFFF";
    ctx.fillRect(barX, barY, fillWidth, barHeight * 0.4);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // "FEVER" 텍스트 (바 안에)
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.globalAlpha = fillRatio > 0.5 ? 0.5 : 0.25;
  ctx.fillStyle = "#FFFFFF";
  ctx.font = `bold ${s(9)}px ${FONT.text}`;
  ctx.fillText("FEVER", barX + barWidth / 2, barY + barHeight / 2);
  ctx.globalAlpha = 1;

  // 함정 터치: 게이지 빨간 깜빡임
  if (gaugeFlashTimer > 0) {
    const flashAlpha = 0.5 * (gaugeFlashTimer / CONFIG.gaugeTrapFlashDuration);
    ctx.save();
    ctx.globalAlpha = flashAlpha * (Math.sin(gaugeFlashTimer * 30) > 0 ? 1 : 0.3);
    ctx.fillStyle = "#FF4444";
    drawRoundedRect(barX, barY, barWidth, barHeight, barRadius);
    ctx.fill();
    ctx.restore();
  }

  // 80% 이상: 반짝임
  if (fillRatio >= 0.8 && !isFever) {
    const fillWidth = barWidth * fillRatio;
    const now = Date.now() / 1000;
    for (let i = 0; i < 4; i++) {
      const phase = (now * 1.2 + i * 0.25) % 1.0;
      const sparkX = barX + fillWidth * phase;
      const sparkY = barY + barHeight / 2;
      const sparkAlpha = Math.sin(phase * Math.PI) * (0.5 + 0.5 * Math.sin(now * 8 + i * 2));
      if (sparkAlpha > 0.1) {
        ctx.globalAlpha = sparkAlpha * 0.9;
        ctx.fillStyle = "#FFFFFF";
        ctx.beginPath();
        ctx.arc(sparkX, sparkY, s(2.5 + Math.sin(now * 6 + i) * 1), 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  // 100% 번쩍 플래시
  if (feverIntro && feverIntroTimer < 0.3) {
    const flashAlpha = (1 - feverIntroTimer / 0.3) * 0.7;
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = "#FFFFFF";
    drawRoundedRect(barX - s(2), barY - s(2), barWidth + s(4), barHeight + s(4), barRadius + s(1));
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Fever 라벨
  if (isFever) {
    ctx.textAlign = "center";
    const feverWarning = feverTimer <= CONFIG.feverWarningTime && feverTimer > 0;
    ctx.fillStyle = feverWarning ? THEME.coral : THEME.gold;
    ctx.font = `bold ${s(12)}px ${FONT.number}`;
    ctx.fillText(`FEVER! ${Math.ceil(feverTimer)}s`, canvasWidth / 2, barY + barHeight + s(10));
  }

  // ── 콤보 카운터 ──
  if (comboCount > 0) {
    const comboX = margin + panelW - pad;
    const comboY = barY + barHeight + s(14);
    ctx.textAlign = "right";
    ctx.textBaseline = "middle";

    let comboFontScale = 1.0;
    let comboGlowBlur = 0;
    let comboColor = THEME.textSecondary;
    const now = Date.now() / 1000;

    if (comboCount >= 30) {
      comboFontScale = 1.2;
      comboGlowBlur = s(8);
      // 코랄/금 깜빡임 (0.3초 주기)
      const flick = Math.sin(now * (Math.PI * 2 / 0.3));
      comboColor = flick > 0 ? THEME.coral : THEME.gold;
    } else if (comboCount >= 20) {
      comboFontScale = 1.2;
      comboGlowBlur = s(6);
      comboColor = THEME.gold;
    } else if (comboCount >= 10) {
      comboFontScale = 1.15;
      comboGlowBlur = s(4);
      comboColor = THEME.gold;
    }

    // 10+ 맥박
    let comboPulse = 1.0;
    if (comboCount >= 10) {
      comboPulse = 1.0 + 0.05 * Math.sin(now * (Math.PI * 2 / 0.5));
    }

    const comboSize = s(14) * comboFontScale * comboPulse;
    ctx.save();
    if (comboCount >= 10) {
      ctx.shadowColor = THEME.gold;
      ctx.shadowBlur = comboGlowBlur;
    }
    ctx.fillStyle = comboColor;
    ctx.font = `bold ${comboSize}px ${FONT.number}`;
    ctx.fillText(`${comboCount} COMBO`, comboX, comboY);
    ctx.restore();
  }
}

// 젤리 셀 색상 (타겟 타입별)
function getJellyColors(targetType) {
  if (isFever) return { fill: 'rgba(255,181,167,0.15)', border: 'rgba(255,181,167,0.30)', highlight: 'rgba(255,255,255,0.25)' };
  switch (targetType) {
    case 'trap':    return { fill: 'rgba(255,138,128,0.12)', border: 'rgba(255,138,128,0.25)', highlight: 'rgba(255,255,255,0.25)' };
    case 'timing':
    case 'timingE1': case 'timingE2': case 'timingE3':
                    return { fill: 'rgba(255,215,0,0.10)',   border: 'rgba(255,215,0,0.25)',   highlight: 'rgba(255,255,255,0.25)' };
    case 'slide':   return { fill: 'rgba(180,130,255,0.10)', border: 'rgba(180,130,255,0.25)', highlight: 'rgba(255,255,255,0.25)' };
    case 'basic':   return { fill: 'rgba(126,206,192,0.15)', border: 'rgba(126,206,192,0.25)', highlight: 'rgba(255,255,255,0.30)' };
    default:        return { fill: 'rgba(126,206,192,0.12)', border: 'rgba(126,206,192,0.25)', highlight: 'rgba(255,255,255,0.30)' };
  }
}

function renderGrid() {
  const cs = gridLayout.cellSize;
  const r = s(12);

  // 그리드 전체 영역 배경
  const pad = s(8);
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = s(10);
  ctx.shadowOffsetY = s(3);
  ctx.fillStyle = THEME.bgGrid;
  drawRoundedRect(
    gridLayout.offsetX - pad,
    gridLayout.offsetY - pad,
    gridLayout.totalWidth + pad * 2,
    gridLayout.totalHeight + pad * 2,
    s(16));
  ctx.fill();
  ctx.shadowColor = 'transparent';
  ctx.restore();

  const now = Date.now() / 1000;
  const jellyR = cs * 0.38; // 젤리 반지름 (약간 더 크게)
  const breathPeriod = isFever ? (2 * Math.PI / 2.5) * 1.5 : 2 * Math.PI / 2.5; // Fever시 1.5배 빠름

  for (let ci = 0; ci < gridLayout.cells.length; ci++) {
    const cell = gridLayout.cells[ci];
    const phase = ci * 0.7;

    // 셀 배경 (기존 사각형)
    ctx.fillStyle = THEME.gridCellBg;
    roundRect(ctx, cell.x, cell.y, cs, cs, r);
    ctx.fill();
    ctx.strokeStyle = THEME.gridLine;
    ctx.lineWidth = s(1);
    roundRect(ctx, cell.x, cell.y, cs, cs, r);
    ctx.stroke();

    // 타겟 정보 확인
    const target = targets.find(t => t.cellIndex === ci && t.state !== "despawning");
    const hasTarget = !!target;

    // 젤리 색상 결정
    const jc = hasTarget ? getJellyColors(target.type) : getJellyColors(null);

    // 말랑말랑 애니메이션 (X/Y 반대 위상)
    let jScaleX, jScaleY;
    if (hasTarget) {
      jScaleX = 1.0;
      jScaleY = 1.0;
    } else {
      const sinVal = Math.sin(now * breathPeriod + phase);
      jScaleX = 0.97 + 0.04 * (0.5 + 0.5 * sinVal);     // 0.97~1.01
      jScaleY = 0.97 + 0.04 * (0.5 - 0.5 * sinVal);     // 1.01~0.97 (반대)
    }

    // 히트 후 복귀 바운스
    const bounce = jellyCellBounce[ci];
    if (bounce && !hasTarget) {
      const bp = clamp(bounce.timer / bounce.duration, 0, 1);
      const bounceScale = bp < 0.5
        ? easeOutBack(bp * 2) * 0.8   // 0→0.8
        : 0.8 + (1.0 - 0.8) * easeOutQuad((bp - 0.5) * 2); // 0.8→1.0
      jScaleX *= bounceScale;
      jScaleY *= bounceScale;
    }

    // 빈 칸 헛스윙 찌그러짐
    const squish = jellyCellSquish[ci];
    if (squish) {
      const sp = clamp(squish.timer / squish.duration, 0, 1);
      const recovery = easeOutBack(sp);
      jScaleX *= 1.1 - 0.1 * recovery;   // 1.1 → 1.0
      jScaleY *= 0.85 + 0.15 * recovery;  // 0.85 → 1.0
    }

    // 젤리 그리기
    ctx.save();
    ctx.translate(cell.centerX, cell.centerY);
    ctx.scale(jScaleX, jScaleY);

    // 하단 그림자
    ctx.save();
    ctx.shadowColor = isFever ? 'rgba(255,181,167,0.15)' : 'rgba(126,206,192,0.15)';
    ctx.shadowBlur = s(4);
    ctx.shadowOffsetY = s(2);
    ctx.beginPath();
    ctx.arc(0, 0, jellyR, 0, Math.PI * 2);
    ctx.fillStyle = jc.fill;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.restore();

    // 테두리
    ctx.beginPath();
    ctx.arc(0, 0, jellyR, 0, Math.PI * 2);
    ctx.strokeStyle = jc.border;
    ctx.lineWidth = s(2);
    ctx.stroke();

    // 상단 하이라이트 (광택)
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, jellyR, 0, Math.PI * 2);
    ctx.clip();
    ctx.beginPath();
    ctx.ellipse(0, -jellyR * 0.35, jellyR * 0.7, jellyR * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = jc.highlight;
    ctx.fill();
    ctx.restore();

    ctx.restore(); // translate+scale 해제
  }

  // 젤리 링 이펙트 렌더링
  for (const jr of jellyRings) {
    if (jr.alpha <= 0) continue;
    ctx.beginPath();
    ctx.arc(jr.x, jr.y, jr.radius, 0, Math.PI * 2);
    ctx.strokeStyle = jr.color;
    ctx.globalAlpha = jr.alpha;
    ctx.lineWidth = s(2) * (1 - jr.timer / jr.duration);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function renderTargets() {
  for (const t of targets) {
    const cell = gridLayout.cells[t.cellIndex];
    const cx = cell.centerX;
    const cy = cell.centerY + (t.bounceOffset || 0);
    const baseSize = gridLayout.cellSize * 0.35;
    const size = baseSize * t.scale;

    if (size <= 0 && t.state !== "pop") continue;

    ctx.save();
    ctx.translate(cx, cy);

    // pop 상태: Squash & Stretch + 알파 + 회전 적용
    if (t.state === "pop") {
      const sx = t.scaleX || 1;
      const sy = t.scaleY || 1;
      if (sx <= 0.01 && sy <= 0.01) { ctx.restore(); continue; }
      ctx.globalAlpha = t.hitAlpha || 1;
      if (t.hitRotation) ctx.rotate(t.hitRotation);
      ctx.scale(sx, sy);
    }

    // 타이밍 타겟 떨림/멈춤/발광 (모든 시각 모드 공통)
    if (t.type === "timing" && t.state === "std") {
      const iScale = t.indicatorScale;
      const inE3 = iScale <= CONFIG.timingE3TrembleStart;
      const isStill = iScale <= CONFIG.timingE3StillPoint;

      if (isStill) {
        // 멈춤 + 금색 발광 (최적 터치 타이밍)
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = 14 * scaleRatio;
        // 멈춤 진입 시 흰색 링 반짝 (1회)
        if (!t._stillFlashed) {
          t._stillFlashed = true;
          const cell = gridLayout.cells[t.cellIndex];
          hitFlashes.push({
            x: cell.centerX, y: cell.centerY + (t.bounceOffset || 0),
            timer: 0, duration: 0.15, startAlpha: 0.5, alpha: 0.5,
            startRadius: baseSize * 1.5, radius: baseSize * 1.5,
            color: THEME.gold, startLineWidth: 3 * scaleRatio, lineWidth: 3 * scaleRatio
          });
        }
      } else if (inE3) {
        // E-3 구간: 빠른 주기 떨림 ("지금이야!" 힌트)
        const shake = CONFIG.timingA_e3ShakeIntensity * scaleRatio;
        const phase = (Date.now() % CONFIG.timingA_e3ShakePeriod) / CONFIG.timingA_e3ShakePeriod;
        const shakeX = Math.sin(phase * Math.PI * 2) * shake;
        const shakeY = Math.cos(phase * Math.PI * 2 * 1.3) * shake * 0.5;
        ctx.translate(shakeX, shakeY);
      } else {
        // E-3 이전: 일반 랜덤 떨림
        const shakeX = (Math.random() - 0.5) * CONFIG.timingShakeIntensity * scaleRatio;
        const shakeY = (Math.random() - 0.5) * CONFIG.timingShakeIntensity * scaleRatio;
        ctx.translate(shakeX, shakeY);
      }
    }

    // pop 상태에서는 baseSize를 직접 사용 (scaleX/scaleY가 변형 담당)
    const drawSize = t.state === "pop" ? baseSize : size;

    // 모드 C: 하트비트 스케일 적용 (std 상태에서만)
    if (t.type === "timing" && t.state === "std" && CONFIG.timingVisualMode === 'C') {
      const progress = 1 - t.indicatorScale; // 0→1 진행
      const period = lerp(CONFIG.timingC_periodStart, CONFIG.timingC_periodEnd, progress);
      const pulsePhase = (Date.now() / 1000 % period) / period;
      const pulse = CONFIG.timingC_pulseMin + (CONFIG.timingC_pulseMax - CONFIG.timingC_pulseMin) * (0.5 + 0.5 * Math.sin(pulsePhase * Math.PI * 2));
      ctx.scale(pulse, pulse);
    }

    // 모드 A: E-3 구간 타겟 발광
    if (t.type === "timing" && t.state === "std" && CONFIG.timingVisualMode === 'A') {
      const inE3 = t.indicatorScale <= CONFIG.timingE2Threshold;
      if (inE3) {
        ctx.shadowColor = "#FFD700";
        ctx.shadowBlur = CONFIG.timingA_e3GlowBlur * scaleRatio;
      }
    }

    // 이미지 렌더링 시도 → 실패 시 코드 렌더링 폴백
    if (!drawTargetImage(t, drawSize)) {
      switch (t.type) {
        case "basic": drawBasicTarget(drawSize, t); break;
        case "trap": drawTrapTarget(drawSize, t); break;
        case "timing": drawTimingTarget(drawSize, t, cx, cy); break;
        case "fever": drawFeverTarget(drawSize, t); break;
        case "slide": drawSlideTarget(drawSize, t); break;
      }
    }

    ctx.restore();

    // 타이밍 인디케이터 (타겟 밖에서 그림)
    if (t.type === "timing" && t.state !== "pop" && t.state !== "despawning") {
      const mode = CONFIG.timingVisualMode;
      if (mode === 'A') {
        drawTimingIndicatorA(cx, cy + (t.bounceOffset || 0), baseSize, t.indicatorScale);
      } else if (mode === 'B') {
        drawTimingIndicatorB(cx, cy + (t.bounceOffset || 0), baseSize, t.indicatorScale);
      } else if (mode === 'C') {
        drawTimingIndicatorC(cx, cy + (t.bounceOffset || 0), baseSize, t.indicatorScale, t);
      }
    }
  }
}

// ---- 피냐타 렌더링 ----
function renderPinata() {
  if (pinataScale <= 0) return;

  ctx.save();
  ctx.translate(pinataX, pinataY);

  // 흔들림 회전
  if (pinataRotation !== 0) {
    ctx.rotate(pinataRotation);
  }

  // 스케일 (등장 시 easeOutBack, 폭발 시 raw)
  const displayScale = pinataScale <= 1 ? easeOutBack(pinataScale) : pinataScale;
  ctx.scale(displayScale, displayScale);

  const pinataImg = getImage(ASSETS.pinata.image);
  if (pinataImg) {
    const aspect = pinataImg.naturalWidth / pinataImg.naturalHeight;
    const drawH = pinataRadius * 2;
    const drawW = drawH * aspect;
    ctx.drawImage(pinataImg, -drawW / 2, -drawH / 2, drawW, drawH);
  } else {
    drawPinataCharacter(0, 0, pinataRadius);
  }

  ctx.restore();
}

// ============================================================
// 타겟 이미지 렌더링
// ============================================================

// 이미지가 있으면 렌더링하고 true 반환, 없으면 false (코드 렌더링 폴백)
function drawTargetImage(target, size) {
  const assetDef = ASSETS.targets[target.type];
  if (!assetDef) return false;

  // 상태에 따라 이미지 경로 결정
  let imgPath;
  if (target.state === "pop" && assetDef.images.pop) {
    imgPath = assetDef.images.pop;
  } else if (assetDef.images.std) {
    imgPath = assetDef.images.std;
  } else {
    return false;
  }

  const img = getImage(imgPath);
  if (!img) return false;

  // 비율 유지하면서 타겟 칸 크기에 맞춤
  const drawDiameter = size * 2;
  const aspect = img.naturalWidth / img.naturalHeight;
  let drawW, drawH;
  if (aspect >= 1) {
    drawW = drawDiameter;
    drawH = drawDiameter / aspect;
  } else {
    drawH = drawDiameter;
    drawW = drawDiameter * aspect;
  }

  ctx.drawImage(img, -drawW / 2, -drawH / 2, drawW, drawH);
  return true;
}

// ============================================================
// 타겟 코드 렌더링 (이미지 없을 때 폴백)
// ============================================================

// -- 기본 타겟: 원형 + 귀여운 표정 --
function drawBasicTarget(size, target) {
  const colors = ASSETS.targets.basic.colors;

  // 몸체
  ctx.beginPath();
  ctx.arc(0, 0, size, 0, Math.PI * 2);
  ctx.fillStyle = colors.main;
  ctx.fill();

  // 볼터치
  ctx.beginPath();
  ctx.arc(-size * 0.5, size * 0.2, size * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 138, 128, 0.4)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(size * 0.5, size * 0.2, size * 0.2, 0, Math.PI * 2);
  ctx.fill();

  const isPop = target.state === "pop";

  // 눈
  ctx.fillStyle = colors.face;
  if (isPop) {
    // ^^ 눈
    ctx.lineWidth = s(2);
    ctx.strokeStyle = colors.face;
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, -size * 0.15);
    ctx.lineTo(-size * 0.2, -size * 0.3);
    ctx.lineTo(-size * 0.1, -size * 0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(size * 0.1, -size * 0.15);
    ctx.lineTo(size * 0.2, -size * 0.3);
    ctx.lineTo(size * 0.3, -size * 0.15);
    ctx.stroke();
  } else {
    // 점 눈
    ctx.beginPath();
    ctx.arc(-size * 0.2, -size * 0.15, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.2, -size * 0.15, size * 0.08, 0, Math.PI * 2);
    ctx.fill();
  }

  // 입 (3 모양)
  if (!isPop) {
    ctx.strokeStyle = colors.face;
    ctx.lineWidth = s(1.5);
    ctx.beginPath();
    ctx.arc(-size * 0.08, size * 0.15, size * 0.1, 0, Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(size * 0.08, size * 0.15, size * 0.1, 0, Math.PI);
    ctx.stroke();
  }
}

function drawBasicTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  if (!drawTargetImage({ type: "basic", state: "std" }, size / 2)) {
    drawBasicTarget(size / 2, { state: "std" });
  }
  ctx.restore();
}

// -- 함정 타겟: 가시 원형 + 화난 표정 --
function drawTrapTarget(size, target) {
  const colors = ASSETS.targets.trap.colors;

  // 가시
  const spikeCount = 7;
  ctx.beginPath();
  for (let i = 0; i < spikeCount * 2; i++) {
    const angle = (Math.PI * 2 * i) / (spikeCount * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? size * 1.25 : size * 0.85;
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = colors.main;
  ctx.fill();

  // 몸체 원
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
  ctx.fillStyle = "#D32F2F";
  ctx.fill();

  // 화난 눈 (반원, 위가 평평)
  ctx.fillStyle = colors.face;
  // 왼쪽 눈
  ctx.beginPath();
  ctx.arc(-size * 0.25, -size * 0.1, size * 0.12, 0, Math.PI);
  ctx.fill();
  // 오른쪽 눈
  ctx.beginPath();
  ctx.arc(size * 0.25, -size * 0.1, size * 0.12, 0, Math.PI);
  ctx.fill();

  // 눈썹 (찡그린)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.beginPath();
  ctx.moveTo(-size * 0.4, -size * 0.3);
  ctx.lineTo(-size * 0.15, -size * 0.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(size * 0.4, -size * 0.3);
  ctx.lineTo(size * 0.15, -size * 0.2);
  ctx.stroke();

  // 꼬인 입
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, size * 0.25);
  ctx.quadraticCurveTo(0, size * 0.15, size * 0.2, size * 0.25);
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.stroke();
}

function drawTrapTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  if (!drawTargetImage({ type: "trap", state: "std" }, size / 2.5)) {
    drawTrapTarget(size / 2.5, { state: "std" });
  }
  ctx.restore();
}

// -- 타이밍 타겟: 다이아몬드 + 불쌍한 표정 --
function drawTimingTarget(size, target, worldX, worldY) {
  const colors = ASSETS.targets.timing.colors;

  // 모드 C: E-3 구간에서 금색 변화
  const isE3C = CONFIG.timingVisualMode === 'C' && target.state === "std" && target.indicatorScale <= CONFIG.timingE2Threshold;
  const bodyColor = isE3C ? "#FFD700" : colors.main;

  // 다이아몬드 형태
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.lineTo(size * 0.75, 0);
  ctx.lineTo(0, size);
  ctx.lineTo(-size * 0.75, 0);
  ctx.closePath();
  ctx.fillStyle = bodyColor;
  ctx.fill();

  // 모드 C: E-3 발광
  if (isE3C) {
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 10 * scaleRatio;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  const isPop = target.state === "pop";
  const isE3 = target.indicatorScale <= CONFIG.timingE2Threshold;

  if (isPop) {
    // 환한 웃음
    ctx.fillStyle = colors.face;
    // ^^ 눈
    ctx.lineWidth = s(2);
    ctx.strokeStyle = colors.face;
    ctx.beginPath();
    ctx.moveTo(-size * 0.3, -size * 0.15);
    ctx.lineTo(-size * 0.2, -size * 0.3);
    ctx.lineTo(-size * 0.1, -size * 0.15);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(size * 0.1, -size * 0.15);
    ctx.lineTo(size * 0.2, -size * 0.3);
    ctx.lineTo(size * 0.3, -size * 0.15);
    ctx.stroke();
  } else {
    // 큰 동그란 눈
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.arc(-size * 0.2, -size * 0.15, size * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.2, -size * 0.15, size * 0.15, 0, Math.PI * 2);
    ctx.fill();
    // 눈동자
    ctx.fillStyle = colors.face;
    ctx.beginPath();
    ctx.arc(-size * 0.2, -size * 0.12, size * 0.07, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.2, -size * 0.12, size * 0.07, 0, Math.PI * 2);
    ctx.fill();

    // 눈물
    ctx.fillStyle = colors.tear;
    ctx.beginPath();
    ctx.arc(-size * 0.35, size * 0.0, size * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(size * 0.35, size * 0.0, size * 0.06, 0, Math.PI * 2);
    ctx.fill();

    // o 입
    ctx.beginPath();
    ctx.arc(0, size * 0.25, size * 0.1, 0, Math.PI * 2);
    ctx.strokeStyle = colors.face;
    ctx.lineWidth = s(1.5);
    ctx.stroke();
  }
}

function drawTimingTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  if (!drawTargetImage({ type: "timing", state: "std" }, size / 2)) {
    drawTimingTarget(size / 2, { state: "std", indicatorScale: 0.6 }, x, y);
  }
  ctx.restore();
  // 인디케이터 미리보기
  const mode = CONFIG.timingVisualMode;
  if (mode === 'A') drawTimingIndicatorA(x, y, size / 2, 0.6);
  else if (mode === 'B') drawTimingIndicatorB(x, y, size / 2, 0.6);
  else if (mode === 'C') drawTimingIndicatorC(x, y, size / 2, 0.6, { indicatorScale: 0.6 });
}

function drawSlideTargetIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  drawSlideTarget(size / 2, { state: "std", slideDirection: 1 });
  ctx.restore();
}

// -- 타이밍 인디케이터 모드 A: Approach Circle (osu! 개선형) --
function drawTimingIndicatorA(cx, cy, baseSize, indicatorScale) {
  if (indicatorScale <= 0) return;

  const maxRadius = baseSize * 2.2;
  const radius = maxRadius * indicatorScale;
  const progress = 1 - indicatorScale; // 0→1 진행

  // 색상 변화: 민트 → 노란색 → 금색
  let r, g, b;
  if (progress < 0.5) {
    const t = progress / 0.5;
    r = Math.round(lerp(126, 255, t));
    g = Math.round(lerp(206, 255, t));
    b = Math.round(lerp(192, 100, t));
  } else {
    const t = (progress - 0.5) / 0.5;
    r = Math.round(lerp(255, 255, t));
    g = Math.round(lerp(255, 215, t));
    b = Math.round(lerp(100, 0, t));
  }

  // 두께 변화: 얇은 것 → 두꺼운 것
  const lineW = lerp(CONFIG.timingA_lineWidthMin, CONFIG.timingA_lineWidthMax, progress);
  const opacity = lerp(0.5, 0.9, progress);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${opacity})`;
  ctx.lineWidth = lineW * scaleRatio;

  // E-3 근처: 강한 글로우
  const inE3 = indicatorScale <= CONFIG.timingE2Threshold;
  if (inE3) {
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = CONFIG.timingA_e3GlowBlur * scaleRatio;
  } else {
    ctx.shadowColor = ASSETS.indicator.glowColor;
    ctx.shadowBlur = ASSETS.indicator.glowBlur * scaleRatio * 0.5;
  }
  ctx.stroke();
  ctx.restore();
}

// -- 타이밍 인디케이터 모드 B: 게이지 충전형 (Fill-Up) --
function drawTimingIndicatorB(cx, cy, baseSize, indicatorScale) {
  const progress = 1 - indicatorScale; // 0→1 진행 (충전량)
  const radius = baseSize * 1.3;
  const gaugeW = CONFIG.timingB_gaugeWidth * scaleRatio;

  ctx.save();

  // 원형 배경 (크림톤 반투명)
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(232, 224, 216, ${CONFIG.timingB_bgAlpha})`;
  ctx.fill();

  // 게이지 색상: 구간별 변화
  let gaugeColor;
  if (progress < 0.5) {
    gaugeColor = "rgba(126, 206, 192, 0.8)";       // E-1: 민트
  } else if (progress < 0.8) {
    gaugeColor = "rgba(255, 235, 59, 0.9)";         // E-2: 노란색
  } else {
    gaugeColor = "rgba(255, 215, 0, 1.0)";          // E-3: 금색
  }

  // 100% 초과 (오버플로): 코랄
  if (indicatorScale <= 0.01) {
    gaugeColor = "rgba(255, 138, 128, 0.9)";
  }

  // 원형 게이지 호 (아래에서 시계방향으로 채워짐: -90도 시작)
  const startAngle = -Math.PI / 2;
  const endAngle = startAngle + (Math.PI * 2 * progress);

  ctx.beginPath();
  ctx.arc(cx, cy, radius, startAngle, endAngle);
  ctx.strokeStyle = gaugeColor;
  ctx.lineWidth = gaugeW;
  ctx.lineCap = "round";

  // E-3 구간: 글로우
  if (progress >= 0.8) {
    ctx.shadowColor = "#FFD700";
    ctx.shadowBlur = 8 * scaleRatio;
  }

  ctx.stroke();

  // 게이지 끝점에 작은 원 (진행 표시)
  if (progress > 0.02 && progress < 0.99) {
    const dotX = cx + Math.cos(endAngle) * radius;
    const dotY = cy + Math.sin(endAngle) * radius;
    ctx.beginPath();
    ctx.arc(dotX, dotY, gaugeW * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = gaugeColor;
    ctx.fill();
  }

  ctx.restore();
}

// -- 타이밍 인디케이터 모드 C: 하트비트형 (Pulse) --
function drawTimingIndicatorC(cx, cy, baseSize, indicatorScale, target) {
  const progress = 1 - indicatorScale; // 0→1 진행
  const inE3 = indicatorScale <= CONFIG.timingE2Threshold;

  // 박동 주기 계산
  const period = lerp(CONFIG.timingC_periodStart, CONFIG.timingC_periodEnd, progress);
  const pulsePhase = (Date.now() / 1000 % period) / period;
  const pulseValue = 0.5 + 0.5 * Math.sin(pulsePhase * Math.PI * 2);

  // 박동 최고점에서 링 이펙트 (충격파)
  if (pulseValue > 0.9) {
    const ringAlpha = (pulseValue - 0.9) / 0.1 * CONFIG.timingC_ringAlpha;
    const ringRadius = baseSize * (1.2 + pulseValue * 0.3);
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
    ctx.strokeStyle = inE3 ? `rgba(255, 215, 0, ${ringAlpha})` : `rgba(126, 206, 192, ${ringAlpha})`;
    ctx.lineWidth = 2 * scaleRatio;
    if (inE3) {
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = 6 * scaleRatio;
    }
    ctx.stroke();
    ctx.restore();
  }

  // 진행도 표시: 타겟 아래에 작은 도트 (E-1/E-2/E-3 구간 표시)
  const dotRadius = 2.5 * scaleRatio;
  const dotY = cy + baseSize * 1.4;
  const dotSpacing = 8 * scaleRatio;
  const dots = [
    { threshold: 0.5, color: THEME.mintLight },    // E-1
    { threshold: 0.8, color: "#FFEB3B" },    // E-2
    { threshold: 1.0, color: "#FFD700" },    // E-3
  ];
  ctx.save();
  for (let i = 0; i < dots.length; i++) {
    const dx = cx + (i - 1) * dotSpacing;
    const filled = progress >= (i === 0 ? 0 : dots[i - 1].threshold);
    ctx.beginPath();
    ctx.arc(dx, dotY, dotRadius, 0, Math.PI * 2);
    if (filled) {
      ctx.fillStyle = dots[i].color;
      ctx.fill();
    } else {
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 1 * scaleRatio;
      ctx.stroke();
    }
  }
  ctx.restore();
}

// -- Fever 타겟: 별 모양 + >w< 표정 --
function drawFeverTarget(size, target) {
  const colors = ASSETS.targets.fever.colors;

  // 별 모양 (5각)
  const points = 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI * 2 * i) / (points * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? size : size * 0.5;
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = colors.main;
  ctx.fill();

  // >w< 표정
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);

  // > 눈 (왼쪽)
  ctx.beginPath();
  ctx.moveTo(-size * 0.35, -size * 0.2);
  ctx.lineTo(-size * 0.2, -size * 0.1);
  ctx.lineTo(-size * 0.35, 0);
  ctx.stroke();

  // < 눈 (오른쪽)
  ctx.beginPath();
  ctx.moveTo(size * 0.35, -size * 0.2);
  ctx.lineTo(size * 0.2, -size * 0.1);
  ctx.lineTo(size * 0.35, 0);
  ctx.stroke();

  // w 입
  ctx.beginPath();
  ctx.moveTo(-size * 0.2, size * 0.15);
  ctx.quadraticCurveTo(-size * 0.1, size * 0.3, 0, size * 0.15);
  ctx.quadraticCurveTo(size * 0.1, size * 0.3, size * 0.2, size * 0.15);
  ctx.stroke();
}

// -- 슬라이드 타겟 (둥근 사각형 + 방향 화살표) --
function drawSlideTarget(size, target) {
  const colors = ASSETS.targets.slide.colors;
  const r = size * 0.3; // 모서리 반지름

  // 둥근 사각형 몸체
  ctx.beginPath();
  ctx.moveTo(-size + r, -size);
  ctx.lineTo(size - r, -size);
  ctx.quadraticCurveTo(size, -size, size, -size + r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(-size + r, size);
  ctx.quadraticCurveTo(-size, size, -size, size - r);
  ctx.lineTo(-size, -size + r);
  ctx.quadraticCurveTo(-size, -size, -size + r, -size);
  ctx.closePath();
  ctx.fillStyle = colors.main;
  ctx.fill();

  // 화살표 발광
  ctx.save();
  ctx.shadowColor = colors.arrow;
  ctx.shadowBlur = 8 * scaleRatio;

  // 방향 회전 (0=up, 1=right, 2=down, 3=left)
  const dir = target.slideDirection;
  ctx.rotate(dir * Math.PI / 2);

  // 화살표 (위쪽 방향 기준으로 그림)
  const arrowSize = size * 0.55;
  ctx.beginPath();
  ctx.moveTo(0, -arrowSize);
  ctx.lineTo(arrowSize * 0.6, arrowSize * 0.1);
  ctx.lineTo(arrowSize * 0.2, arrowSize * 0.1);
  ctx.lineTo(arrowSize * 0.2, arrowSize * 0.6);
  ctx.lineTo(-arrowSize * 0.2, arrowSize * 0.6);
  ctx.lineTo(-arrowSize * 0.2, arrowSize * 0.1);
  ctx.lineTo(-arrowSize * 0.6, arrowSize * 0.1);
  ctx.closePath();
  ctx.fillStyle = colors.arrow;
  ctx.fill();

  ctx.restore();

  // 눈 (작은 점 두 개 — 화살표 아래에)
  const eyeOffset = size * 0.25;
  const eyeY = size * 0.55;
  const eyeR = size * 0.08;
  ctx.fillStyle = "#FFFFFF";
  ctx.beginPath();
  ctx.arc(-eyeOffset, eyeY, eyeR, 0, Math.PI * 2);
  ctx.arc(eyeOffset, eyeY, eyeR, 0, Math.PI * 2);
  ctx.fill();
}

// -- 피냐타 캐릭터 --
function drawPinataCharacter(cx, cy, r) {
  const colors = ASSETS.pinata.colors;

  // 몸체 (타원형)
  ctx.beginPath();
  ctx.ellipse(cx, cy, r * 0.85, r, 0, 0, Math.PI * 2);
  ctx.fillStyle = colors.body;
  ctx.fill();

  // 줄무늬 (몸체 클리핑)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, r * 0.85, r, 0, 0, Math.PI * 2);
  ctx.clip();
  const stripeH = r * 0.18;
  ctx.fillStyle = colors.stripe1;
  ctx.fillRect(cx - r, cy - r * 0.5, r * 2, stripeH);
  ctx.fillStyle = colors.stripe2;
  ctx.fillRect(cx - r, cy - r * 0.1, r * 2, stripeH);
  ctx.fillStyle = colors.stripe3;
  ctx.fillRect(cx - r, cy + r * 0.3, r * 2, stripeH);
  ctx.restore();

  // 꼬깔 모자
  ctx.beginPath();
  ctx.moveTo(cx, cy - r * 1.3);
  ctx.lineTo(cx - r * 0.25, cy - r * 0.85);
  ctx.lineTo(cx + r * 0.25, cy - r * 0.85);
  ctx.closePath();
  ctx.fillStyle = colors.hat;
  ctx.fill();
  // 모자 챙
  ctx.beginPath();
  ctx.ellipse(cx, cy - r * 0.85, r * 0.3, r * 0.08, 0, 0, Math.PI * 2);
  ctx.fillStyle = colors.hat;
  ctx.fill();

  // 볼터치
  ctx.beginPath();
  ctx.arc(cx - r * 0.45, cy + r * 0.15, r * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 138, 128, 0.5)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + r * 0.45, cy + r * 0.15, r * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // 왼쪽 눈 > (꺽쇠)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(3);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.35, cy - r * 0.28);
  ctx.lineTo(cx - r * 0.18, cy - r * 0.15);
  ctx.lineTo(cx - r * 0.35, cy - r * 0.02);
  ctx.stroke();

  // 오른쪽 눈 < (꺽쇠)
  ctx.beginPath();
  ctx.moveTo(cx + r * 0.35, cy - r * 0.28);
  ctx.lineTo(cx + r * 0.18, cy - r * 0.15);
  ctx.lineTo(cx + r * 0.35, cy - r * 0.02);
  ctx.stroke();

  // w 입
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(cx - r * 0.18, cy + r * 0.3);
  ctx.quadraticCurveTo(cx - r * 0.09, cy + r * 0.42, cx, cy + r * 0.3);
  ctx.quadraticCurveTo(cx + r * 0.09, cy + r * 0.42, cx + r * 0.18, cy + r * 0.3);
  ctx.stroke();

  // 반짝이 별 (주위 회전)
  const sparkleTime = Date.now() / 400;
  for (let i = 0; i < 4; i++) {
    const angle = sparkleTime + (Math.PI * 2 * i) / 4;
    const sr = r * 1.15;
    const sx = cx + Math.cos(angle) * sr;
    const sy = cy + Math.sin(angle) * sr * 0.8;
    const sz = r * 0.08 * (0.7 + 0.3 * Math.sin(sparkleTime * 2 + i));
    drawStar5(sx, sy, sz, colors.stripe1, false);
  }
}

// ============================================================
// 이펙트 렌더링
// ============================================================
function renderHitFlashes() {
  for (const f of hitFlashes) {
    ctx.globalAlpha = f.alpha;
    ctx.strokeStyle = f.color;
    ctx.lineWidth = f.lineWidth;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function renderParticles() {
  for (const p of particles) {
    const alpha = clamp(p.life, 0, 1);
    const sz = p.size * clamp(p.life, 0.3, 1);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;

    if (p.shape === "star") {
      drawParticleStar(p.x, p.y, sz, p.rotation);
    } else if (p.shape === "cross") {
      drawParticleCross(p.x, p.y, sz, p.rotation);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

function drawParticleStar(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const outerAngle = (Math.PI * 2 * i) / 5 - Math.PI / 2;
    const innerAngle = outerAngle + Math.PI / 5;
    const ox = Math.cos(outerAngle) * r;
    const oy = Math.sin(outerAngle) * r;
    const ix = Math.cos(innerAngle) * r * 0.4;
    const iy = Math.sin(innerAngle) * r * 0.4;
    if (i === 0) ctx.moveTo(ox, oy);
    else ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawParticleCross(x, y, r, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  const w = r * 0.35;
  ctx.strokeStyle = ctx.fillStyle;
  ctx.lineWidth = w;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r, -r);
  ctx.lineTo(r, r);
  ctx.moveTo(r, -r);
  ctx.lineTo(-r, r);
  ctx.stroke();
  ctx.restore();
}

function renderFloatingTexts() {
  const now = Date.now() / 1000;
  for (const ft of floatingTexts) {
    const alpha = clamp(ft.life, 0, 1);
    ctx.globalAlpha = alpha;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // 등장 시 Scale 0→1.3→1.0 바운스 팝인 (처음 25% 구간)
    const age = 1 - ft.life; // 0→1
    let dynamicScale = ft.scale;
    if (age < 0.25) {
      const t = age / 0.25;
      dynamicScale *= t < 0.6 ? lerp(0, 1.3, easeOutBack(t / 0.6)) : lerp(1.3, 1.0, (t - 0.6) / 0.4);
    }

    // 타이밍 E-3: 폰트 2배
    const isE3 = ft.key === "timingE3";
    const baseFontSize = isE3 ? s(40) : s(20);
    const fontSize = baseFontSize * dynamicScale;
    ctx.font = `bold ${fontSize}px ${FONT.number}`;

    // 타이밍 E-3: 글로우 효과
    if (isE3) {
      ctx.shadowColor = "#FFD700";
      ctx.shadowBlur = s(12) * alpha;
    }

    // 외곽선 (가독성)
    ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
    ctx.lineWidth = isE3 ? s(4) : s(3);
    ctx.strokeText(ft.text, ft.x, ft.y);

    // 색상 결정
    if (ft.key === "feverTap") {
      // Fever: 무지개 색상 순환
      const hue = ((now - ft.spawnTime) * 360 + age * 720) % 360;
      ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
    } else if (isE3) {
      // E-3: 금색 그라데이션
      const grad = ctx.createLinearGradient(ft.x - s(40), ft.y, ft.x + s(40), ft.y);
      grad.addColorStop(0, "#FFF8E1");
      grad.addColorStop(0.3, "#FFD700");
      grad.addColorStop(0.7, "#FF6F00");
      grad.addColorStop(1, "#FFF8E1");
      ctx.fillStyle = grad;
    } else {
      ctx.fillStyle = ft.color;
    }
    ctx.fillText(ft.text, ft.x, ft.y);

    // 글로우 초기화
    if (isE3) {
      ctx.shadowColor = "transparent";
      ctx.shadowBlur = 0;
    }
  }
  ctx.globalAlpha = 1;
}

function renderRipples() {
  for (const r of ripples) {
    if (r.delay && r.delay > 0) continue;
    const alpha = clamp(r.life, 0, 1);
    ctx.globalAlpha = alpha * 0.6;
    ctx.beginPath();
    ctx.arc(r.x, r.y, Math.max(0, r.radius), 0, Math.PI * 2);
    ctx.strokeStyle = THEME.mintLight;
    ctx.lineWidth = (r.lineWidth || s(2)) * alpha;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

// ---- Timeup 화면 ----
function renderTimeup() {
  renderGrid();

  // 어두운 오버레이 (0.3초 페이드인)
  const progress = 1 - timeupTimer / CONFIG.timeupDisplayDuration; // 0→1
  const overlayAlpha = Math.min(progress / 0.3, 1) * 0.25;
  ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  const cx = canvasWidth / 2;
  const cy = canvasHeight / 2;

  // 캐릭터
  if (ASSETS.timeup.image) {
    const img = getImage(ASSETS.timeup.image);
    if (img) {
      const aspect = img.naturalWidth / img.naturalHeight;
      const drawH = s(100);
      const drawW = drawH * aspect;
      ctx.drawImage(img, cx - drawW / 2, cy - drawH / 2 + s(10), drawW, drawH);
    }
  }

  // "TIME UP!" 텍스트: Scale 0 → 1.2 → 1.0 바운스, 글로우
  const scaleP = progress < 0.25 ? progress / 0.25 : 1;
  const textScale = scaleP < 1 ? easeOutBack(scaleP) : 1;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(textScale, textScale);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // 글로우
  ctx.shadowColor = THEME.coral;
  ctx.shadowBlur = s(15);

  ctx.font = `bold ${s(52)}px ${FONT.number}`;
  ctx.fillStyle = THEME.coral;
  ctx.fillText("TIME UP!", 0, 0);

  ctx.shadowColor = 'transparent';
  ctx.restore();
}

function drawTimeupCharacter(cx, cy) {
  const colors = ASSETS.timeup.colors;
  const r = s(50); // 몸체 반지름

  ctx.save();
  ctx.translate(cx, cy);

  // 몸체 (둥근 원)
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = colors.body;
  ctx.fill();

  // 볼터치
  ctx.beginPath();
  ctx.arc(-r * 0.5, r * 0.15, r * 0.18, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255, 138, 128, 0.4)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.5, r * 0.15, r * 0.18, 0, Math.PI * 2);
  ctx.fill();

  // 큰 눈 (흰자 + 동자) — 울상으로 위를 봄
  // 왼쪽 눈
  ctx.beginPath();
  ctx.arc(-r * 0.25, -r * 0.15, r * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-r * 0.25, -r * 0.22, r * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = colors.face;
  ctx.fill();
  // 하이라이트
  ctx.beginPath();
  ctx.arc(-r * 0.3, -r * 0.28, r * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();

  // 오른쪽 눈
  ctx.beginPath();
  ctx.arc(r * 0.25, -r * 0.15, r * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.25, -r * 0.22, r * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = colors.face;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(r * 0.2, -r * 0.28, r * 0.04, 0, Math.PI * 2);
  ctx.fillStyle = "#FFFFFF";
  ctx.fill();

  // 처진 눈썹 (슬픈)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2.5);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r * 0.42, -r * 0.4);
  ctx.lineTo(-r * 0.12, -r * 0.35);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(r * 0.42, -r * 0.4);
  ctx.lineTo(r * 0.12, -r * 0.35);
  ctx.stroke();

  // 눈물
  const tearDrop = (tx, ty) => {
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.quadraticCurveTo(tx - r * 0.06, ty + r * 0.15, tx, ty + r * 0.2);
    ctx.quadraticCurveTo(tx + r * 0.06, ty + r * 0.15, tx, ty);
    ctx.fillStyle = colors.tear;
    ctx.fill();
  };
  // 흘러내리는 위치를 시간에 따라 살짝 변화
  const tearOffset = Math.sin(Date.now() / 300) * r * 0.05;
  tearDrop(-r * 0.45, -r * 0.0 + tearOffset);
  tearDrop(r * 0.45, r * 0.02 - tearOffset);

  // 입 (ㅠ 모양 — 울상)
  ctx.strokeStyle = colors.face;
  ctx.lineWidth = s(2);
  ctx.beginPath();
  ctx.arc(0, r * 0.35, r * 0.15, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  ctx.restore();
}

// B-3: 별 path 헬퍼 (fill/stroke 하지 않음, 12시 방향 시작)
function createStarPath(ctx, cx, cy, outerR, innerR, points) {
  ctx.beginPath();
  for (var i = 0; i < points * 2; i++) {
    var r = (i % 2 === 0) ? outerR : innerR;
    var angle = (i * Math.PI / points) - (Math.PI / 2);
    var x = cx + r * Math.cos(angle);
    var y = cy + r * Math.sin(angle);
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  }
  ctx.closePath();
}

// B-6: 결과 화면 전용 별 렌더링 (ctx 파라미터 포함, 회전 없음)
function drawResultStar(ctx, cx, cy, size, earned) {
  var outerR = size;
  var innerR = size * 0.4;

  if (earned) {
    // 레이어 1: 드롭 섀도우
    ctx.save();
    ctx.shadowColor = 'rgba(180, 140, 20, 0.35)';
    ctx.shadowBlur = size * 0.4;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = size * 0.1;
    createStarPath(ctx, cx, cy, outerR, innerR, 5);
    ctx.fillStyle = '#FFD700';
    ctx.fill();
    ctx.restore();

    // 레이어 2: 메인 채움 (방사형 그라데이션)
    ctx.save();
    var grad = ctx.createRadialGradient(
      cx, cy - size * 0.15, size * 0.1,
      cx, cy, size
    );
    grad.addColorStop(0, '#FFF0A0');
    grad.addColorStop(0.5, '#FFD700');
    grad.addColorStop(1, '#DAA520');
    createStarPath(ctx, cx, cy, outerR, innerR, 5);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // 레이어 3: 테두리
    ctx.save();
    createStarPath(ctx, cx, cy, outerR, innerR, 5);
    ctx.strokeStyle = '#B8860B';
    ctx.lineWidth = Math.max(1.5, size * 0.04);
    ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.restore();

    // 레이어 4: 상단 광택 (별 형태 안에서만)
    ctx.save();
    createStarPath(ctx, cx, cy, outerR, innerR, 5);
    ctx.clip();
    ctx.beginPath();
    ctx.ellipse(cx, cy - size * 0.25, size * 0.5, size * 0.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.fill();
    ctx.restore();
  } else {
    // 미획득 별: 채움
    ctx.save();
    createStarPath(ctx, cx, cy, outerR, innerR, 5);
    ctx.fillStyle = 'rgba(220, 220, 215, 0.4)';
    ctx.fill();
    ctx.restore();

    // 미획득 별: 테두리
    ctx.save();
    createStarPath(ctx, cx, cy, outerR, innerR, 5);
    ctx.strokeStyle = 'rgba(195, 195, 190, 0.5)';
    ctx.lineWidth = Math.max(1, size * 0.03);
    ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.restore();
  }
}

// A-7: 별 등장 대각선 광선 렌더링
function renderStarRays() {
  for (let i = 0; i < 3; i++) {
    const ray = resultStarRays[i];
    if (!ray) continue;
    const p = ray.timer / 0.25;
    const alpha = 0.5 * (1 - p);
    const len = ray.size * (0.6 + 0.6 * p); // A-7: 0.6→1.2
    const lineW = s(1.5) * (1 - p * 0.67); // 1.5px → 0.5px

    ctx.save();
    ctx.translate(ray.x, ray.y);
    ctx.strokeStyle = `rgba(255, 215, 0, ${alpha})`;
    ctx.lineWidth = lineW;
    ctx.lineCap = 'round';

    for (let a = 0; a < 4; a++) {
      const angle = (Math.PI / 4) + (Math.PI / 2) * a;
      ctx.beginPath();
      ctx.moveTo(Math.cos(angle) * ray.size * 0.3, Math.sin(angle) * ray.size * 0.3);
      ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ---- Result 화면 ----
function renderResult() {
  const cx = canvasWidth / 2;
  const now = Date.now() / 1000;
  const t = resultTimer;
  const isDone = resultPhase === "done";
  let totalStars = 0;
  if (score >= CONFIG.star3Threshold) totalStars = 3;
  else if (score >= CONFIG.star2Threshold) totalStars = 2;
  else if (score >= CONFIG.star1Threshold) totalStars = 1;
  const is3Star = totalStars === 3;

  // D-2: 배경 그라데이션 (크림 → 민트)
  const bgGrad = ctx.createLinearGradient(0, 0, 0, canvasHeight);
  bgGrad.addColorStop(0, THEME.cream);
  bgGrad.addColorStop(1, '#E8F8F5');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  // D-2: 부유 파티클
  for (const p of resultBgParticles) {
    const px = p.baseX + Math.sin(now * (Math.PI * 2 / p.wobblePeriod) + p.wobblePhase) * s(10);
    ctx.globalAlpha = p.alpha;
    if (p.isStar) {
      drawStar5(px, p.y, p.size * 0.5, p.color);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(px, p.y, p.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // D-2: 반짝임 십자
  for (const sp of resultSparkles) {
    const a = 0.15 + 0.25 * Math.sin(now * (Math.PI * 2 / sp.period) + sp.phase); // B-3: 최대 0.4
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = s(1);
    ctx.beginPath();
    ctx.moveTo(sp.x - sp.size, sp.y);
    ctx.lineTo(sp.x + sp.size, sp.y);
    ctx.moveTo(sp.x, sp.y - sp.size);
    ctx.lineTo(sp.x, sp.y + sp.size);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // 별 파티클 렌더링
  for (const p of resultStarParticles) {
    const alpha = clamp(p.life / p.maxLife, 0, 0.5); // B-2: 투명도 상한 0.5
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.globalAlpha = alpha;
    drawStar5(0, 0, s(p.size) * alpha, p.color, true);
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  // D-3: 별 등급 영역 (상단 15%)
  const starY = canvasHeight * 0.15;
  const starSpacing = canvasWidth * 0.13; // C-4: 간격 0.13
  const starBaseSize = canvasWidth * 0.05; // A-6: outerR = 0.05 (지름 0.10)

  for (let i = 0; i < 3; i++) {
    const starX = cx + (i - 1) * starSpacing;
    const earned = i < resultStarsRevealed;
    const animT = resultStarAnimTimers[i];

    if (!earned) {
      // C-2: 미획득 별
      drawResultStar(ctx, starX, starY, starBaseSize * 0.8, false);
      continue;
    }

    // 획득 별 바운스 스케일
    let starScale = 1;
    if (animT > 0 && animT < 1) {
      if (animT < 0.4) starScale = lerp(0, 1.5, easeOutBack(animT / 0.4));
      else starScale = lerp(1.5, 1.0, (animT - 0.4) / 0.6);
    }
    const sz = starBaseSize * starScale;

    // 회전 + C-2 별 렌더링
    ctx.save();
    ctx.translate(starX, starY);
    ctx.rotate(resultStarRotations[i]);
    drawResultStar(ctx, 0, 0, sz, true);
    ctx.restore();

    // 획득 별 반짝임
    if (animT >= 1 || isDone) {
      for (let sp = 0; sp < 2; sp++) {
        const angle = now * 2.5 + i * 2.1 + sp * Math.PI;
        const dist = sz * (0.6 + 0.3 * Math.sin(now * 1.8 + sp * 3));
        const spX = starX + Math.cos(angle) * dist;
        const spY = starY + Math.sin(angle) * dist;
        ctx.globalAlpha = 0.4 + 0.3 * Math.sin(now * 4 + i + sp * 2);
        ctx.fillStyle = THEME.gold;
        ctx.beginPath();
        ctx.arc(spX, spY, s(1.5), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  // C-3: 별 등장 광선 렌더링
  renderStarRays();

  // D-3: 등급 텍스트 (t=1.4초부터)
  const gradeElapsed = t - 1.4;
  if (gradeElapsed > 0 || isDone) {
    const gradeTexts = ["TRY AGAIN...", "GOOD!", "GREAT!", "EXCELLENT!"];
    const gradeY = starY + starBaseSize + s(25);
    const gradeFontSize = canvasWidth * 0.06;

    const ge = isDone ? 1 : clamp(gradeElapsed / 0.3, 0, 1);
    const gradeScale = easeOutBack(ge);

    ctx.save();
    ctx.translate(cx, gradeY);
    ctx.scale(gradeScale, gradeScale);
    ctx.font = `bold ${gradeFontSize}px ${FONT.number}`;
    ctx.shadowColor = '#FFFFFF';
    ctx.shadowBlur = s(8);

    if (is3Star) {
      const hue = ((now * 180) % 360);
      ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
    } else {
      const gradeColors = [THEME.textSecondary, THEME.mintDark, THEME.mint, THEME.gold];
      ctx.fillStyle = gradeColors[totalStars];
    }
    ctx.fillText(gradeTexts[totalStars], 0, 0);
    ctx.restore();
  }

  // D-4: 점수 카드 (t=1.6초부터)
  const scElapsed = t - 1.6;
  if (scElapsed > 0 || isDone) {
    const scAlpha = isDone ? 1 : clamp(scElapsed / 0.3, 0, 1);
    const scW = canvasWidth * 0.75;
    const scH = canvasHeight * 0.18;
    const scX = cx - scW / 2;
    const scY = canvasHeight * 0.35;

    ctx.globalAlpha = scAlpha;

    // 카드 패널
    ctx.save();
    if (is3Star) {
      ctx.shadowColor = THEME.gold;
      ctx.shadowBlur = s(15);
    } else {
      ctx.shadowColor = 'rgba(126, 206, 192, 0.2)';
      ctx.shadowBlur = s(10);
    }
    ctx.shadowOffsetY = s(4);
    drawRoundedRect(scX, scY, scW, scH, s(20));
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = is3Star ? THEME.gold : 'rgba(126, 206, 192, 0.3)';
    ctx.lineWidth = is3Star ? s(2) : 1;
    ctx.stroke();
    ctx.restore();

    ctx.globalAlpha = scAlpha;

    // "SCORE" 라벨
    ctx.fillStyle = THEME.mintDark;
    ctx.font = `${canvasWidth * 0.035}px ${FONT.text}`;
    ctx.save();
    try { ctx.letterSpacing = '3px'; } catch(e) {}
    ctx.fillText("SCORE", cx, scY + scH * 0.28);
    try { ctx.letterSpacing = '0px'; } catch(e) {}
    ctx.restore();

    // 점수 숫자
    let scoreScale = 1.0;
    const countActive = scElapsed > 0 && scElapsed < 1.0 && !resultCountupDone;
    if (countActive) {
      scoreScale = 1.0 + 0.05 * Math.abs(Math.sin(now * 8));
    } else if (resultScorePopTimer > 0) {
      const popP = resultScorePopTimer / 0.3;
      scoreScale = 1.0 + 0.3 * Math.sin(popP * Math.PI);
    }
    const scoreFontSize = canvasWidth * 0.11 * scoreScale;
    ctx.font = `bold ${scoreFontSize}px ${FONT.number}`;

    let scoreColor = THEME.textPrimary;
    if (resultCountScore >= CONFIG.star3Threshold) scoreColor = THEME.gold;
    else if (resultCountScore >= CONFIG.star2Threshold) scoreColor = "#E8C840";
    else if (resultCountScore >= CONFIG.star1Threshold) scoreColor = THEME.mint;

    const scoreNumY = scY + scH * 0.58;
    ctx.fillStyle = "rgba(74, 74, 74, 0.1)";
    ctx.fillText(resultCountScore.toLocaleString(), cx + s(2), scoreNumY + s(3));
    ctx.fillStyle = scoreColor;
    ctx.fillText(resultCountScore.toLocaleString(), cx, scoreNumY);

    // 숫자 광택
    ctx.globalAlpha = scAlpha * (0.12 + 0.08 * Math.sin(now * 3));
    ctx.fillStyle = "#FFFFFF";
    ctx.fillText(resultCountScore.toLocaleString(), cx, scoreNumY - s(1));
    ctx.globalAlpha = scAlpha;

    // NEW RECORD (t=2.6초부터)
    if ((t >= 2.6 || isDone) && resultIsNewRecord) {
      const nrSinVal = Math.sin(now * (Math.PI * 2 / 1.2)); // B-4: 주기 1.2초
      const nrAlpha = 0.7 + 0.3 * nrSinVal; // B-4: 0.7~1.0 범위
      const nrScale = 1.0 + 0.05 * nrSinVal;
      ctx.save();
      ctx.globalAlpha = scAlpha * nrAlpha;
      ctx.translate(cx, scY + scH * 0.85);
      ctx.scale(nrScale, nrScale);
      ctx.fillStyle = THEME.gold;
      ctx.font = `${canvasWidth * 0.032}px ${FONT.text}`;
      const nrW = ctx.measureText("NEW RECORD").width;
      drawStar5(-nrW / 2 - s(12), 0, s(6), THEME.gold);
      drawStar5(nrW / 2 + s(12), 0, s(6), THEME.gold);
      ctx.fillText("NEW RECORD", 0, 0);
      ctx.restore();
    }

    ctx.globalAlpha = 1;
  }

  // D-5: 통계 카드 (t=2.8초부터)
  const stElapsed = t - 2.8;
  if (stElapsed > 0 || isDone) {
    const stW = canvasWidth * 0.75;
    const stH = canvasHeight * 0.22;
    const stX = cx - stW / 2;
    const baseStY = canvasHeight * 0.57;

    const stProgress = isDone ? 1 : clamp(stElapsed / 0.4, 0, 1);
    const slideEased = easeOutBack(stProgress);
    const slideOffset = (1 - slideEased) * s(30);
    const stY = baseStY + slideOffset;

    ctx.globalAlpha = slideEased;

    // 카드 패널
    ctx.save();
    if (is3Star) {
      ctx.shadowColor = THEME.gold;
      ctx.shadowBlur = s(8);
    } else {
      ctx.shadowColor = 'rgba(126, 206, 192, 0.15)';
      ctx.shadowBlur = s(6);
    }
    ctx.shadowOffsetY = s(2);
    drawRoundedRect(stX, stY, stW, stH, s(16));
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.strokeStyle = is3Star ? THEME.gold : 'rgba(126, 206, 192, 0.2)';
    ctx.lineWidth = is3Star ? s(2) : 1;
    ctx.stroke();
    ctx.restore();

    ctx.globalAlpha = slideEased;

    // 1행: HIT / MISS / PERFECT
    const row1Y = stY + stH * 0.35;
    const colWidth = stW / 3;
    const statCols = [
      { icon: 'circle', color: THEME.mintDark, label: 'HIT', value: gameStats.basicHits + gameStats.slideSuccess },
      { icon: 'circle', color: THEME.coral, label: 'MISS', value: gameStats.trapHits + gameStats.emptyTaps },
      { icon: 'star', color: THEME.gold, label: 'PERFECT', value: gameStats.timingE3 },
    ];

    for (let i = 0; i < 3; i++) {
      const col = statCols[i];
      const colCx = stX + colWidth * (i + 0.5);

      // 팝인: t=2.9+i*0.1부터, 0.2초 duration
      const popElapsed = isDone ? 1 : clamp((t - (2.9 + i * 0.1)) / 0.2, 0, 1);
      if (popElapsed <= 0) continue;
      const popScale = easeOutBack(popElapsed);

      ctx.save();
      ctx.translate(colCx, row1Y);
      ctx.scale(popScale, popScale);

      // 아이콘
      if (col.icon === 'circle') {
        ctx.fillStyle = col.color;
        ctx.beginPath();
        ctx.arc(0, -s(18), s(4), 0, Math.PI * 2);
        ctx.fill();
      } else {
        drawStar5(0, -s(18), s(5), col.color);
      }

      // 라벨
      ctx.fillStyle = col.color;
      ctx.font = `${canvasWidth * 0.025}px ${FONT.text}`;
      ctx.textAlign = "center";
      ctx.fillText(col.label, 0, -s(6));

      // 숫자
      ctx.fillStyle = THEME.textPrimary;
      ctx.font = `bold ${canvasWidth * 0.055}px ${FONT.number}`;
      ctx.fillText(String(col.value), 0, s(12));

      ctx.restore();
    }

    // 구분선
    const sepY = stY + stH * 0.62;
    ctx.strokeStyle = 'rgba(126, 206, 192, 0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(stX + s(20), sepY);
    ctx.lineTo(stX + stW - s(20), sepY);
    ctx.stroke();

    // 2행: MAX COMBO
    const row2Y = stY + stH * 0.8;
    ctx.textAlign = "left";
    ctx.fillStyle = THEME.mintDark;
    ctx.font = `${canvasWidth * 0.028}px ${FONT.text}`;
    ctx.fillText("MAX COMBO", stX + s(20), row2Y);

    ctx.textAlign = "right";
    let comboColor = THEME.textPrimary;
    if (gameStats.maxCombo >= 30) comboColor = THEME.gold;
    else if (gameStats.maxCombo >= 20) comboColor = THEME.coral;
    ctx.fillStyle = comboColor;
    ctx.font = `bold ${canvasWidth * 0.055}px ${FONT.number}`;
    ctx.fillText(String(gameStats.maxCombo), stX + stW - s(20), row2Y);

    ctx.textAlign = "center";
    ctx.globalAlpha = 1;
  }

  // D-6: 버튼 (t=3.2초부터)
  const btnElapsed = t - 3.2;
  if (btnElapsed > 0 || isDone) {
    const btnW = canvasWidth * 0.34;
    const btnH = canvasHeight * 0.055;
    const gap = s(8);
    const baseBtnY = canvasHeight * 0.82;

    const btnProgress = isDone ? 1 : clamp(btnElapsed / 0.3, 0, 1);
    const slideEased = easeOutBack(btnProgress);
    const slideOffset = (1 - slideEased) * s(20);
    const btnY = baseBtnY + slideOffset;

    ctx.globalAlpha = slideEased;

    const btn1X = cx - gap - btnW;
    drawPillButton(btn1X, btnY, btnW, btnH, "다시하기", {
      fillColor: THEME.mint, textColor: THEME.textLight,
      fontSize: canvasWidth * 0.04, fontFace: FONT.text
    });

    const btn2X = cx + gap;
    ctx.save();
    drawRoundedRect(btn2X, btnY, btnW, btnH, btnH / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
    ctx.restore();
    drawPillButton(btn2X, btnY, btnW, btnH, "타이틀로", {
      fillColor: THEME.mint, outline: true,
      fontSize: canvasWidth * 0.04, fontFace: FONT.text,
      textColor: THEME.mintDark
    });

    ctx.globalAlpha = 1;
  }

  // D-6: "기록 보기 ▸" 텍스트 링크 (t=3.4초부터)
  const linkElapsed = t - 3.4;
  if (linkElapsed > 0 || isDone) {
    const linkAlpha = isDone ? 0.6 : clamp(linkElapsed / 0.3, 0, 0.6);
    const linkY = canvasHeight * 0.82 + canvasHeight * 0.055 + s(25);
    ctx.globalAlpha = linkAlpha;
    ctx.fillStyle = THEME.mintDark;
    ctx.font = `${canvasWidth * 0.03}px ${FONT.text}`;
    ctx.fillText("기록 보기 ▸", cx, linkY);
    ctx.globalAlpha = 1;
  }

  // B-1: 별 등장 플래시 (약하게)
  if (result3StarFlash > 0) {
    const flashAlpha = 0.06 * (result3StarFlash / 0.1);
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  }
}

// ---- Ranking 화면 ----
function getStarCount(sc) {
  if (sc >= CONFIG.star3Threshold) return 3;
  if (sc >= CONFIG.star2Threshold) return 2;
  if (sc >= CONFIG.star1Threshold) return 1;
  return 0;
}

function renderRanking() {
  const cx = canvasWidth / 2;

  // 어두운 오버레이
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);

  // 카드 크기/위치
  const cardW = canvasWidth * 0.88;
  const cardH = canvasHeight * 0.82;
  const cardX = cx - cardW / 2;
  const cardY = canvasHeight * 0.08;

  drawPanel(cardX, cardY, cardW, cardH);

  // 타이틀
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = THEME.mintDark;
  ctx.font = `bold ${s(24)}px ${FONT.number}`;
  ctx.fillText("BEST SCORES", cx, cardY + s(30));

  // 구분선
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  const divY = cardY + s(50);
  ctx.beginPath();
  ctx.moveTo(cardX + s(20), divY);
  ctx.lineTo(cardX + cardW - s(20), divY);
  ctx.stroke();

  const scores = loadScores();
  const listStartY = divY + s(16);
  const listH = cardH - s(50) - s(16) - s(60); // title area - gap - button area
  const rowH = listH / MAX_SCORES;

  const rankBadgeColors = [THEME.gold, "#C0C0C0", "#CD7F32"];
  const padX = s(16);

  for (let i = 0; i < MAX_SCORES; i++) {
    const y = listStartY + i * rowH + rowH / 2;
    const entry = scores[i];

    // 순위 배지 (원형)
    const badgeR = s(12);
    const badgeX = cardX + padX + badgeR + s(4);
    const badgeColor = i < 3 ? rankBadgeColors[i] : THEME.mint;
    ctx.beginPath();
    ctx.arc(badgeX, y, badgeR, 0, Math.PI * 2);
    ctx.fillStyle = badgeColor;
    ctx.fill();
    // 배지 숫자
    ctx.fillStyle = i < 3 ? '#FFFFFF' : '#FFFFFF';
    ctx.font = `bold ${s(11)}px ${FONT.number}`;
    ctx.textAlign = "center";
    ctx.fillText(`${i + 1}`, badgeX, y + s(1));

    if (entry) {
      // 점수
      ctx.fillStyle = i < 3 ? THEME.textPrimary : THEME.textSecondary;
      ctx.font = `bold ${s(17)}px ${FONT.number}`;
      ctx.textAlign = "right";
      const scoreX = cardX + cardW - padX - s(60);
      ctx.fillText(entry.score.toLocaleString(), scoreX, y);

      // 별 표시
      const stars = getStarCount(entry.score);
      const starSize = s(7);
      for (let j = 0; j < 3; j++) {
        const sx = cardX + cardW - padX - s(48) + j * s(16);
        const starColor = j < stars ? THEME.gold : "rgba(200, 190, 170, 0.25)";
        drawStar5(sx, y, starSize, starColor, j < stars);
      }
    } else {
      ctx.fillStyle = "rgba(200, 190, 170, 0.3)";
      ctx.font = `${s(14)}px ${FONT.text}`;
      ctx.textAlign = "center";
      ctx.fillText("---", cx, y);
    }

    // 행 구분선 (마지막 빼고)
    if (i < MAX_SCORES - 1) {
      ctx.strokeStyle = 'rgba(0,0,0,0.04)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(cardX + padX, listStartY + (i + 1) * rowH);
      ctx.lineTo(cardX + cardW - padX, listStartY + (i + 1) * rowH);
      ctx.stroke();
    }
  }

  // 닫기 버튼
  const btnW = s(140);
  const btnH = s(42);
  const btnX = cx - btnW / 2;
  const btnY = cardY + cardH - s(52);
  drawPillButton(btnX, btnY, btnW, btnH, "닫기", { outline: true, fillColor: THEME.mint });
}

function drawStar5(cx, cy, size, colorOrEarned, filledOrIndex) {
  const points = 5;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI * 2 * i) / (points * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? size : size * 0.45;
    const px = cx + Math.cos(angle) * r;
    const py = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();

  // 문자열이면 단순 색상 채우기 (레거시 호출)
  if (typeof colorOrEarned === "string") {
    ctx.fillStyle = colorOrEarned;
    ctx.fill();
    if (filledOrIndex) {
      ctx.fillStyle = "rgba(255,255,255,0.2)";
      ctx.beginPath();
      ctx.arc(cx - size * 0.15, cy - size * 0.15, size * 0.25, 0, Math.PI * 2);
      ctx.fill();
    }
    return;
  }

  // boolean이면 금색 그라데이션 별 (결과 화면)
  if (colorOrEarned) {
    // 금색 그라데이션 채우기
    const grad = ctx.createLinearGradient(cx - size, cy - size, cx + size, cy + size);
    grad.addColorStop(0, "#FFF8E1");
    grad.addColorStop(0.25, "#FFD700");
    grad.addColorStop(0.5, "#FFECB3");
    grad.addColorStop(0.75, "#FFC107");
    grad.addColorStop(1, "#FFF8E1");
    ctx.fillStyle = grad;
    ctx.fill();
    // 테두리
    ctx.strokeStyle = "rgba(180, 120, 0, 0.4)";
    ctx.lineWidth = s(1.5);
    ctx.stroke();
    // 상단 광택 (볼록 느낌)
    ctx.save();
    ctx.clip();
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath();
    ctx.ellipse(cx, cy - size * 0.25, size * 0.5, size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    // 미획득: 연한 크림톤 빈 별
    ctx.fillStyle = "rgba(232, 224, 216, 0.3)";
    ctx.fill();
    ctx.strokeStyle = "rgba(200, 190, 170, 0.4)";
    ctx.lineWidth = s(1);
    ctx.stroke();
  }
}

// ============================================================
// 유틸: 둥근 사각형
// ============================================================
function roundRect(ctx, x, y, width, height, radius) {
  if (width <= 0 || height <= 0) return;
  radius = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.arcTo(x + width, y, x + width, y + radius, radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
  ctx.lineTo(x + radius, y + height);
  ctx.arcTo(x, y + height, x, y + height - radius, radius);
  ctx.lineTo(x, y + radius);
  ctx.arcTo(x, y, x + radius, y, radius);
  ctx.closePath();
}

// ============================================================
// 메인 루프
// ============================================================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05); // 최대 50ms 프레임
  lastTime = timestamp;

  update(dt);
  updateCountdown(dt);
  updateTimeup(dt);
  updateResult(dt);
  render();

  requestAnimationFrame(gameLoop);
}

// 초기화
resizeCanvas();
requestAnimationFrame((timestamp) => {
  lastTime = timestamp;
  gameLoop(timestamp);
});
</script>
